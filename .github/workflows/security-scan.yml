# ── Weekly Security Scan ─────────────────────────────────────────────────
# Runs Trivy vulnerability/config scans, Kubernetes
# manifest checks, and secret detection (TruffleHog + Gitleaks). CodeQL is
# handled separately by GitHub's default code-scanning setup.
name: Weekly Security Scan

on:
  schedule:
    - cron: "0 3 * * 0" # Sunday 3 AM UTC
  workflow_dispatch:

concurrency:
  group: security-scan
  cancel-in-progress: false

permissions:
  contents: read
  security-events: write
  actions: read
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  trivy-fs-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy — Misconfigurations + Secrets
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "vuln,misconfig,secret"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "HIGH,CRITICAL"
          exit-code: "0"
          timeout: "10m"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
          category: "trivy"

  # NOTE: Dependency review runs in pr-checks.yml on pull_request events.
  # It is intentionally omitted here since this workflow only triggers on
  # schedule + workflow_dispatch, and dependency-review-action requires a PR.

  # NOTE: CodeQL analysis is handled by GitHub's *default* code-scanning setup
  # (repo Settings → Code security → Code scanning). A workflow-based
  # ("advanced") CodeQL job cannot coexist with default setup — GitHub rejects
  # the upload with "analyses from advanced configurations cannot be processed
  # when the default setup is enabled". It is intentionally omitted here.

  kubesec:
    name: Kubernetes Manifest Security
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Run kubesec on Base Manifests
        run: |
          set +e
          FAILURES=0
          for f in k8s/base/*.yaml; do
            if [ -f "$f" ]; then
              echo "::group::Scanning $f"
              RESULT=$(curl -sf --data-binary @"$f" https://v2.kubesec.io/scan 2>/dev/null || echo '[]')
              SCORE=$(echo "$RESULT" | jq -r '.[0].score // 0')
              echo "Score: $SCORE"
              if [ "$(echo "$SCORE < 3" | bc 2>/dev/null)" = "1" ] || [ "$SCORE" = "0" ]; then
                echo "::warning ::$f scored $SCORE — review recommended"
                FAILURES=$((FAILURES + 1))
              fi
              echo "::endgroup::"
            fi
          done
          echo "kubesec_failures=$FAILURES" >> $GITHUB_ENV

      - name: Run kubesec on Overlay Manifests
        run: |
          for dir in k8s/overlays/*/; do
            for f in "$dir"*.yaml; do
              if [ -f "$f" ] && [ "$(basename "$f")" != "kustomization.yaml" ]; then
                echo "::group::Scanning $f"
                RESULT=$(curl -sf --data-binary @"$f" https://v2.kubesec.io/scan 2>/dev/null || echo '[]')
                SCORE=$(echo "$RESULT" | jq -r '.[0].score // 0')
                echo "Score: $SCORE"
                if [ "$(echo "$SCORE < 3" | bc 2>/dev/null)" = "1" ] || [ "$SCORE" = "0" ]; then
                  echo "::warning ::$f scored $SCORE — review recommended"
                fi
                echo "::endgroup::"
              fi
            done
          done

      - name: Summary
        run: |
          {
            echo "## Kubesec Security Scan Results"
            echo ""
            echo "Scanned all K8s manifests in \`k8s/base/\` and \`k8s/overlays/\`."
            echo "Any manifest scoring below 3 triggers a warning."
            echo "Review manifests with low scores for security hardening."
          } >> $GITHUB_STEP_SUMMARY

  secret-scan:
    name: Secret & Credential Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog — Scan Full History
        uses: trufflesecurity/trufflehog@main
        with:
          path: "."
          base: "main"
          head: "HEAD"
          extra_args: "--only-verified --results=verified"
        continue-on-error: true

      - name: Gitleaks — Detect Committed Secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: "--config .github/gitleaks.toml --verbose --redact"
        continue-on-error: true

      - name: Check for .env Files
        run: |
          # Match real secret files but exclude *.example templates and the
          # standard (versioned, secret-free) Expo .xcode.env build file.
          MATCHES=$(git ls-files \
            | grep -iE '(\.env($|\.)|credentials|\.pem$|\.key$|id_rsa)' \
            | grep -viE '(\.example$|\.xcode\.env$)' || true)
          if [ -n "$MATCHES" ]; then
            {
              echo "## Secret Scan — Potential Exposure"
              echo ""
              echo "The following files were found in the repository:"
              echo '```'
              echo "$MATCHES"
              echo '```'
              echo "⚠️ These should never be committed. Add them to .gitignore immediately."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No exposed environment files or credentials detected in tracked files."
          fi
