# ── Build Mobile UniFFI (iOS/Android) ────────────────────────────────────
# Cross-compiles the Rust core for aarch64-apple-ios, x86_64-apple-ios,
# aarch64-linux-android, and x86_64-linux-android targets. Generates
# Kotlin and Swift bindings via uniffi-bindgen for React Native.
name: Build Mobile UniFFI (iOS/Android)

on:
  push:
    branches: [ "main" ]
    paths:
      - "rust/core/**"
      - "rust/core/uniffi/**"
      - "apps/mobile/**"
      - "rust/crates/state/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - "rust/core/**"
      - "rust/core/uniffi/**"
      - "apps/mobile/**"
      - "rust/crates/state/**"
  workflow_dispatch:

concurrency:
  group: mobile-uniffi-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  generate-bindings:
    runs-on: ubuntu-latest
    outputs:
      udl-hash: ${{ steps.hash.outputs.udl }}
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install uniffi-bindgen
      run: cargo install uniffi --features=cli

    - name: Generate Kotlin bindings
      run: |
        cd rust/core
        uniffi-bindgen generate uniffi/lazynext.udl --language kotlin --out-dir generated/kotlin

    - name: Generate Swift bindings
      run: |
        cd rust/core
        uniffi-bindgen generate uniffi/lazynext.udl --language swift --out-dir generated/swift

    - name: Hash UDL for cache key
      id: hash
      run: echo "udl=$(sha256sum rust/core/uniffi/lazynext.udl | cut -d' ' -f1)" >> $GITHUB_OUTPUT

    - name: Upload generated bindings
      uses: actions/upload-artifact@v4
      with:
        name: uniffi-bindings
        path: |
          rust/core/generated/kotlin/
          rust/core/generated/swift/

  build-ios:
    needs: generate-bindings
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Add iOS targets
      run: rustup target add aarch64-apple-ios x86_64-apple-ios

    - name: Download bindings
      uses: actions/download-artifact@v4
      with:
        name: uniffi-bindings
        path: rust/core/generated/

    - name: Build iOS static libs
      env:
        # Match a modern deployment target so transitive C deps (e.g.
        # aws-lc-sys via rustls) link against the same iOS version they
        # were compiled for, avoiding "symbol(s) not found for arm64".
        IPHONEOS_DEPLOYMENT_TARGET: "13.0"
      run: |
        cd rust/core
        cargo build --target aarch64-apple-ios --release
        cargo build --target x86_64-apple-ios --release

    - name: Create XCFramework
      run: |
        mkdir -p build/ios
        xcodebuild -create-xcframework \
          -library target/aarch64-apple-ios/release/liblazynext_core.a \
          -library target/x86_64-apple-ios/release/liblazynext_core.a \
          -output build/ios/LazynextCore.xcframework

    - name: Package with Swift headers
      run: |
        cp rust/core/generated/swift/*.swift build/ios/
        cd build/ios && zip -r ../../lazynext-ios-sdk.zip .

    - name: Upload iOS SDK
      uses: actions/upload-artifact@v4
      with:
        name: lazynext-ios-sdk
        path: lazynext-ios-sdk.zip

  build-android:
    needs: generate-bindings
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Add Android targets
      run: rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

    - name: Install cargo-ndk
      run: cargo install cargo-ndk

    - name: Download bindings
      uses: actions/download-artifact@v4
      with:
        name: uniffi-bindings
        path: rust/core/generated/

    - name: Build Android native libs
      run: |
        cd rust/core
        cargo ndk -t arm64-v8a -t armeabi-v7a -t x86_64 -t x86 build --release

    - name: Package AAR
      run: |
        mkdir -p build/android/jniLibs/arm64-v8a build/android/jniLibs/armeabi-v7a build/android/jniLibs/x86_64 build/android/jniLibs/x86
        cp target/aarch64-linux-android/release/*.so build/android/jniLibs/arm64-v8a/
        cp target/armv7-linux-androideabi/release/*.so build/android/jniLibs/armeabi-v7a/
        cp target/x86_64-linux-android/release/*.so build/android/jniLibs/x86_64/
        cp target/i686-linux-android/release/*.so build/android/jniLibs/x86/
        mkdir -p build/android/kotlin
        cp rust/core/generated/kotlin/*.kt build/android/kotlin/
        cd build/android && zip -r ../../lazynext-android-sdk.zip .

    - name: Upload Android SDK
      uses: actions/upload-artifact@v4
      with:
        name: lazynext-android-sdk
        path: lazynext-android-sdk.zip

  verify:
    needs: [build-ios, build-android]
    runs-on: ubuntu-latest
    steps:
    - name: Download iOS SDK
      uses: actions/download-artifact@v4
      with:
        name: lazynext-ios-sdk

    - name: Download Android SDK
      uses: actions/download-artifact@v4
      with:
        name: lazynext-android-sdk

    - name: Verify artifacts
      run: |
        echo "iOS SDK: $(du -sh lazynext-ios-sdk.zip)"
        echo "Android SDK: $(du -sh lazynext-android-sdk.zip)"
        unzip -l lazynext-ios-sdk.zip | head -10
        unzip -l lazynext-android-sdk.zip | head -10

    - name: Create release summary
      run: |
        echo "## Mobile SDK Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "- iOS XCFramework: \`lazynext-ios-sdk.zip\`" >> $GITHUB_STEP_SUMMARY
        echo "- Android AAR: \`lazynext-android-sdk.zip\`" >> $GITHUB_STEP_SUMMARY
        echo "- UniFFI bindings generated from \`rust/core/uniffi/lazynext.udl\`" >> $GITHUB_STEP_SUMMARY
