name: Build Mobile UniFFI (iOS/Android)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-mobile:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Add mobile targets
      run: rustup target add aarch64-apple-ios x86_64-apple-ios aarch64-linux-android armv7-linux-androideabi

    - name: Install cargo-ndk
      run: cargo install cargo-ndk

    - name: Build iOS XCFramework
      continue-on-error: false
      run: |
        cd rust/core
        cargo build --target aarch64-apple-ios --release
        # In a real pipeline, we'd invoke xcodebuild -create-xcframework here

    - name: Report iOS Build Failure
      if: failure()
      run: |
        echo "::error title=iOS Build Failed::The iOS XCFramework build step failed. Check the 'Build iOS XCFramework' step logs for details."

    - name: Build Android AAR
      run: |
        cd rust/core
        cargo ndk -t arm64-v8a build --release
        # In a real pipeline, we'd package to jniLibs here
