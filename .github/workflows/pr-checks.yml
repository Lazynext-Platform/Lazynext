# ── PR Checks ────────────────────────────────────────────────────────────
# Runs on every PR: lint, typecheck, test, and build across all affected
# services. Requires passing status before merge.
name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust-check:
    name: "Rust: fmt + clippy + build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev
      - uses: dtolnay/rust-toolchain@stable
        with: { components: "rustfmt,clippy" }
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo check --workspace

  ts-check:
    name: "TS: lint + typecheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.3.14" }
      - run: bun install
      - run: bun run lint --quiet && bun run typecheck
        working-directory: apps/web

  test-rust:
    name: "Test: Rust (fast)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --exclude lazynext_desktop -- --nocapture

  test-web:
    name: "Test: Web"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.3.14" }
      - run: bun install
      - run: bun test
        working-directory: apps/web

  test-extension:
    name: "Test: Extension"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.3.14" }
      - run: cd apps/browser-extension && bun install && bun test

  security:
    name: "Security: Gitleaks"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    name: "Security: Dependency Review"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: "critical"
          comment-summary-in-pr: "on-failure"
          retry-on-snapshot-warnings: true
          retry-on-snapshot-warnings-timeout: 120
          vulnerability-check: true
          license-check: false
