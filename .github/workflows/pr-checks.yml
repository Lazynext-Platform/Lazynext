name: Pull Request Quality Gates

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled]
    branches: [main]

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: read
  statuses: write

jobs:
  pr-title-lint:
    name: Conventional Commit Title
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v7

      - name: Validate PR Title
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            should start with a lowercase letter.
          wip: true
          validateSingleCommit: false

      - name: Comment on Invalid Title
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `## ⚠️ Invalid PR Title

            Your PR title does not follow [Conventional Commits](https://www.conventionalcommits.org/).

            **Format:** \`<type>: <description>\`

            **Allowed types:** \`feat\`, \`fix\`, \`docs\`, \`style\`, \`refactor\`, \`perf\`, \`test\`, \`build\`, \`ci\`, \`chore\`, \`revert\`

            **Examples:**
            - \`feat: add multi-track audio support\`
            - \`fix: resolve timeline scrubbing crash\`
            - \`perf: reduce WASM bundle size by 15%\`

            Please update your PR title and push a new commit (or edit the PR title directly).`
            });

  labeler:
    name: Auto-Label by Changed Files
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true
          configuration-path: .github/labeler.yml

  size-check:
    name: PR Size Gating
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Count Changed Lines
        id: diff
        run: |
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}

          ADDITIONS=$(git diff --shortstat "$BASE_SHA" "$HEAD_SHA" 2>/dev/null | awk '{print $4}' || echo 0)
          DELETIONS=$(git diff --shortstat "$BASE_SHA" "$HEAD_SHA" 2>/dev/null | awk '{print $6}' || echo 0)
          TOTAL=$(( ADDITIONS + DELETIONS ))

          echo "additions=${ADDITIONS:-0}" >> $GITHUB_OUTPUT
          echo "deletions=${DELETIONS:-0}" >> $GITHUB_OUTPUT
          echo "total=${TOTAL}" >> $GITHUB_OUTPUT

          echo "PR size: +${ADDITIONS:-0} / -${DELETIONS:-0} = ${TOTAL} lines changed"

      - name: Warn on Large PR
        if: fromJSON(steps.diff.outputs.total) > 500
        uses: actions/github-script@v7
        with:
          script: |
            const additions = '${{ steps.diff.outputs.additions }}';
            const deletions = '${{ steps.diff.outputs.deletions }}';
            const total = parseInt('${{ steps.diff.outputs.total }}');
            const prNumber = context.payload.pull_request.number;

            let sizeLabel;
            if (total > 2000) {
              sizeLabel = 'xxl';
            } else if (total > 1000) {
              sizeLabel = 'xl';
            } else if (total > 500) {
              sizeLabel = 'large';
            } else {
              sizeLabel = 'medium';
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: ['size/' + sizeLabel]
            });

            if (total > 1000) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `## 📏 Large PR Detected

            This PR changes **${total} lines** (+${additions} / -${deletions}).

            Consider splitting into smaller, focused PRs for faster review. Large PRs tend to:
            - Increase review latency
            - Introduce more merge conflicts
            - Make bisecting regressions harder
            `
              });
            }

  milestone-check:
    name: Milestone Assignment
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    steps:
      - name: Check Milestone Set
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            // Skip draft PRs
            if (pr.draft) {
              console.log('Draft PR — skipping milestone check');
              return;
            }

            // Skip if labeled "skip-milestone"
            if (pr.labels && pr.labels.some(l => l.name === 'skip-milestone')) {
              console.log('Labeled skip-milestone — skipping');
              return;
            }

            if (!pr.milestone) {
              const commentBody = `## 📋 Missing Milestone

            This PR does not have a milestone assigned.

            Please add a milestone to help with release planning and changelog generation.
            If this PR is not associated with a scheduled release, add the \`skip-milestone\` label.`;

              // Check if we already commented
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number
              });

              const alreadyCommented = comments.some(c =>
                c.body.includes('Missing Milestone')
              );

              if (!alreadyCommented) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: commentBody
                });
              }
            } else {
              console.log(`Milestone set: ${pr.milestone.title}`);
            }

  changelog-check:
    name: Changelog Entry Required
    runs-on: ubuntu-latest
    if: |
      github.event.action != 'closed' &&
      !github.event.pull_request.draft
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Determine PR Type
        id: prtype
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title.toLowerCase();
            const isFeature = /^(feat|feature)[(:]/.test(title);
            const isFix = /^(fix|bugfix|hotfix|bug)[(:]/.test(title);
            const isBreaking = title.includes('!') || /breaking/i.test(title);
            const labels = (context.payload.pull_request.labels || []).map(l => l.name);

            if (labels.includes('skip-changelog') || labels.includes('no-changelog')) {
              return 'skip';
            }
            if (isBreaking) return 'breaking';
            if (isFeature) return 'feature';
            if (isFix) return 'fix';
            return 'other';
          result-encoding: string

      - name: Check Changelog Updated
        if: steps.prtype.outputs.result != 'skip' && steps.prtype.outputs.result != 'other'
        run: |
          BASE_SHA=${{ github.event.pull_request.base.sha }}

          # Check if CHANGELOG.md was modified in this PR
          if git diff --name-only "origin/main" "HEAD" | grep -q "^CHANGELOG.md$"; then
            echo "CHANGELOG.md updated — great!"
            exit 0
          fi

          PR_TYPE="${{ steps.prtype.outputs.result }}"
          echo "::warning ::PR type '${PR_TYPE}' requires a CHANGELOG.md entry but CHANGELOG.md was not modified."

          cat << 'EOF' >> $GITHUB_STEP_SUMMARY
          ## Changelog Entry Required

          This PR type (`${{ steps.prtype.outputs.result }}`) requires a changelog entry.
          Please add a line to **CHANGELOG.md** under the appropriate section.

          Alternatively, add the `skip-changelog` or `no-changelog` label to bypass this check.
          EOF
