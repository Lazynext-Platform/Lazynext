name: Lazynext 2025 CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  rust-core:
    name: Build & Test Rust Core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Run Tests
        run: cargo test --manifest-path rust/core/Cargo.toml
      - name: Build Desktop (GPUI)
        run: cargo build --manifest-path apps/desktop/Cargo.toml

  wasm-build:
    name: Compile WebAssembly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM
        run: wasm-pack build --target web --out-dir pkg rust/wasm

  web-build:
    name: Build Next.js Web App
    runs-on: ubuntu-latest
    needs: [wasm-build]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install Dependencies
        run: bun install
      - name: Lint
        run: bun run lint
      - name: Type Check
        run: cd apps/web && bun run typecheck
      # In a real workflow, we would copy the built WASM from the previous job artifact here
      # - name: Build Next.js
      #   run: bun run build

  docker-build:
    name: Verify Docker Builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build lazynext-sync
        run: docker build -t lazynext-sync -f Dockerfile.sync .
      - name: Build lazynext-render
        run: docker build -t lazynext-render -f Dockerfile.render .
      # We skip lazynext-web docker build here as it requires the WASM output to be present
