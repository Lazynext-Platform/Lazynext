name: Lazynext CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-web:
    name: Test Next.js App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
      - name: Install dependencies
        run: |
          cd apps/web
          bun install
      - name: Run Jest Tests
        run: |
          cd apps/web
          bun test

  test-ml:
    name: Test Python Microservices
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          cd services
          pip install -r requirements.txt
          pip install pytest httpx
      - name: Run Pytest
        run: |
          cd services
          pytest
