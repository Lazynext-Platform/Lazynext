name: Lazynext CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-core:
    name: Rust Core — Test & Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo Registry
        uses: Swatinem/rust-cache@v2

      - name: Cargo Test (Workspace)
        run: cargo test --workspace --verbose

      - name: WASM Build
        run: cargo build --target wasm32-unknown-unknown --verbose

  web-app:
    name: Frontend — Lint, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: TypeCheck
        run: cd apps/web && bun run typecheck

      - name: Unit Tests
        run: bun run test

      - name: Install Playwright Browsers
        run: bunx playwright install --with-deps

      - name: E2E Tests
        run: cd apps/web && bun run test:e2e

  docker-deploy:
    name: Docker — Build & Push Images
    needs: [rust-core, web-app]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: lazynext-lazynext-web:latest

      - name: Build and Push AI Agents
        uses: docker/build-push-action@v5
        with:
          context: ./services/ai-agents
          file: ./services/ai-agents/Dockerfile
          push: true
          tags: lazynext-lazynext-ai-agents:latest

      - name: Build and Push Render Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/render-service
          file: ./services/render-service/Dockerfile
          push: true
          tags: lazynext-lazynext-render-service:latest

      - name: Build and Push Pre-Processing
        uses: docker/build-push-action@v5
        with:
          context: ./services/pre-processing
          file: ./services/pre-processing/Dockerfile
          push: true
          tags: lazynext-lazynext-pre-processing:latest

      - name: Build and Push Generative Studio
        uses: docker/build-push-action@v5
        with:
          context: ./services/generative-studio
          file: ./services/generative-studio/Dockerfile
          push: true
          tags: lazynext-lazynext-generative-studio:latest
