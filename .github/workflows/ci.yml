name: Lazynext 2025 CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-backend:
    name: Backend Check (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        
      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2
        
      - name: Verify Workspace Compilation
        run: cargo check --workspace

  frontend-apps:
    name: Frontend Build (Bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
          
      - name: Install Dependencies
        run: bun install
        
      # Only run build if package.json has a build script, otherwise ignore
      - name: Verify Workspace Build
        run: bun run build --if-present
