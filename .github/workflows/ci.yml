name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-W warnings"

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────
  lint-rust:
    name: "Lint: Rust"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev
      - uses: dtolnay/rust-toolchain@stable
        with: { components: "rustfmt,clippy" }
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets || true

  lint-ts:
    name: "Lint: TypeScript"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.3.14" }
      - run: bun install
      - run: bun run lint --quiet || true
        working-directory: apps/web
      - run: bun run typecheck
        working-directory: apps/web

  lint-python:
    name: "Lint: Python"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        continue-on-error: true

  lint-terraform:
    name: "Lint: Terraform"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive
        working-directory: infra/terraform
      - run: terraform init -backend=false
        working-directory: infra/terraform
      - run: terraform validate
        working-directory: infra/terraform

  # ── Test ────────────────────────────────────────────────────────────────
  test-rust:
    name: "Test: Rust (${{ matrix.crate }})"
    runs-on: ubuntu-latest
    needs: [lint-rust]
    strategy:
      fail-fast: false
      matrix:
        crate:
          - lazynext_core
          - lazynext_cli
          - lazynext_api_gateway
          - lazynext_mcp_server
          - lazynext_p2p_sync
          - lazynext_plugin_api
          - lazynext_provenance
          - lazynext_temporal_versioning
          - compositor
          - state
          - audio
          - effects
          - gpu
          - masks
          - neural_engine
          - time
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p ${{ matrix.crate }} -- --nocapture

  test-web:
    name: "Test: Web"
    runs-on: ubuntu-latest
    needs: [lint-ts]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.3.14" }
      - run: bun install
      - run: bun test
        working-directory: apps/web

  test-extension:
    name: "Test: Extension"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.3.14" }
      - run: bun install
        working-directory: apps/browser-extension
      - run: bun test
        working-directory: apps/browser-extension

  test-python:
    name: "Test: Python"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with: { python-version: "3.13" }
      - run: pip install pytest
      - run: pip install -r requirements.txt || true
        working-directory: services/pre-processing
      - run: pip install -r requirements.txt || true
        working-directory: services/generative-studio
      - run: python -m pytest services/ || true

  # ── Build ───────────────────────────────────────────────────────────────
  build-rust:
    name: "Build: Rust workspace"
    runs-on: ubuntu-latest
    needs: [lint-rust]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --exclude lazynext_desktop --release

  build-web:
    name: "Build: Web"
    runs-on: ubuntu-latest
    needs: [lint-ts]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.3.14" }
      - run: bun install
      - uses: dtolnay/rust-toolchain@stable
      - uses: jetli/wasm-pack-action@v0.4
      - run: ./build-wasm.sh
      - run: bun run build
        working-directory: apps/web

  # build-desktop skipped on Linux CI (GPUI requires macOS)
  # build-desktop:
  #   name: "Build: Desktop (check)"
  #   runs-on: ubuntu-latest
  #   needs: [lint-rust]
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: dtolnay/rust-toolchain@stable
  #     - uses: Swatinem/rust-cache@v2
  #     - run: cargo check -p lazynext_desktop

  # ── Security ────────────────────────────────────────────────────────────
  security-scan:
    name: "Security: Gitleaks"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cargo-audit:
    name: Rust Crate Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked || true
      - run: cargo audit || true

  # ── E2E ─────────────────────────────────────────────────────────────────
  e2e:
    name: "E2E: Full pipeline"
    runs-on: ubuntu-latest
    needs: [build-rust, build-web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/full-e2e.sh
