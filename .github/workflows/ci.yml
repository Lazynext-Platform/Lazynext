name: Lazynext CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust-core:
    name: Rust Core — Test & Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Add WASM Target Std Library
        run: rustup target add wasm32-unknown-unknown

      - name: Cache Cargo Registry
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Cargo Test (Workspace)
        run: cargo test --workspace --verbose

      - name: Build WASM Package
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          wasm-pack build --target web rust/wasm

      - name: Upload WASM Package
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: rust/wasm/pkg/
          retention-days: 1

  web-app:
    name: Frontend — Lint, Typecheck & Test
    needs: rust-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Download WASM Package
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: rust/wasm/pkg/

      - name: Install Dependencies
        run: bun install

      - name: Lint
        continue-on-error: true
        run: bun run lint

      - name: TypeCheck
        continue-on-error: true
        run: cd apps/web && bun run typecheck

      - name: Unit Tests
        run: bun run test

      - name: Install Playwright Browsers
        run: bunx playwright install --with-deps

      - name: E2E Tests
        run: cd apps/web && bun run test:e2e

  docker-deploy:
    name: Docker — Build & Push Images
    needs: [rust-core, web-app]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: lazynext-lazynext-web:latest

      - name: Build and Push AI Agents
        uses: docker/build-push-action@v5
        with:
          context: ./services/ai-agents
          file: ./services/ai-agents/Dockerfile
          push: true
          tags: lazynext-lazynext-ai-agents:latest

      - name: Build and Push Render Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/render-service
          file: ./services/render-service/Dockerfile
          push: true
          tags: lazynext-lazynext-render-service:latest

      - name: Build and Push Pre-Processing
        uses: docker/build-push-action@v5
        with:
          context: ./services/pre-processing
          file: ./services/pre-processing/Dockerfile
          push: true
          tags: lazynext-lazynext-pre-processing:latest

      - name: Build and Push Generative Studio
        uses: docker/build-push-action@v5
        with:
          context: ./services/generative-studio
          file: ./services/generative-studio/Dockerfile
          push: true
          tags: lazynext-lazynext-generative-studio:latest
