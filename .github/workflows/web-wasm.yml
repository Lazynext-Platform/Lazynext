name: Build Web WASM (DEPRECATED)

# DEPRECATED: The WASM build is now handled by ci.yml (rust-core job).
# This workflow is retained for reference. Remove after confirming ci.yml works.
# The correct WASM build path is: rust/wasm → pkg (not rust/core → ../../apps/web/pkg)

on:
  workflow_dispatch:  # Manual trigger only

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Install wasm-pack
      run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

    - name: Build lazynext_core for Web
      run: |
        cd rust/core
        wasm-pack build --target web --out-dir ../../apps/web/pkg

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: wasm-pkg
        path: apps/web/pkg/
