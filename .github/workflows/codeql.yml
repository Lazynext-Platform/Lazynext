name: "CodeQL Analysis"

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "**.json"
      - "**.lock"
      - "**.toml"
      - "**/target/**"
      - "**/node_modules/**"
      - "**/dist/**"
      - "**/outputs/**"
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "42 7 * * 1"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript", "python", "actions"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Bun (for JS/TS analysis)
        if: matrix.language == 'javascript-typescript'
        uses: oven-sh/setup-bun@v2

      - name: Setup Python (for Python analysis)
        if: matrix.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config: |
            paths-ignore:
              - "**/target/**"
              - "**/node_modules/**"
              - "**/dist/**"
              - "**/outputs/**"
              - "**/scripts/python/funclip/**"

      - name: Install JS/TS dependencies
        if: matrix.language == 'javascript-typescript'
        run: bun install --frozen-lockfile || bun install

      - name: Install Python dependencies
        if: matrix.language == 'python'
        run: |
          pip install -r services/pre-processing/requirements.txt 2>/dev/null || true
          pip install -r services/generative-studio/requirements.txt 2>/dev/null || true

      - name: Actions (no build needed)
        if: matrix.language == 'actions'
        run: echo "No build required for Actions workflows"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
