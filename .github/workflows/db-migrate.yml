name: DB Migrate

# Apply Supabase migrations to production on every push to main that
# touches supabase/migrations/. Manual dispatch is also supported so a
# stuck migration can be re-run without an empty commit.
#
# Required repository secrets (the job no-ops with a clear log message
# when any are missing, so forks and preview branches stay green):
#   SUPABASE_ACCESS_TOKEN  - personal access token from supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_ID    - the production project ref (e.g. abcdwxyz)
#   SUPABASE_DB_PASSWORD   - the database password for the project
#
# Order of operations matters: we link first, then dry-run, then push.
# The dry-run prints the SQL that will be applied so it's auditable in
# the workflow logs even on success.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/db-migrate.yml'
  workflow_dispatch:

# Never run two migration deploys in parallel — Postgres locks would
# fight and one would fail mid-transaction.
concurrency:
  group: db-migrate-production
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check secrets
        id: check
        env:
          ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$ACCESS_TOKEN" ] || [ -z "$PROJECT_ID" ] || [ -z "$DB_PASSWORD" ]; then
            echo "::warning::Supabase deploy secrets not configured — skipping migration apply."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: supabase/setup-cli@v1
        if: steps.check.outputs.configured == 'true'
        with:
          version: latest

      - name: Link project
        if: steps.check.outputs.configured == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"

      - name: Dry-run (audit log of pending SQL)
        if: steps.check.outputs.configured == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --dry-run

      - name: Apply migrations
        if: steps.check.outputs.configured == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push
