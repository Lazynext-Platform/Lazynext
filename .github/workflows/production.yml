name: Production Deploy

on:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  GCP_PROJECT_ID: vertexaiopencode

jobs:
  node-checks:
    name: Node.js Services Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Typecheck Services
        run: |
          cd services/render-service && bun run typecheck
          cd ../analytics-service && bun install && bun run typecheck
          cd ../../apps/web && bun run build

  deploy-k8s:
    name: Multi-Cloud Deploy
    needs: [node-checks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # ── GCP DEPLOYMENT ──────────────────────────────────────────────────
      - name: Authenticate GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/769665933727/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider'
          service_account: 'github-actions-deploy@vertexaiopencode.iam.gserviceaccount.com'
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Build & Push All Images to GCR
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev

          docker build -t us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/lazynext/lazynext-web:latest -f apps/web/Dockerfile .
          docker push us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/lazynext/lazynext-web:latest

          docker build -t us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/lazynext/lazynext-ai-agents:latest -f services/ai-agents/Dockerfile services/ai-agents
          docker push us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/lazynext/lazynext-ai-agents:latest

          docker build -t us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/lazynext/lazynext-render-service:latest -f services/render-service/Dockerfile services/render-service
          docker push us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/lazynext/lazynext-render-service:latest

          docker build -t us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/lazynext/lazynext-pre-processing:latest -f services/pre-processing/Dockerfile services/pre-processing
          docker push us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/lazynext/lazynext-pre-processing:latest

          docker build -t us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/lazynext/lazynext-generative-studio:latest -f services/generative-studio/Dockerfile services/generative-studio
          docker push us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/lazynext/lazynext-generative-studio:latest

          docker build -t us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/lazynext/lazynext-analytics-service:latest -f services/analytics-service/Dockerfile services/analytics-service
          docker push us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/lazynext/lazynext-analytics-service:latest

          docker build -t us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/lazynext/lazynext-mcp:latest -f rust/mcp-server/Dockerfile .
          docker push us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/lazynext/lazynext-mcp:latest

      - name: Deploy to GKE
        run: |
          gcloud container clusters get-credentials lazynext-gke-prod --region us-central1
          kubectl apply -k k8s/overlays/production
