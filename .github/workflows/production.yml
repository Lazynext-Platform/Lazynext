name: Production Deploy

on:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  GCP_PROJECT_ID: lazynext-prod
  CLOUD_PROVIDER: gcp # Default target: 'gcp', 'aws', or 'azure'

jobs:
  rust-checks:
    name: Rust Core Tests & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo Check
        run: cargo check --workspace
      - name: Cargo Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Cargo Test
        run: cargo test --workspace

  node-checks:
    name: Node.js Services Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Typecheck Services
        run: |
          cd services/render-service && bun run typecheck
          cd ../analytics-service && bun install && bun run typecheck
          cd ../../apps/web && bun run build

  deploy-k8s:
    name: Multi-Cloud Deploy
    needs: [rust-checks, node-checks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # ── GCP DEPLOYMENT ──────────────────────────────────────────────────
      - name: Authenticate GCP
        if: env.CLOUD_PROVIDER == 'gcp'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'
      - name: Set up Cloud SDK
        if: env.CLOUD_PROVIDER == 'gcp'
        uses: google-github-actions/setup-gcloud@v2
      - name: Build & Deploy GCP
        if: env.CLOUD_PROVIDER == 'gcp'
        run: |
          docker build -t gcr.io/${{ env.GCP_PROJECT_ID }}/collab-server:latest -f apps/web/Dockerfile .
          docker push gcr.io/${{ env.GCP_PROJECT_ID }}/collab-server:latest
          kubectl apply -k k8s/overlays/prod
          
      # ── AWS DEPLOYMENT ──────────────────────────────────────────────────
      - name: Configure AWS credentials
        if: env.CLOUD_PROVIDER == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Build & Deploy AWS
        if: env.CLOUD_PROVIDER == 'aws'
        run: |
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
          docker build -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/lazynext/web:latest -f apps/web/Dockerfile .
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/lazynext/web:latest
          aws eks update-kubeconfig --region us-east-1 --name lazynext-eks-prod
          kubectl apply -f k8s/base/

      # ── AZURE DEPLOYMENT ────────────────────────────────────────────────
      - name: Login to Azure
        if: env.CLOUD_PROVIDER == 'azure'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Build & Deploy Azure
        if: env.CLOUD_PROVIDER == 'azure'
        run: |
          az acr login --name lazynextacr
          docker build -t lazynextacr.azurecr.io/web:latest -f apps/web/Dockerfile .
          docker push lazynextacr.azurecr.io/web:latest
          az aks get-credentials --resource-group lazynext-rg --name lazynext-aks
          kubectl apply -f k8s/base/
