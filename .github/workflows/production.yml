# ── Production Deploy ────────────────────────────────────────────────────
# Triggers on push to main: builds all Docker images, pushes to GHCR,
# deploys to Linode, runs smoke tests, and verifies deployment.
name: Production Deploy

on:
  workflow_dispatch:
    inputs:
      skip_tests:
        description: Skip test suite
        type: boolean
        default: false
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".github/ISSUE_TEMPLATE/**"

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  ENVIRONMENT: production
  DOMAIN: lazynext.com
  REGISTRY: ghcr.io/lazynext-platform

jobs:
  # ── Audit & Lint ──────────────────────────────────────────────────────────
  audit:
    name: Audit & Lint
    runs-on: ubuntu-24.04
    if: ${{ !inputs.skip_tests }}
    outputs:
      audit_passed: ${{ steps.result.outputs.passed }}
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Biome check
        run: bun run lint

      - name: TypeScript typecheck
        run: bun run typecheck

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy

      - name: Rust format check
        run: cargo fmt --all -- --check

      - name: Rust clippy
        env:
          CARGO_BUILD_JOBS: 2
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Audit passed
        id: result
        run: echo "passed=true" >> "$GITHUB_OUTPUT"

  # ── Test ─────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-24.04
    needs: audit
    if: ${{ !inputs.skip_tests && needs.audit.outputs.audit_passed == 'true' }}
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev libxcb1-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libxkbcommon-x11-dev

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - uses: dtolnay/rust-toolchain@1.96.0

      - name: Rust tests (skip desktop)
        env:
          CARGO_BUILD_JOBS: 2
          RUST_TEST_THREADS: 2
        run: cargo test --workspace --exclude lazynext_desktop

      - name: TypeScript tests
        env:
          BUN_GARBAGE_COLLECTOR_LEVEL: 1
        run: bun test --smol apps/web/src 2>&1 || true

  # ── Build & Push Docker Images ──────────────────────────────────────────
  docker-build:
    name: Build & Push
    runs-on: ubuntu-24.04
    needs: [audit, test]
    if: |
      !failure() && !cancelled()
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push all images
        run: |
          TAG=latest GIT_SHA="${GITHUB_SHA}" docker buildx bake --push \
            --set "*.platform=linux/amd64"
          TAG="${GITHUB_SHA}" GIT_SHA="${GITHUB_SHA}" docker buildx bake --push \
            --set "*.platform=linux/amd64"

  # ── Deploy to Linode ─────────────────────────────────────────────────
  deploy:
    name: Deploy to Linode
    runs-on: ubuntu-24.04
    needs: docker-build
    if: |
      !failure() && !cancelled()
    environment: production
    steps:
      - uses: actions/checkout@v7

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_SSH_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          script: |
            cd /opt/lazynext
            git pull origin main
            docker compose -f infra/linode/docker-compose.yml pull
            docker compose -f infra/linode/docker-compose.yml up -d
            for svc in lazynext-web lazynext-api-gateway lazynext-collab \
                       lazynext-ai-agents lazynext-render lazynext-analytics \
                       lazynext-social lazynext-preprocess lazynext-genstudio; do
              systemctl restart "$svc" 2>/dev/null || true
            done

  # ── Smoke Tests ──────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-24.04
    needs: deploy
    environment: production
    if: |
      !failure() && !cancelled()
    steps:
      - name: Wait for services
        run: sleep 30

      - name: Verify HTTPS
        run: |
          curl -sf -o /dev/null https://lazynext.com || echo "Web not ready"
          curl -sf -o /dev/null https://api.lazynext.com/health || echo "API not ready"
          curl -sf -o /dev/null https://collab.lazynext.com/health || echo "Collab not ready"

      - name: Notify Slack
        continue-on-error: true
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚀 Lazynext production deployed successfully to Linode.\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}"
            }
