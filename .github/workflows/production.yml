name: Production Deploy

on:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  GCP_PROJECT_ID: lazynext-prod

jobs:
  rust-checks:
    name: Rust Core Tests & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo Check
        run: cargo check --workspace
      - name: Cargo Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Cargo Test
        run: cargo test --workspace

  node-checks:
    name: Node.js Services Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: oven-sh/setup-bun@v1
      - name: Install dependencies
        run: bun install
      - name: Typecheck Services
        run: |
          cd services/render-service && bun run typecheck
          cd ../analytics-service && bun install && bun run typecheck
          cd ../../apps/web && bun run build

  deploy-k8s:
    name: Build & Deploy to GKE
    needs: [rust-checks, node-checks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - id: auth
        uses: google-github-actions/auth@v1
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
      - name: Build & Push Docker Images
        run: |
          docker build -t gcr.io/${{ env.GCP_PROJECT_ID }}/collab-server:latest -f apps/web/Dockerfile .
          docker push gcr.io/${{ env.GCP_PROJECT_ID }}/collab-server:latest
          docker build -t gcr.io/${{ env.GCP_PROJECT_ID }}/analytics-service:latest -f services/analytics-service/Dockerfile services/analytics-service
          docker push gcr.io/${{ env.GCP_PROJECT_ID }}/analytics-service:latest
      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -k k8s/overlays/prod
