name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  GITHUB_USERNAME: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: lazynext-web
            context: .
            dockerfile: apps/web/Dockerfile
          - image: lazynext-render-service
            context: .
            dockerfile: services/render-service/Dockerfile
          - image: lazynext-generative-studio
            context: .
            dockerfile: services/generative-studio/Dockerfile
          - image: lazynext-ai-agents
            context: .
            dockerfile: services/ai-agents/Dockerfile
          - image: lazynext-analytics-service
            context: .
            dockerfile: services/analytics-service/Dockerfile
          - image: lazynext-pre-processing
            context: .
            dockerfile: services/pre-processing/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=raw,value=dev
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
