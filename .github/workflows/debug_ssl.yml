# ── Debug SSL ────────────────────────────────────────────────────────────
# Manual workflow to test SSL/TLS certificate configuration, verify DNS
# propagation, and debug HTTPS issues in staging/production environments.
name: Debug SSL
on:
  workflow_dispatch:

concurrency:
  group: debug-ssl
  cancel-in-progress: true

jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check Container App Ingress & TLS
        run: |
          echo "=== Container App URLs ==="
          for app in lazynext-web-dev lazynext-ai-agents-dev lazynext-render-dev lazynext-pre-processing-dev lazynext-gen-studio-dev; do
            fqdn=$(az containerapp show --name "$app" --resource-group lazynext-rg-dev --query "properties.configuration.ingress.fqdn" -o tsv 2>/dev/null || echo "not found")
            echo "$app: $fqdn"
          done

      - name: Check AKS Cluster
        run: |
          az aks list --resource-group lazynext-rg-dev --query "[].{Name:name,Version:kubernetesVersion,FQDN:fqdn}" -o table
