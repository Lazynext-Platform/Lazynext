# Gitleaks configuration for Lazynext
# Detects secrets, keys, tokens, and credentials before they enter the repo.
# Referenced by: .gitlab-ci.yml (security:scan), Jenkinsfile (Security Scan)
title = "Lazynext Gitleaks Config"

[allowlist]
  description = "Global allowlist"
  paths = [
    '''go\.sum$''',
    '''package-lock\.json$''',
    '''bun\.lock$''',
    '''Cargo\.lock$''',
    '''poetry\.lock$''',
    '''terraform\.lock\.hcl$''',
    '''test-results/''',
    '''\.pytest_cache/''',
    '''\.turbo/''',
    '''target/''',
    '''node_modules/''',
    '''vendor/''',
    '''\.terraform/''',
    # Example / template files with known placeholder values
    '''\.env\.example$''',
    '''\.env\.docker$''',
    '''\.env\.production\.example$''',
    '''README\.md$''',
  ]

[[rules]]
  id = "generic-api-key"
  description = "Generic API Key"
  regex = '''(?i)(?:api[_-]?key|apikey|api_secret|secret[_-]?key|token|auth[_-]?token)[''\"]?\s*[:=]\s*[''\"]?[a-z0-9+/=._-]{20,}[''\"]?'''
  [rules.allowlist]
    regexes = [
      '''(?i)(?:placeholder|mock|example|test|sample|demo|change.?me|your.?key|xxxxxxxx|replace.?me|dummy)''',
      '''(?i)sk_test_placeholder''',
      '''(?i)FAKE''',
            '''(?i)your-key|yourkey''',
      '''(?i)PLACEHOLDER''',
      '''# REPLACE_ME''',
    ]

[[rules]]
  id = "github-token"
  description = "GitHub Personal Access Token"
  regex = '''ghp_[0-9a-zA-Z]{36}'''
  tags = ["github", "token"]

[[rules]]
  id = "github-pat-v2"
  description = "GitHub Fine-grained PAT"
  regex = '''github_pat_[0-9a-zA-Z_]{82}'''

[[rules]]
  id = "aws-access-key"
  description = "AWS Access Key"
  regex = '''(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}'''
  tags = ["aws", "key"]

[[rules]]
  id = "private-key"
  description = "Private Key"
  regex = '''-----BEGIN (?:RSA |EC |DSA |OPENSSH |PGP )?PRIVATE KEY-----'''
  tags = ["key", "private-key"]

[[rules]]
  id = "openai-api-key"
  description = "OpenAI API Key"
  regex = '''sk-(?:proj-)?[A-Za-z0-9]{32,}'''
  [rules.allowlist]
    regexes = ['''(?i)placeholder|mock|example|test|sk_test_placeholder''']
  tags = ["openai", "api-key"]

[[rules]]
  id = "google-api-key"
  description = "Google API Key"
  regex = '''AIza[0-9A-Za-z\-_]{35}'''

[[rules]]
  id = "slack-token"
  description = "Slack Bot Token"
  regex = '''xox[baprs]-[0-9a-zA-Z-]{10,}'''
  tags = ["slack"]

[[rules]]
  id = "dodo-key"
  description = "Dodo Payments API Key"
  regex = '''(?:dp_live_|dp_test_|dwhsec_)[0-9a-zA-Z]{24,}'''
  [rules.allowlist]
    regexes = ['''(?i)placeholder|dp_test_placeholder''']
  tags = ["dodo"]

[[rules]]
  id = "jwt-secret"
  description = "JWT / Better Auth Secret pattern"
  regex = '''better_auth_secret\s*=\s*"([^"]{32,})"'''
  [rules.allowlist]
    regexes = ['''(?i)placeholder|example|change.?me|minimum-64-characters''']
  tags = ["jwt"]

[[rules]]
  id = "database-password"
  description = "Database password in tfvars or config"
  regex = '''db_password\s*=\s*"([^"]{8,})"'''
  [rules.allowlist]
    regexes = ['''(?i)placeholder|example|change.?me|Dev20[0-9]{2}''']
  tags = ["database"]
