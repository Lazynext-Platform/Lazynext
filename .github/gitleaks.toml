# Gitleaks configuration for Lazynext
# Detects hardcoded secrets, tokens, keys, and credentials

title: Lazynext Gitleaks Config

[extend]
useDefault = true

[allowlist]
  description = "Safe exclusions"
  paths = [
    # Example env files are safe
    '''\.env\.example$''',
    # Generated / vendored
    '''target/''',
    '''node_modules/''',
    '''dist/''',
    '''outputs/''',
    '''\.pnp\..*''',
    # Test fixtures
    '''fixtures/''',
    '''__snapshots__/''',
    # Lock files (generated hashes)
    '''Cargo\.lock$''',
    '''bun\.lock$''',
    # Config files with placeholder keys
    '''terraform\.tfvars\.example$''',
    '''playwright\.config\..*''',
  ]
