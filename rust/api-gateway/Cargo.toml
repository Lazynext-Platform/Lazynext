[package]
name = "lazynext_api_gateway"
version = "0.1.0"
edition = "2024"

[dependencies]
lazynext_core = { path = "../core" }
tokio = { version = "1.0", features = ["full"] }
axum = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
reqwest = { version = "0.11", features = ["json"] }
