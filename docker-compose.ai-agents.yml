# ── AI Agents — Standalone Development ───────────────────────────
# Usage: docker compose -f docker-compose.ai-agents.yml up
services:
  ai-agents:
    build:
      context: ./services/ai-agents
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - NODE_ENV=development
      - PORT=8002
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ./services/ai-agents/src:/app/src:delegated
    command: ["bun", "--watch", "run", "src/index.ts"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8002/health"]
      interval: 20s
      start_period: 10s
    networks:
      - ai-net

networks:
  ai-net:
    driver: bridge
