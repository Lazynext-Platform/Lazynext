# ── Generative Studio — Standalone Development ───────────────────
# Usage: docker compose -f docker-compose.generative-studio.yml up
services:
  generative-studio:
    build:
      context: ./services/generative-studio
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - HF_HOME=/tmp/huggingface
      - TRANSFORMERS_CACHE=/tmp/huggingface
    volumes:
      - ./services/generative-studio:/app:delegated
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/"]
      interval: 30s
      start_period: 60s
    networks:
      - gen-net

networks:
  gen-net:
    driver: bridge
