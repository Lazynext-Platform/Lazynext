# ── Redis Production Configuration ──────────────────────────────
# Used by Redis 7.x in Kubernetes (mounted as ConfigMap)
# Apply: kubectl create configmap redis-config --from-file=redis-prod.conf -n lazynext

# ── Persistence ──────────────────────────────────────────────────
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-use-rdb-preamble yes

save 900 1
save 300 10
save 60 10000

# ── Memory ──────────────────────────────────────────────────────
maxmemory 512mb
maxmemory-policy allkeys-lru

# ── Connection Limits ───────────────────────────────────────────
maxclients 10000
tcp-backlog 511
timeout 300
tcp-keepalive 300

# ── Slow Log ────────────────────────────────────────────────────
slowlog-log-slower-than 10000
slowlog-max-len 128

# ── Latency Monitor ─────────────────────────────────────────────
latency-monitor-threshold 100

# ── Replication ─────────────────────────────────────────────────
# For production, configure a replica:
# replicaof <master-ip> <master-port>
# masterauth <master-password>

repl-diskless-sync yes
repl-diskless-sync-delay 5
repl-timeout 60

# ── Security ────────────────────────────────────────────────────
# In production: rename-command FLUSHDB ""
# In production: rename-command FLUSHALL ""
# In production: rename-command DEBUG ""
# In production: rename-command CONFIG "CONFIG_$(openssl rand -hex 8)"
# In production: rename-command SHUTDOWN "SHUTDOWN_$(openssl rand -hex 8)"

# ── Client Output Buffer Limits ──────────────────────────────────
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# ── Keyspace Notifications (for Upstash compatibility) ──────────
notify-keyspace-events Ex

# ── Cluster Mode ────────────────────────────────────────────────
# Uncomment for Redis Cluster (sharding across 3+ nodes):
# cluster-enabled yes
# cluster-config-file /data/nodes.conf
# cluster-node-timeout 5000
# cluster-require-full-coverage yes
