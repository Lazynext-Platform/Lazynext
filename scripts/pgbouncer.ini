;; ── PgBouncer Configuration ──────────────────────────────────────
;; Connection pooler for PostgreSQL — reduces Cloud SQL connection overhead.
;;
;; Usage:
;;   docker run -v $(pwd)/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini \
;;              -p 6432:6432 edoburu/pgbouncer:1.22.0
;;
;; Application connects to: postgresql://user:pass@pgbouncer:6432/dbname

[databases]
;; Connection string format: host=HOST port=5432 dbname=DB user=USER password=PASS
lazynext = host=DB_HOST port=5432 dbname=lazynext

[pgbouncer]
;; ── Connection Pooling ──────────────────────────────────────────
pool_mode      = transaction    ; session | transaction | statement
default_pool_size = 25          ; max connections per user/db pair
reserve_pool_size = 10          ; additional connections reserved
reserve_pool_timeout = 5        ; seconds before using reserve pool
max_client_conn = 500           ; max client connections
max_db_connections = 100        ; max server connections

;; ── Timeouts ────────────────────────────────────────────────────
server_idle_timeout = 600       ; drop server conn after 10 min idle
client_idle_timeout = 600       ; drop client conn after 10 min idle
query_timeout       = 60        ; kill queries running > 60s
query_wait_timeout  = 30        ; how long to wait for a connection

;; ── Lifecycle ───────────────────────────────────────────────────
server_lifetime     = 3600      ; recycle server conns every hour
server_round_robin  = 1         ; distribute load across servers
min_pool_size       = 5         ; keep at least 5 connections ready

;; ── Networking ──────────────────────────────────────────────────
listen_addr   = 0.0.0.0
listen_port   = 6432
unix_socket_dir =

;; ── Authentication ──────────────────────────────────────────────
auth_type     = scram-sha-256   ; or 'md5' for older PG versions
auth_file     = /etc/pgbouncer/userlist.txt

;; ── Logging & Monitoring ────────────────────────────────────────
log_connections  = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period     = 60
admin_users      = pgbouncer_admin
stats_users      = pgbouncer_stats

;; ── TLS (optional) ──────────────────────────────────────────────
;client_tls_sslmode = require
;client_tls_ca_file  = /etc/pgbouncer/ca.crt
;client_tls_key_file = /etc/pgbouncer/pgbouncer.key
;client_tls_cert_file = /etc/pgbouncer/pgbouncer.crt
