# ── Grafana Dashboard Provisioning ────────────────────────────────
# Auto-loads dashboard JSON from dashboards/ on startup.
# No manual import needed — dashboards appear automatically.
apiVersion: 1

providers:
  - name: 'Lazynext'
    orgId: 1
    folder: 'Lazynext'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
