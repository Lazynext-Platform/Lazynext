# ── Grafana Datasources ──────────────────────────────────────────
# Auto-provisioned when Grafana starts with this ConfigMap mounted.
# Docker Compose: uses service-name URLs (prometheus:9090, loki:3100, etc.)
# K8s: override with namespace-qualified URLs via a K8s-specific ConfigMap patch
#  (http://prometheus-operated.monitoring:9090, http://loki.monitoring:3100, etc.)
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    # Docker Compose default; K8s overlay should patch to: http://prometheus-operated.monitoring:9090
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "30s"
      queryTimeout: "60s"
      httpMethod: "POST"
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo

  - name: Loki
    type: loki
    access: proxy
    # Docker Compose default; K8s overlay should patch to: http://loki.monitoring:3100
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: "trace_id=(\\w+)"
          name: trace_id
          url: "$${__value.raw}"

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    uid: tempo
    editable: false
    jsonData:
      httpMethod: "GET"
      tracesToLogsV2:
        datasourceUid: "loki"
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        filterBySpanID: false
        tags:
          - key: "service.name"
            value: "service"

  - name: Azure PostgreSQL
    type: postgres
    access: proxy
    # Docker Compose default; K8s overlay should patch to: postgres-db.lazynext:5432
    url: db:5432
    database: lazynext
    user: lazynext
    secureJsonData:
      password: "${DB_PASSWORD}"
    jsonData:
      sslmode: "disable"
      postgresVersion: 1700
      timescaledb: false
    editable: false
