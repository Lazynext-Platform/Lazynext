# ── AlertManager Configuration ───────────────────────────────────
# Routes alerts to Slack, email, and PagerDuty based on severity.
# Apply: kubectl create secret generic alertmanager-config --from-file=config.yml -n monitoring
#
# IMPORTANT: Before production deployment, Slack/PagerDuty/Resend credentials
# (webhook URLs, routing keys, API keys, SMTP passwords) must be provided
# via vault or Kubernetes secrets. Replace all REPLACE_WITH_* placeholders
# below with secret references or injected values — never commit real credentials.

global:
  resolve_timeout: 5m
  slack_api_url: "${SLACK_WEBHOOK_URL}"
  pagerduty_url: "https://events.pagerduty.com/v2/enqueue"

# ── Route Tree ───────────────────────────────────────────────────
route:
  receiver: "slack-warnings"
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Critical alerts → PagerDuty + Slack + Email (DBA)
    - match:
        severity: critical
      receiver: "pagerduty-critical"
      continue: true
    - match:
        severity: critical
      receiver: "slack-critical"
      continue: true
    - match:
        severity: critical
      match_re:
        alertname: "Database.*|PostgreSQL.*"
      receiver: "email-dba"
      continue: false

    # Warning alerts → Slack + Email (DBA if DB-related)
    - match:
        severity: warning
      receiver: "slack-warnings"
      continue: true
    - match:
        severity: warning
      match_re:
        alertname: "Database.*|PostgreSQL.*"
      receiver: "email-dba"

# ── Receivers ────────────────────────────────────────────────────
receivers:
  - name: "slack-critical"
    slack_configs:
      - channel: "#lazynext-alerts-critical"
        title: "🚨 {{ .GroupLabels.alertname }}"
        text: |
          *Severity:* {{ .CommonLabels.severity }}
          *Description:* {{ .CommonAnnotations.description }}
          *Summary:* {{ .CommonAnnotations.summary }}
          {{ range .Alerts }}
          • {{ .Annotations.summary }} — {{ .Labels.instance }}
          {{ end }}
        color: "danger"
        send_resolved: true

  - name: "slack-warnings"
    slack_configs:
      - channel: "#lazynext-alerts"
        title: "⚠️ {{ .GroupLabels.alertname }}"
        text: |
          *Severity:* {{ .CommonLabels.severity }}
          *Summary:* {{ .CommonAnnotations.summary }}
        color: "warning"
        send_resolved: true

  - name: "pagerduty-critical"
    pagerduty_configs:
      - routing_key: "${PAGERDUTY_INTEGRATION_KEY}"
        severity: "critical"
        description: "{{ .CommonAnnotations.description }}"
        client: "Lazynext Monitoring"
        client_url: "https://monitoring.lazynext.ai"

  - name: "email-dba"
    email_configs:
      - to: "dba@lazynext.ai"
        from: "alerts@lazynext.ai"
        smarthost: "smtp.resend.com:587"
        auth_username: "resend"
        auth_password: "${RESEND_API_KEY}"
        headers:
          Subject: "[Lazynext DB] {{ .GroupLabels.alertname }}"

# ── Inhibition Rules ────────────────────────────────────────────
inhibit_rules:
  # If a critical alert fires, suppress warnings for same service
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "instance"]
