# Tempo distributed tracing backend.
# For production, enable local filesystem storage:
#   storage:
#     trace:
#       backend: local
#       local:
#         path: /var/tempo/traces
#   compactor:
#     compaction:
#       block_retention: 720h  # 30 days
#
# Production uses local storage with persistent volumes.

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/traces
    wal:
      path: /tmp/tempo/wal

compactor:
  compaction:
    block_retention: 720h

metrics_generator:
  ring:
    kvstore:
      store: inmemory
  processor:
    span_metrics: {}

ingester:
  max_block_bytes: 100000000
  max_block_duration: 30m

querier:
  max_concurrent_queries: 20
