# Tempo distributed tracing backend.
# For production, enable Azure Blob Storage backend:
#   storage:
#     trace:
#       backend: azure
#       azure:
#         container_name: tempo-traces
#         storage_account_name: ${AZURE_STORAGE_ACCOUNT}
#         storage_account_key: ${AZURE_STORAGE_ACCESS_KEY}
#   compactor:
#     compaction:
#       block_retention: 720h  # 30 days
#
# Current config uses local storage (development only).

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/traces
    wal:
      path: /tmp/tempo/wal

compactor:
  compaction:
    block_retention: 720h

metrics_generator:
  ring:
    kvstore:
      store: inmemory
  processor:
    span_metrics: {}

ingester:
  max_block_bytes: 100000000
  max_block_duration: 30m

querier:
  max_concurrent_queries: 20
