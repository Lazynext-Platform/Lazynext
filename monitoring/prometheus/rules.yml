# ── Prometheus Alert Rules (Docker Compose format) ──
# These are the plain YAML rules compatible with standalone Prometheus.
# The slos.yaml file is a K8s PrometheusRule CRD — use that for K8s deployments.
groups:
  - name: lazynext-alerts
    rules:
      - alert: WebAppDown
        expr: up{job="lazynext-web"} == 0
        for: 5m
        labels:
          severity: critical
          service: web
        annotations:
          summary: "Web app is down"
          description: "The lazynext-web service has been unreachable for 5 minutes."

      - alert: PythonServiceDown
        expr: up{job=~"lazynext-pre-processing|lazynext-generative-studio"} == 0
        for: 5m
        labels:
          severity: critical
          service: ml
        annotations:
          summary: "Python ML service is down"
          description: "{{ $labels.job }} has been unreachable for 5 minutes."

      - alert: AIServiceDown
        expr: up{job="lazynext-ai-agents"} == 0
        for: 3m
        labels:
          severity: warning
          service: ai
        annotations:
          summary: "AI Agents service is down"
          description: "The Chronos AI Agents (lazynext-ai-agents) service has been unreachable for 3 minutes. NL editing commands will fail."

      - alert: RenderServiceDown
        expr: up{job="lazynext-render-service"} == 0
        for: 3m
        labels:
          severity: warning
          service: render
        annotations:
          summary: "Render service is down"
          description: "The render-service on port 8003 has been unreachable for 3 minutes. Video export will be delayed."

      - alert: CollabServerDown
        expr: up{job="lazynext-collab-server"} == 0
        for: 3m
        labels:
          severity: warning
          service: collab
        annotations:
          summary: "Collab server is down"
          description: "The collab-server on port 8004 has been unreachable for 3 minutes. CRDT sync and real-time collaboration are affected."

      - alert: AnalyticsServiceDown
        expr: up{job="lazynext-analytics"} == 0
        for: 5m
        labels:
          severity: warning
          service: analytics
        annotations:
          summary: "Analytics service is down"

      - alert: APIGatewayDown
        expr: up{job="lazynext-api-gateway"} == 0
        for: 3m
        labels:
          severity: critical
          service: api-gateway
        annotations:
          summary: "API Gateway is down"
          description: "API Gateway (port 8005) is unreachable. All external API access is affected."

  - name: slo-web-availability
    rules:
      - alert: SLOBurnRateCritical
        expr: |
          (
            sum(rate(http_requests_total{service="lazynext-web",status_code=~"5.."}[1h]))
            /
            sum(rate(http_requests_total{service="lazynext-web"}[1h]))
          ) > 0.02 * 14.4
        for: 2m
        labels:
          severity: critical
          slo: "99.9"
          service: web
        annotations:
          summary: "SLO burn rate > 14.4x for web availability"
          description: "Error budget burning at {{ $value | humanizePercentage }} per hour."

      - alert: SLOBurnRateWarning
        expr: |
          (
            sum(rate(http_requests_total{service="lazynext-web",status_code=~"5.."}[6h]))
            /
            sum(rate(http_requests_total{service="lazynext-web"}[6h]))
          ) > 0.02 * 6
        for: 10m
        labels:
          severity: warning
          slo: "99.9"
          service: web
        annotations:
          summary: "SLO burn rate > 6x for web availability"
