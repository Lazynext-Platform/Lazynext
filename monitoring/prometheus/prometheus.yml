global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/slos.yaml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "lazynext-web"
    static_configs:
      - targets: ["web:3000"]

  - job_name: "ai-agents"
    static_configs:
      - targets: ["ai-agents:8002"]

  - job_name: "render-service"
    static_configs:
      - targets: ["render-service:8003"]
