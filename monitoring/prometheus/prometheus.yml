global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'lazynext-api'
    static_configs:
      - targets: ['api-gateway:8005']
    metrics_path: '/metrics'

  - job_name: 'tensorflow-serving'
    static_configs:
      - targets: ['tensorflow-serving:8501']
    metrics_path: '/metrics'
