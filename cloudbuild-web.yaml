steps:
  - name: "rust:latest"
    id: "install-wasm-pack"
    entrypoint: sh
    args:
      - "-c"
      - |
        cargo install wasm-pack
        wasm-pack build --target web rust/wasm
  - name: "gcr.io/cloud-builders/docker"
    id: "build-web"
    waitFor: ["install-wasm-pack"]
    args:
      [
        "build",
        "-t",
        "us-central1-docker.pkg.dev/vertexaiopencode/lazynext/lazynext-web:fix2",
        "-f",
        "apps/web/Dockerfile",
        ".",
      ]
  - name: "gcr.io/cloud-builders/docker"
    id: "push-web"
    waitFor: ["build-web"]
    args:
      [
        "push",
        "us-central1-docker.pkg.dev/vertexaiopencode/lazynext/lazynext-web:fix2",
      ]
images:
  - "us-central1-docker.pkg.dev/vertexaiopencode/lazynext/lazynext-web:fix2"
options:
  machineType: 'E2_HIGHCPU_8'
