[package]
name = "lazynext-desktop"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "lazynext"
path = "src/main.rs"

[dependencies]
gpui = "0.2.2"
compositor = { path = "../../rust/crates/compositor" }
gpu = { path = "../../rust/crates/gpu" }
time = { path = "../../rust/crates/time" }
state = { path = "../../rust/crates/state" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
agent = { path = "../../rust/crates/agent" }

