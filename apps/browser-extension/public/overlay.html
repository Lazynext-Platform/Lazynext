<!DOCTYPE html>
<!--
  public/overlay.html — static capture-overlay page bundled as an extension
  web-accessible resource. Loaded into an iframe on the host page to render
  the Lazynext capture controls over detected videos.
-->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lazynext Capture Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; overflow: hidden; background: transparent; }
  #lazynext-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 2147483647; }
  #lazynext-overlay video { max-width: 100%; max-height: 100%; }
</style>
</head>
<body>
<div id="lazynext-overlay"></div>
<script type="module" src="/src/overlay.tsx"></script>
</body>
</html>
