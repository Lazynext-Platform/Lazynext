<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lazynext AI</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body class="bg-zinc-950 text-zinc-100 w-[380px] min-h-[500px]">
  <div id="app">
    <header class="flex items-center justify-between border-b border-zinc-800 px-4 py-3">
      <h1 class="text-sm font-bold bg-gradient-to-r from-violet-400 to-fuchsia-400 bg-clip-text text-transparent">
        Lazynext AI
      </h1>
      <span id="status" class="h-2 w-2 rounded-full bg-emerald-500" title="Connected"></span>
    </header>

    <nav class="flex border-b border-zinc-800">
      <button class="tab active flex-1 py-2 text-xs font-medium text-violet-400 border-b-2 border-violet-500" data-tab="record">
        🎬 Record
      </button>
      <button class="tab flex-1 py-2 text-xs font-medium text-zinc-500 hover:text-zinc-300" data-tab="ai">
        🤖 AI Prompt
      </button>
      <button class="tab flex-1 py-2 text-xs font-medium text-zinc-500 hover:text-zinc-300" data-tab="projects">
        📁 Projects
      </button>
    </nav>

    <main id="content" class="p-4">
      <!-- Record Tab -->
      <div id="tab-record" class="space-y-4">
        <div class="rounded-xl border border-zinc-800 bg-zinc-900/50 p-4 text-center">
          <div class="mb-3 text-4xl">🎥</div>
          <button id="btn-start-recording" class="w-full rounded-lg bg-violet-600 py-2.5 text-sm font-semibold text-white hover:bg-violet-500 transition-colors">
            Start Screen Recording
          </button>
          <p class="mt-2 text-xs text-zinc-500">Record your screen or browser tab</p>
        </div>
        <div class="rounded-xl border border-zinc-800 bg-zinc-900/50 p-4">
          <h3 class="mb-2 text-xs font-semibold text-zinc-400">Quick Actions</h3>
          <div class="grid grid-cols-2 gap-2">
            <button class="action-btn rounded-lg border border-zinc-700 bg-zinc-800 px-3 py-2 text-xs text-zinc-300 hover:bg-zinc-700 transition-colors" data-action="trim">✂️ Trim Clip</button>
            <button class="action-btn rounded-lg border border-zinc-700 bg-zinc-800 px-3 py-2 text-xs text-zinc-300 hover:bg-zinc-700 transition-colors" data-action="mute">🔇 Mute Audio</button>
            <button class="action-btn rounded-lg border border-zinc-700 bg-zinc-800 px-3 py-2 text-xs text-zinc-300 hover:bg-zinc-700 transition-colors" data-action="speed">⚡ Speed Up</button>
            <button class="action-btn rounded-lg border border-zinc-700 bg-zinc-800 px-3 py-2 text-xs text-zinc-300 hover:bg-zinc-700 transition-colors" data-action="export">📤 Export</button>
          </div>
        </div>
      </div>

      <!-- AI Tab -->
      <div id="tab-ai" class="hidden space-y-4">
        <div class="rounded-xl border border-zinc-800 bg-zinc-900/50 p-4">
          <textarea id="ai-prompt-input" rows="3" placeholder="Describe your edit...&#10;e.g., Cut silences, add cinematic color grade, boost audio"
            class="w-full rounded-lg border border-zinc-700 bg-zinc-800 px-3 py-2 text-sm text-white placeholder-zinc-500 outline-none focus:border-violet-500 resize-none"></textarea>
          <div class="mt-3 flex items-center gap-2">
            <select id="ai-model" class="rounded-lg border border-zinc-700 bg-zinc-800 px-2 py-1.5 text-xs text-zinc-300 outline-none">
              <option value="auto">Auto-detect</option>
              <option value="anthropic">Claude</option>
              <option value="openai">GPT-4o</option>
              <option value="gemini">Gemini</option>
              <option value="mistral">Mistral</option>
              <option value="deepseek">DeepSeek</option>
              <option value="groq">Groq</option>
              <option value="ollama">Local (Ollama)</option>
            </select>
            <button id="btn-send-prompt" class="flex-1 rounded-lg bg-violet-600 py-2 text-sm font-semibold text-white hover:bg-violet-500 transition-colors">
              Send to AI
            </button>
          </div>
        </div>
        <div id="ai-response" class="hidden rounded-xl border border-zinc-800 bg-zinc-900/50 p-4">
          <h3 class="mb-2 text-xs font-semibold text-zinc-400">AI Response</h3>
          <p id="ai-response-text" class="text-sm text-zinc-300"></p>
        </div>
      </div>

      <!-- Projects Tab -->
      <div id="tab-projects" class="hidden space-y-3">
        <button id="btn-open-editor" class="w-full rounded-lg bg-violet-600 py-2.5 text-sm font-semibold text-white hover:bg-violet-500 transition-colors">
          Open Full Editor
        </button>
        <div id="recent-projects" class="space-y-2">
          <p class="text-xs text-zinc-500 text-center py-4">No recent projects. Open the editor to get started.</p>
        </div>
      </div>
    </main>
  </div>
  <script src="popup.js"></script>
</body>
</html>
