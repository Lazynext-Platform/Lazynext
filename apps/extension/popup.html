<!DOCTYPE html>
<!--
  popup.html — Lazynext Capture extension popup UI
  Provides a simple interface to start/stop tab recording and stream
  capture to the Lazynext API Gateway for timeline ingestion.
-->
<html>
<head>
  <meta charset="utf-8">
  <title>Lazynext Capture</title>
  <style>
    :root, html.light {
      --bg-main: #fcfcfc;
      --bg-hover: rgba(0,0,0,0.03);
      --border: rgba(0,0,0,0.08);
      --text-primary: #09090b;
      --text-secondary: #71717a;
      --accent: #00d4df;
      --accent-hover: #00b3bc;
      color-scheme: light;
    }
    @media (prefers-color-scheme: dark) {
      :root:not(.light) {
        --bg-main: #121212;
        --bg-hover: rgba(255,255,255,0.05);
        --border: rgba(255,255,255,0.08);
        --text-primary: #ffffff;
        --text-secondary: #aaaaaa;
        --accent: #00d4df;
        --accent-hover: #00b3bc;
        color-scheme: dark;
      }
    }
    html.dark {
      --bg-main: #121212;
      --bg-hover: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.08);
      --text-primary: #ffffff;
      --text-secondary: #aaaaaa;
      --accent: #00d4df;
      --accent-hover: #00b3bc;
      color-scheme: dark;
    }
    body {
      width: 250px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 16px;
      background-color: var(--bg-main);
      color: var(--text-primary);
      margin: 0;
    }
    h2 {
      margin-top: 0;
      font-size: 18px;
      color: var(--accent);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .theme-btn {
      background: var(--bg-hover);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      text-transform: capitalize;
      width: auto;
    }
    p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 16px;
      margin-top: 0;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: var(--accent);
      color: var(--text-on-accent);
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: var(--accent-hover);
    }
    button:active {
      background-color: var(--accent-hover);
    }
    #status {
      margin-top: 12px;
      font-size: 12px;
      text-align: center;
      min-height: 16px;
    }
    .success {
      color: #00ffaa;
    }
    .error {
      color: #ff4444;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>Lazynext</h2>
    <button id="themeBtn" class="theme-btn">System</button>
  </div>
  <p>Record the current tab and send to Lazynext.</p>
  <button id="captureBtn">Start Recording</button>
  <button id="stopBtn" style="display: none; background-color: #ff4444; color: var(--text-primary);">Stop Recording</button>
  <div id="status"></div>
  
  <div id="publishSection" style="display: none; margin-top: 16px; border-top: 1px solid var(--border); padding-top: 16px;">
    <h2 style="font-size: 14px; margin-bottom: 8px;">Quick Share</h2>
    <div style="display: flex; gap: 8px; margin-bottom: 8px;">
      <button id="shareTiktokBtn" style="background: #000; color: #fff; font-size: 12px; padding: 6px;">TikTok</button>
      <button id="shareYoutubeBtn" style="background: #f00; color: #fff; font-size: 12px; padding: 6px;">YouTube</button>
      <button id="shareInstagramBtn" style="background: #e1306c; color: #fff; font-size: 12px; padding: 6px;">Instagram</button>
            <button id="shareFacebookBtn" style="background: #1877F2; color: #fff; font-size: 12px; padding: 6px;">Facebook</button>
      <button id="shareLinkedInBtn" style="background: #0A66C2; color: #fff; font-size: 12px; padding: 6px;">LinkedIn</button>
      <button id="sharePinterestBtn" style="background: #E60023; color: #fff; font-size: 12px; padding: 6px;">Pinterest</button>
      <button id="shareSnapchatBtn" style="background: #FFFC00; color: #fff; font-size: 12px; padding: 6px;">Snapchat</button>
      <button id="shareTwitchBtn" style="background: #9146FF; color: #fff; font-size: 12px; padding: 6px;">Twitch</button>
      <button id="shareVimeoBtn" style="background: #1AB7EA; color: #fff; font-size: 12px; padding: 6px;">Vimeo</button>
      <button id="shareThreadsBtn" style="background: #000000; color: #fff; font-size: 12px; padding: 6px;">Threads</button>
            <button id="shareRedditBtn" style="background: #FF4500; color: #fff; font-size: 12px; padding: 6px;">Reddit</button>
      <button id="shareDiscordBtn" style="background: #5865F2; color: #fff; font-size: 12px; padding: 6px;">Discord</button>
      <button id="shareBlueskyBtn" style="background: #0085FF; color: #fff; font-size: 12px; padding: 6px;">Bluesky</button>
      <button id="shareMastodonBtn" style="background: #6364FF; color: #fff; font-size: 12px; padding: 6px;">Mastodon</button>
            <button id="shareDailymotionBtn" style="background: #0064d2; color: #fff; font-size: 12px; padding: 6px;">Dailymotion</button>
      <button id="shareBilibiliBtn" style="background: #00a1d6; color: #fff; font-size: 12px; padding: 6px;">Bilibili</button>
      <button id="sharePatreonBtn" style="background: #FF424D; color: #fff; font-size: 12px; padding: 6px;">Patreon</button>
      <button id="shareMediumBtn" style="background: #000000; color: #fff; font-size: 12px; padding: 6px;">Medium</button>
      <button id="shareWhatsAppBtn" style="background: #25D366; color: #fff; font-size: 12px; padding: 6px;">WhatsApp</button>
      <button id="shareWeChatBtn" style="background: #07C160; color: #fff; font-size: 12px; padding: 6px;">WeChat</button>
      <button id="shareLineBtn" style="background: #00C300; color: #fff; font-size: 12px; padding: 6px;">Line</button>
      <button id="shareKwaiBtn" style="background: #FF7700; color: #fff; font-size: 12px; padding: 6px;">Kwai</button>
      <button id="shareTumblrBtn" style="background: #36465D; color: #fff; font-size: 12px; padding: 6px;">Tumblr</button>
      <button id="shareOnlyFansBtn" style="background: #00AFF0; color: #fff; font-size: 12px; padding: 6px;">OnlyFans</button>
            <button id="shareKickBtn" style="background: #53FC18; color: #fff; font-size: 12px; padding: 6px;">Kick</button>
      <button id="shareTruthSocialBtn" style="background: #5A1B88; color: #fff; font-size: 12px; padding: 6px;">Truth Social</button>
      <button id="shareVKontakteBtn" style="background: #0077FF; color: #fff; font-size: 12px; padding: 6px;">VKontakte</button>
      <button id="shareWeiboBtn" style="background: #E6162D; color: #fff; font-size: 12px; padding: 6px;">Weibo</button>
      <button id="shareKakaoTalkBtn" style="background: #FEE500; color: #fff; font-size: 12px; padding: 6px;">KakaoTalk</button>
      <button id="shareViberBtn" style="background: #7360F2; color: #fff; font-size: 12px; padding: 6px;">Viber</button>
      <button id="shareSignalBtn" style="background: #3A76F0; color: #fff; font-size: 12px; padding: 6px;">Signal</button>
      <button id="shareSlackBtn" style="background: #4A154B; color: #fff; font-size: 12px; padding: 6px;">Slack</button>
      <button id="shareSubstackBtn" style="background: #FF6719; color: #fff; font-size: 12px; padding: 6px;">Substack</button>
      <button id="shareGhostBtn" style="background: #15171A; color: #fff; font-size: 12px; padding: 6px;">Ghost</button>
      <button id="shareLocalsBtn" style="background: #E32A26; color: #fff; font-size: 12px; padding: 6px;">Locals</button>
      <button id="shareOdyseeBtn" style="background: #E21257; color: #fff; font-size: 12px; padding: 6px;">Odysee</button>
      <button id="shareBitChuteBtn" style="background: #E33C2D; color: #fff; font-size: 12px; padding: 6px;">BitChute</button>
      <button id="shareFlickrBtn" style="background: #FF0084; color: #fff; font-size: 12px; padding: 6px;">Flickr</button>
      <button id="shareMixcloudBtn" style="background: #5000ff; color: #fff; font-size: 12px; padding: 6px;">Mixcloud</button>
      <button id="shareDTubeBtn" style="background: #FF0000; color: #fff; font-size: 12px; padding: 6px;">DTube</button>
      <button id="shareTrovoBtn" style="background: #10D164; color: #fff; font-size: 12px; padding: 6px;">Trovo</button>
      <button id="shareXiguaBtn" style="background: #FF3355; color: #fff; font-size: 12px; padding: 6px;">Xigua</button>
      <button id="shareTelegramBtn" style="background: #0088cc; color: #fff; font-size: 12px; padding: 6px;">Telegram</button>
      <button id="shareRumbleBtn" style="background: #85C742; color: #fff; font-size: 12px; padding: 6px;">Rumble</button>
      <button id="shareTwitterBtn" style="background: #1da1f2; color: #fff; font-size: 12px; padding: 6px;">X (Twitter)</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
