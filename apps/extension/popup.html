<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Lazynext Capture</title>
  <style>
    body {
      width: 250px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 16px;
      background-color: #121212;
      color: #ffffff;
      margin: 0;
    }
    h2 {
      margin-top: 0;
      font-size: 18px;
      color: #00d4df;
    }
    p {
      font-size: 13px;
      color: #aaaaaa;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #00d4df;
      color: #000000;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #00e5f0;
    }
    button:active {
      background-color: #00b3bc;
    }
    #status {
      margin-top: 12px;
      font-size: 12px;
      text-align: center;
      min-height: 16px;
    }
    .success {
      color: #00ffaa;
    }
    .error {
      color: #ff4444;
    }
  </style>
</head>
<body>
  <h2>Lazynext</h2>
  <p>Record the current tab and send to Lazynext.</p>
  <button id="captureBtn">Start Recording</button>
  <button id="stopBtn" style="display: none; background-color: #ff4444; color: white;">Stop Recording</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
