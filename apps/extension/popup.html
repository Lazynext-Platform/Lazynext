<!DOCTYPE html>
<!--
  popup.html — Lazynext Capture extension popup UI
  Provides a simple interface to start/stop tab recording and stream
  capture to the Lazynext API Gateway for timeline ingestion.
-->
<html>
<head>
  <meta charset="utf-8">
  <title>Lazynext Capture</title>
  <style>
    :root {
      --bg-main: #fcfcfc;
      --text-primary: #09090b;
      --text-secondary: #71717a;
      --accent: #00d4df;
      --accent-hover: #00b3bc;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-main: #121212;
        --text-primary: #ffffff;
        --text-secondary: #aaaaaa;
        --accent: #00d4df;
        --accent-hover: #00b3bc;
      }
    }
    body {
      width: 250px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 16px;
      background-color: var(--bg-main);
      color: var(--text-primary);
      margin: 0;
    }
    h2 {
      margin-top: 0;
      font-size: 18px;
      color: var(--accent);
    }
    p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: var(--accent);
      color: #000000;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: var(--accent-hover);
    }
    button:active {
      background-color: var(--accent-hover);
    }
    #status {
      margin-top: 12px;
      font-size: 12px;
      text-align: center;
      min-height: 16px;
    }
    .success {
      color: #00ffaa;
    }
    .error {
      color: #ff4444;
    }
  </style>
</head>
<body>
  <h2>Lazynext</h2>
  <p>Record the current tab and send to Lazynext.</p>
  <button id="captureBtn">Start Recording</button>
  <button id="stopBtn" style="display: none; background-color: #ff4444; color: white;">Stop Recording</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
