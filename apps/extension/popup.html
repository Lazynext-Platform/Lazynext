<!DOCTYPE html>
<!--
  popup.html — Lazynext Capture extension popup UI
  Provides a simple interface to start/stop tab recording and stream
  capture to the Lazynext API Gateway for timeline ingestion.
-->
<html>
<head>
  <meta charset="utf-8">
  <title>Lazynext Capture</title>
  <style>
    :root, html.light {
      --bg-main: #fcfcfc;
      --bg-hover: rgba(0,0,0,0.03);
      --border: rgba(0,0,0,0.08);
      --text-primary: #09090b;
      --text-secondary: #71717a;
      --accent: #00d4df;
      --accent-hover: #00b3bc;
      color-scheme: light;
    }
    @media (prefers-color-scheme: dark) {
      :root:not(.light) {
        --bg-main: #121212;
        --bg-hover: rgba(255,255,255,0.05);
        --border: rgba(255,255,255,0.08);
        --text-primary: #ffffff;
        --text-secondary: #aaaaaa;
        --accent: #00d4df;
        --accent-hover: #00b3bc;
        color-scheme: dark;
      }
    }
    html.dark {
      --bg-main: #121212;
      --bg-hover: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.08);
      --text-primary: #ffffff;
      --text-secondary: #aaaaaa;
      --accent: #00d4df;
      --accent-hover: #00b3bc;
      color-scheme: dark;
    }
    body {
      width: 250px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 16px;
      background-color: var(--bg-main);
      color: var(--text-primary);
      margin: 0;
    }
    h2 {
      margin-top: 0;
      font-size: 18px;
      color: var(--accent);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .theme-btn {
      background: var(--bg-hover);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      text-transform: capitalize;
      width: auto;
    }
    p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 16px;
      margin-top: 0;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: var(--accent);
      color: var(--text-on-accent);
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: var(--accent-hover);
    }
    button:active {
      background-color: var(--accent-hover);
    }
    #status {
      margin-top: 12px;
      font-size: 12px;
      text-align: center;
      min-height: 16px;
    }
    .success {
      color: #00ffaa;
    }
    .error {
      color: #ff4444;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>Lazynext</h2>
    <button id="themeBtn" class="theme-btn">System</button>
  </div>
  <p>Record the current tab and send to Lazynext.</p>
  <button id="captureBtn">Start Recording</button>
  <button id="stopBtn" style="display: none; background-color: #ff4444; color: var(--text-primary);">Stop Recording</button>
  <div id="status"></div>
  
  <div id="publishSection" style="display: none; margin-top: 16px; border-top: 1px solid var(--border); padding-top: 16px;">
    <h2 style="font-size: 14px; margin-bottom: 8px;">Quick Share</h2>
    <div style="display: flex; gap: 8px; margin-bottom: 8px;">
      <button id="shareTiktokBtn" style="background: #000; color: #fff; font-size: 12px; padding: 6px;">TikTok</button>
      <button id="shareYoutubeBtn" style="background: #f00; color: #fff; font-size: 12px; padding: 6px;">YouTube</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
