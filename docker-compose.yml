version: '3.8'

services:
  # Next.js UI Shell
  lazynext-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SYNC_URL=ws://localhost:8002
      - NEXT_PUBLIC_RENDER_URL=http://localhost:8003
      - DATABASE_URL=postgres://postgres:password@postgres-db:5432/lazynext
      - BETTER_AUTH_SECRET=super_secret_docker_key_123
    depends_on:
      postgres-db:
        condition: service_started
      lazynext-api:
        condition: service_started
    restart: unless-stopped

  # Agentic REST API Gateway
  lazynext-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8005:8005"
    restart: unless-stopped

  # MCP Server (Agent Interface)
  lazynext-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    stdin_open: true
    tty: true
    restart: unless-stopped

  # WebRTC / CRDT Signaling Server
  lazynext-sync:
    build:
      context: .
      dockerfile: Dockerfile.sync
    ports:
      - "8002:8002"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  # FFmpeg Render Farm
  lazynext-render:
    build:
      context: .
      dockerfile: Dockerfile.render
    ports:
      - "8003:8003"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  # Database
  postgres-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lazynext
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
