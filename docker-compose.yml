
services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: lazynext
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: lazynext_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - STORAGE_PROVIDER=local
      - DATABASE_URL=postgresql://lazynext:password123@db:5432/lazynext_db
      - RENDER_SERVICE_URL=http://render-service:8003
      - GENERATIVE_STUDIO_URL=http://generative-studio:8001
      - PRE_PROCESSING_URL=http://pre-processing:8000
      - AI_AGENTS_URL=http://ai-agents:8002
    depends_on:
      - db
      - render-service
      - generative-studio
      - pre-processing
      - ai-agents

  render-service:
    build:
      context: ./services/render-service
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    environment:
      - NODE_ENV=production

  generative-studio:
    build:
      context: ./services/generative-studio
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1

  pre-processing:
    build:
      context: ./services/pre-processing
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1

  ai-agents:
    build:
      context: ./services/ai-agents
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - NODE_ENV=production

volumes:
  postgres_data:
