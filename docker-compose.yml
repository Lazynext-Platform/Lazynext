version: '3.8'

services:
  # Next.js UI Shell
  lazynext-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SYNC_URL=ws://localhost:8002
      - NEXT_PUBLIC_RENDER_URL=http://localhost:8003
      - DATABASE_URL=postgres://postgres:password@postgres-db:5432/lazynext
    depends_on:
      - postgres-db
    restart: unless-stopped

  # WebRTC / CRDT Signaling Server
  lazynext-sync:
    build:
      context: .
      dockerfile: Dockerfile.sync
    ports:
      - "8002:8002"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  # FFmpeg Render Farm
  lazynext-render:
    build:
      context: .
      dockerfile: Dockerfile.render
    ports:
      - "8003:8003"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  # Database
  postgres-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lazynext
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
