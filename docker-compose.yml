services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lazynext
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: lazynext_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lazynext-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lazynext -d lazynext_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - STORAGE_PROVIDER=local
      - DATABASE_URL=postgresql://lazynext:password123@db:5432/lazynext_db
      - RENDER_SERVICE_URL=http://render-service:8003
      - GENERATIVE_STUDIO_URL=http://generative-studio:8001
      - PRE_PROCESSING_URL=http://pre-processing:8000
      - AI_AGENTS_URL=http://ai-agents:8002
    depends_on:
      db:
        condition: service_healthy
      render-service:
        condition: service_started
      generative-studio:
        condition: service_started
      pre-processing:
        condition: service_started
      ai-agents:
        condition: service_started
    networks:
      - lazynext-network
    restart: unless-stopped

  render-service:
    build:
      context: ./services/render-service
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    environment:
      - NODE_ENV=production
    networks:
      - lazynext-network
    restart: unless-stopped

  generative-studio:
    build:
      context: ./services/generative-studio
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - lazynext-network
    restart: unless-stopped

  pre-processing:
    build:
      context: ./services/pre-processing
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - lazynext-network
    restart: unless-stopped

  ai-agents:
    build:
      context: ./services/ai-agents
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - NODE_ENV=production
    networks:
      - lazynext-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  lazynext-network:
    driver: bridge
