services:
  # ── Database ──────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lazynext
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: lazynext
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lazynext-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lazynext -d lazynext"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis (for Upstash rate limiting + session caching) ────────
  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - lazynext-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # ── Redis HTTP Proxy (Upstash-compatible REST interface) ──────
  redis-proxy:
    image: hiett/serverless-redis-http:latest
    restart: unless-stopped
    ports:
      - "8079:80"
    environment:
      SRH_MODE: env
      SRH_CONNECTION_STRING: redis://redis:6379
      SRH_TOKEN: mock_upstash_token
    networks:
      - lazynext-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Web App (Next.js Frontend + API) ──────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - STORAGE_PROVIDER=local
      - DATABASE_URL=postgresql://lazynext:password123@db:5432/lazynext
      - BETTER_AUTH_SECRET=local-dev-secret-change-in-production-64chars
      - BETTER_AUTH_URL=http://localhost:3000
      - UPSTASH_REDIS_REST_URL=http://redis-proxy:80
      - UPSTASH_REDIS_REST_TOKEN=mock_upstash_token
      - RENDER_SERVICE_URL=http://render-service:8003
      - GENERATIVE_STUDIO_URL=http://generative-studio:8001
      - PRE_PROCESSING_URL=http://pre-processing:8000
      - AI_AGENTS_URL=http://ai-agents:8002
      - NEXT_PUBLIC_SITE_URL=http://localhost:3000
      - NEXT_PUBLIC_PREPROCESSING_URL=http://localhost:8000
      - NEXT_PUBLIC_GENERATIVE_STUDIO_URL=http://localhost:8001
      - NEXT_PUBLIC_AI_AGENTS_URL=http://localhost:8002
      - NEXT_PUBLIC_RENDER_SERVICE_URL=http://localhost:8003
      - NEXT_PUBLIC_POSTHOG_KEY=phc_dev
      - NEXT_PUBLIC_POSTHOG_HOST=https://app.posthog.com
    depends_on:
      db:
        condition: service_healthy
      redis-proxy:
        condition: service_healthy
      render-service:
        condition: service_started
      generative-studio:
        condition: service_started
      pre-processing:
        condition: service_started
      ai-agents:
        condition: service_started
    networks:
      - lazynext-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── AI Agents (Chronos Copilot + WebSocket Sync) ──────────────
  ai-agents:
    build:
      context: ./services/ai-agents
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - NODE_ENV=production
      - PORT=8002
      - DATABASE_URL=postgresql://lazynext:password123@db:5432/lazynext
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lazynext-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8002/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Render Service (FFmpeg Render Farm) ───────────────────────
  render-service:
    build:
      context: ./services/render-service
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    environment:
      - NODE_ENV=production
      - PORT=8003
      - FFMPEG_PATH=/usr/bin/ffmpeg
      - FFPROBE_PATH=/usr/bin/ffprobe
      - MEDIA_BUCKET=${MEDIA_BUCKET:-lazynext-media-dev}
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-local}
    networks:
      - lazynext-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Pre-Processing (Python: Whisper, SAM2, NeRF) ──────────────
  pre-processing:
    build:
      context: ./services/pre-processing
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN:-}
      - MEDIA_BUCKET=${MEDIA_BUCKET:-lazynext-media-dev}
    networks:
      - lazynext-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        reservations:
          memory: 2G

  # ── Generative Studio (Python: Diffusion, Dubbing, Upscale) ───
  generative-studio:
    build:
      context: ./services/generative-studio
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - HF_HOME=/tmp/huggingface
      - TRANSFORMERS_CACHE=/tmp/huggingface
    networks:
      - lazynext-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        reservations:
          memory: 4G

  # ── Observability (Prometheus, Grafana, Loki, Alloy) ──────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-remote-write-receiver'
    networks:
      - lazynext-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./monitoring/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    networks:
      - lazynext-network
    restart: unless-stopped

  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - lazynext-network
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/config.yml:/etc/alertmanager/config.yml
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
    networks:
      - lazynext-network
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.0.0
    ports:
      - "12345:12345"
    volumes:
      - ./monitoring/alloy/config.alloy:/etc/alloy/config.alloy
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    networks:
      - lazynext-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  lazynext-network:
    driver: bridge
