# ── Lazynext Development Stack ──────────────────────────────────────
# Starts all core services: PostgreSQL, Redis, MinIO (S3-compatible),
# and optional TensorFlow Serving for ML inference.
# Use `docker compose up -d` for a full local development environment.
# ─────────────────────────────────────────────────────────────────────
services:
  # ── Database ──────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lazynext
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: lazynext
    ports:
      - "5434:5432"
    volumes:
      - /tmp/lazynext-pg-data:/var/lib/postgresql/data
    networks:
      - lazynext-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lazynext -d lazynext"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis (for Upstash rate limiting + session caching) ────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - lazynext-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # ── Redis HTTP Proxy (Upstash-compatible REST interface) ──────
  redis-proxy:
    image: hiett/serverless-redis-http:latest  # TODO: pin to specific version tag when available
    restart: unless-stopped
    ports:
      - "8079:80"
    environment:
      SRH_MODE: env
      SRH_CONNECTION_STRING: redis://redis:6379
      SRH_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-dev_token}
    networks:
      - lazynext-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── API Gateway (Rust) ──────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: rust/api-gateway/Dockerfile
    ports:
      - "8005:8005"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-lazynext}:${DB_PASSWORD:-changeme}@db:5432/lazynext
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-SET_BETTER_AUTH_SECRET_ENV_VAR}
      - DODO_WEBHOOK_SECRET=${DODO_WEBHOOK_SECRET:-dwhsec_placeholder}
      - LAZYNEXT_MCP_API_KEY=${LAZYNEXT_MCP_API_KEY:-SET_MCP_API_KEY_ENV_VAR}
      - API_GATEWAY_URL=${API_GATEWAY_URL:-http://localhost:8005}
      - REDIS_URL=redis://redis:6379/
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318/v1/traces
      - OTEL_SERVICE_NAME=api-gateway
      - SOCIAL_PUBLISH_URL=http://social-publish:8007
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lazynext-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8005/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Web App (Next.js Frontend + API) ──────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - STORAGE_PROVIDER=local
      - DATABASE_URL=postgresql://${DB_USER:-lazynext}:${DB_PASSWORD:-changeme}@db:5432/lazynext
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-SET_BETTER_AUTH_SECRET_ENV_VAR}
      - BETTER_AUTH_URL=http://localhost:3000
      - UPSTASH_REDIS_REST_URL=http://redis-proxy:80
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN:-dev_token}
      - RENDER_SERVICE_URL=http://render-service:8003
      - GENERATIVE_STUDIO_URL=http://generative-studio:8001
      - PRE_PROCESSING_URL=http://pre-processing:8000
      - AI_AGENTS_URL=http://ai-agents:8002
      - NEXT_PUBLIC_SITE_URL=http://localhost:3000
      - NEXT_PUBLIC_PREPROCESSING_URL=http://localhost:8000
      - NEXT_PUBLIC_GENERATIVE_STUDIO_URL=http://localhost:8001
      - NEXT_PUBLIC_AI_AGENTS_URL=http://localhost:8002
      - NEXT_PUBLIC_RENDER_SERVICE_URL=http://localhost:8003
      - NEXT_PUBLIC_SOCIAL_PUBLISH_URL=http://localhost:8007
      - NEXT_PUBLIC_POSTHOG_KEY=phc_dev
      - NEXT_PUBLIC_POSTHOG_HOST=https://app.posthog.com
      - DODO_API_KEY=${DODO_API_KEY:-dp_test_placeholder}
      - DODO_WEBHOOK_SECRET=${DODO_WEBHOOK_SECRET:-dwhsec_placeholder}
      - NEXT_PUBLIC_DODO_PRO_PRICE_ID=${NEXT_PUBLIC_DODO_PRO_PRICE_ID:-pro_monthly}
      - NEXT_PUBLIC_DODO_STUDIO_PRICE_ID=${NEXT_PUBLIC_DODO_STUDIO_PRICE_ID:-studio_monthly}
      - LAZYNEXT_WEBHOOK_URL=${LAZYNEXT_WEBHOOK_URL:-}
      - LAZYNEXT_MCP_API_KEY=${LAZYNEXT_MCP_API_KEY:-SET_MCP_API_KEY_ENV_VAR}
      - RESEND_API_KEY=${RESEND_API_KEY:-re_placeholder}
      - NEXT_PUBLIC_MARBLE_API_URL=${NEXT_PUBLIC_MARBLE_API_URL:-https://api.marblecms.com}
      - FREESOUND_CLIENT_ID=${FREESOUND_CLIENT_ID:-}
      - FREESOUND_API_KEY=${FREESOUND_API_KEY:-}
      - MARBLE_WORKSPACE_KEY=${MARBLE_WORKSPACE_KEY:-mock_marble_key}
      - AZURE_STORAGE_ACCOUNT=${AZURE_STORAGE_ACCOUNT:-lazynextmediadev}
    depends_on:
      db:
        condition: service_healthy
      redis-proxy:
        condition: service_healthy
      render-service:
        condition: service_started
      generative-studio:
        condition: service_started
      pre-processing:
        condition: service_started
      ai-agents:
        condition: service_started
      social-publish:
        condition: service_started
    networks:
      - lazynext-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── AI Agents (Lazynext AI Copilot + WebSocket Sync) ──────────────
  ai-agents:
    build:
      context: .
      dockerfile: services/ai-agents/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - NODE_ENV=production
      - PORT=8002
      - DATABASE_URL=postgresql://${DB_USER:-lazynext}:${DB_PASSWORD:-changeme}@db:5432/lazynext
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-lazynext-internal-dev-key}
      - GENERATIVE_STUDIO_URL=http://generative-studio:8001
      - PRE_PROCESSING_URL=http://pre-processing:8000
      - RENDER_SERVICE_URL=http://render-service:8003
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lazynext-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8002/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Render Service (FFmpeg Render Farm) ───────────────────────
  render-service:
    build:
      context: .
      dockerfile: services/render-service/Dockerfile
    ports:
      - "8003:8003"
    environment:
      - NODE_ENV=production
      - PORT=8003
      - FFMPEG_PATH=/usr/bin/ffmpeg
      - FFPROBE_PATH=/usr/bin/ffprobe
      - MEDIA_BUCKET=${MEDIA_BUCKET:-lazynext-media-dev}
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-local}
      - REDIS_URL=redis://redis:6379
    networks:
      - lazynext-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Collab Server (Native Rust CRDT Sync + WebRTC Signaling) ───
  collab-server:
    build:
      context: .
      dockerfile: services/collab-server/Dockerfile
    ports:
      - "8004:8004"
    environment:
      - COLLAB_PORT=8004
      - RUST_LOG=info
      - DATABASE_URL=postgresql://${DB_USER:-lazynext}:${DB_PASSWORD:-changeme}@db:5432/lazynext
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-SET_BETTER_AUTH_SECRET_ENV_VAR}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lazynext-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8004/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Pre-Processing (Python: Whisper, SAM2, NeRF) ──────────────
  pre-processing:
    build:
      context: .
      dockerfile: services/pre-processing/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - NUMBA_CACHE_DIR=/tmp
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - PYTHONUNBUFFERED=1
      - MEDIA_BUCKET=${MEDIA_BUCKET:-lazynext-media-dev}
    networks:
      - lazynext-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        reservations:
          memory: 2G

  # ── Generative Studio (Python: Diffusion, Dubbing, Upscale) ───
  generative-studio:
    build:
      context: .
      dockerfile: services/generative-studio/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONUNBUFFERED=1
      - HF_HOME=/tmp/huggingface
      - TRANSFORMERS_CACHE=/tmp/huggingface
    networks:
      - lazynext-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        reservations:
          memory: 4G

  # ── Analytics Service (Node.js/Kafka) ─────────────────────────
  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    ports:
      - "8006:8006"
    environment:
      - NODE_ENV=production
      - PORT=8006
      - DATABASE_URL=postgresql://${DB_USER:-lazynext}:${DB_PASSWORD:-changeme}@db:5432/lazynext
    networks:
      - lazynext-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8006/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Social Publish Service ──────────────────────────────────────
  social-publish:
    build:
      context: .
      dockerfile: services/social-publish/Dockerfile
    ports:
      - "8007:8007"
    environment:
      - NODE_ENV=production
      - PORT=8007
      - FFMPEG_PATH=/usr/bin/ffmpeg
      - FFPROBE_PATH=/usr/bin/ffprobe
      - TIKTOK_CLIENT_KEY=${TIKTOK_CLIENT_KEY:-}
      - TIKTOK_CLIENT_SECRET=${TIKTOK_CLIENT_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - INSTAGRAM_APP_ID=${INSTAGRAM_APP_ID:-}
      - INSTAGRAM_APP_SECRET=${INSTAGRAM_APP_SECRET:-}
      - TWITTER_CLIENT_ID=${TWITTER_CLIENT_ID:-}
      - TWITTER_CLIENT_SECRET=${TWITTER_CLIENT_SECRET:-}
      - INSTAGRAM_USER_ID=${INSTAGRAM_USER_ID:-}
    networks:
      - lazynext-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8007/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Observability (Prometheus, Grafana, Loki, Alloy) ──────────
  prometheus:
    image: prom/prometheus:v3.3.1
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-remote-write-receiver'
    networks:
      - lazynext-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.1
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./monitoring/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    networks:
      - lazynext-network
    restart: unless-stopped

  loki:
    image: grafana/loki:3.7.2
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yaml:/etc/loki/local-config.yaml
      - ./monitoring/loki/rules.yml:/loki/rules/rules.yml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - lazynext-network
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.28.1
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/config.yml:/etc/alertmanager/config.yml
    environment:
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-https://hooks.slack.com/services/disabled}
      - SLACK_WEBHOOK_URL_WARNING=${SLACK_WEBHOOK_URL_WARNING:-https://hooks.slack.com/services/disabled}
      - CUSTOM_WEBHOOK_URL=${CUSTOM_WEBHOOK_URL:-https://webhook.site/disabled}
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
    networks:
      - lazynext-network
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.17.0
    ports:
      - "12345:12345"
    volumes:
      - ./monitoring/alloy/config.alloy:/etc/alloy/config.alloy
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    networks:
      - lazynext-network
    restart: unless-stopped

  # ── Tempo — Distributed Tracing Backend ─────────────────────────
  tempo:
    image: grafana/tempo:2.6.1
    user: root
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./monitoring/tempo/tempo-config.yaml:/etc/tempo/tempo-config.yaml
      - tempo_data:/tmp/tempo
    command: -config.file=/etc/tempo/tempo-config.yaml
    networks:
      - lazynext-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3200/ready"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:

networks:
  lazynext-network:
    driver: bridge