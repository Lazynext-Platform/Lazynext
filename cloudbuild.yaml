# Cloud Build — GCP CI/CD Pipeline for Lazynext
# Triggers on pushes to main, builds all Docker images and deploys to Cloud Run.

steps:
  # ── Install Rust + wasm-pack for WASM build ──
  - name: "rust:latest"
    id: "install-wasm-pack"
    entrypoint: sh
    args:
      - "-c"
      - |
        cargo install wasm-pack
        wasm-pack build --target web rust/wasm

  # ── Build Docker Images ──

  - name: "gcr.io/cloud-builders/docker"
    id: "build-web"
    waitFor: ["install-wasm-pack"]
    args:
      [
        "build",
        "-t",
        "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-web:${SHORT_SHA}",
        "-t",
        "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-web:latest",
        "-f",
        "apps/web/Dockerfile",
        ".",
      ]

  - name: "gcr.io/cloud-builders/docker"
    id: "build-ai-agents"
    args:
      [
        "build",
        "-t",
        "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-ai-agents:${SHORT_SHA}",
        "-t",
        "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-ai-agents:latest",
        "-f",
        "services/ai-agents/Dockerfile",
        "./services/ai-agents",
      ]

  - name: "gcr.io/cloud-builders/docker"
    id: "build-render-service"
    args:
      [
        "build",
        "-t",
        "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-render-service:${SHORT_SHA}",
        "-t",
        "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-render-service:latest",
        "-f",
        "services/render-service/Dockerfile",
        "./services/render-service",
      ]

  - name: "gcr.io/cloud-builders/docker"
    id: "build-pre-processing"
    args:
      [
        "build",
        "-t",
        "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-pre-processing:${SHORT_SHA}",
        "-t",
        "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-pre-processing:latest",
        "-f",
        "services/pre-processing/Dockerfile",
        "./services/pre-processing",
      ]

  - name: "gcr.io/cloud-builders/docker"
    id: "build-generative-studio"
    args:
      [
        "build",
        "-t",
        "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-generative-studio:${SHORT_SHA}",
        "-t",
        "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-generative-studio:latest",
        "-f",
        "services/generative-studio/Dockerfile",
        "./services/generative-studio",
      ]

  # ── Push Images ──

  - name: "gcr.io/cloud-builders/docker"
    id: "push-web"
    waitFor: ["build-web"]
    args:
      ["push", "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-web:${SHORT_SHA}"]

  - name: "gcr.io/cloud-builders/docker"
    id: "push-web-latest"
    waitFor: ["push-web"]
    args:
      ["push", "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-web:latest"]

  - name: "gcr.io/cloud-builders/docker"
    id: "push-ai-agents"
    waitFor: ["build-ai-agents"]
    args:
      ["push", "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-ai-agents:${SHORT_SHA}"]

  - name: "gcr.io/cloud-builders/docker"
    id: "push-ai-agents-latest"
    waitFor: ["push-ai-agents"]
    args:
      ["push", "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-ai-agents:latest"]

  - name: "gcr.io/cloud-builders/docker"
    id: "push-render-service"
    waitFor: ["build-render-service"]
    args:
      ["push", "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-render-service:${SHORT_SHA}"]

  - name: "gcr.io/cloud-builders/docker"
    id: "push-render-service-latest"
    waitFor: ["push-render-service"]
    args:
      ["push", "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-render-service:latest"]

  - name: "gcr.io/cloud-builders/docker"
    id: "push-pre-processing"
    waitFor: ["build-pre-processing"]
    args:
      ["push", "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-pre-processing:${SHORT_SHA}"]

  - name: "gcr.io/cloud-builders/docker"
    id: "push-pre-processing-latest"
    waitFor: ["push-pre-processing"]
    args:
      ["push", "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-pre-processing:latest"]

  - name: "gcr.io/cloud-builders/docker"
    id: "push-generative-studio"
    waitFor: ["build-generative-studio"]
    args:
      ["push", "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-generative-studio:${SHORT_SHA}"]

  - name: "gcr.io/cloud-builders/docker"
    id: "push-generative-studio-latest"
    waitFor: ["push-generative-studio"]
    args:
      ["push", "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-generative-studio:latest"]

  # ── Run Database Migrations ──

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "db-migrate"
    waitFor: ["push-web"]
    entrypoint: sh
    args:
      - "-c"
      - |
        gcloud run jobs create lazynext-db-migrate-${SHORT_SHA} \
          --image us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-web:${SHORT_SHA} \
          --region us-central1 \
          --command "bun" \
          --args "run,apps/web/migrate.ts" \
          --set-secrets DATABASE_URL=DATABASE_URL:latest \
          --service-account ${PROJECT_NUMBER}-compute@developer.gserviceaccount.com \
          --vpc-connector lazynext-vpc-connector-${_ENVIRONMENT} \
          --region us-central1 || true

        gcloud run jobs execute lazynext-db-migrate-${SHORT_SHA} --region us-central1 --wait
    secretEnv: ["DATABASE_URL"]

  # ── Deploy to Cloud Run ──

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-web"
    waitFor: ["db-migrate"]
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "lazynext-web-${_ENVIRONMENT}"
      - "--image"
      - "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-web:${SHORT_SHA}"
      - "--region"
      - "us-central1"
      - "--cpu"
      - "2"
      - "--memory"
      - "2Gi"
      - "--timeout"
      - "300"
      - "--concurrency"
      - "80"
      - "--vpc-connector"
      - "lazynext-vpc-connector-${_ENVIRONMENT}"
      - "--service-account"
      - "${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
      - "--allow-unauthenticated"
      - "--set-secrets"
      - "DATABASE_URL=DATABASE_URL:latest,BETTER_AUTH_SECRET=BETTER_AUTH_SECRET:latest"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-ai-agents"
    waitFor: ["push-ai-agents"]
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "lazynext-ai-agents-${_ENVIRONMENT}"
      - "--image"
      - "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-ai-agents:${SHORT_SHA}"
      - "--region"
      - "us-central1"
      - "--cpu"
      - "2"
      - "--memory"
      - "2Gi"
      - "--timeout"
      - "300"
      - "--service-account"
      - "${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
      - "--no-allow-unauthenticated"
      - "--set-secrets"
      - "OPENAI_API_KEY=OPENAI_API_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-render-service"
    waitFor: ["push-render-service"]
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "lazynext-render-${_ENVIRONMENT}"
      - "--image"
      - "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-render-service:${SHORT_SHA}"
      - "--region"
      - "us-central1"
      - "--cpu"
      - "4"
      - "--memory"
      - "8Gi"
      - "--timeout"
      - "900"
      - "--service-account"
      - "${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
      - "--no-allow-unauthenticated"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-pre-processing"
    waitFor: ["push-pre-processing"]
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "lazynext-pre-processing-${_ENVIRONMENT}"
      - "--image"
      - "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-pre-processing:${SHORT_SHA}"
      - "--region"
      - "us-central1"
      - "--cpu"
      - "4"
      - "--memory"
      - "8Gi"
      - "--timeout"
      - "900"
      - "--service-account"
      - "${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
      - "--no-allow-unauthenticated"
      - "--set-secrets"
      - "OPENAI_API_KEY=OPENAI_API_KEY:latest"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-generative-studio"
    waitFor: ["push-generative-studio"]
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "lazynext-gen-studio-${_ENVIRONMENT}"
      - "--image"
      - "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-generative-studio:${SHORT_SHA}"
      - "--region"
      - "us-central1"
      - "--cpu"
      - "4"
      - "--memory"
      - "8Gi"
      - "--timeout"
      - "900"
      - "--service-account"
      - "${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
      - "--no-allow-unauthenticated"
      - "--set-secrets"
      - "REPLICATE_API_TOKEN=REPLICATE_API_TOKEN:latest,ELEVENLABS_API_KEY=ELEVENLABS_API_KEY:latest"

images:
  - "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-web:${SHORT_SHA}"
  - "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-web:latest"
  - "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-ai-agents:${SHORT_SHA}"
  - "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-ai-agents:latest"
  - "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-render-service:${SHORT_SHA}"
  - "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-render-service:latest"
  - "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-pre-processing:${SHORT_SHA}"
  - "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-pre-processing:latest"
  - "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-generative-studio:${SHORT_SHA}"
  - "us-central1-docker.pkg.dev/${PROJECT_ID}/lazynext/lazynext-generative-studio:latest"

substitutions:
  _ENVIRONMENT: dev

timeout: "3600s"
options:
  machineType: "E2_HIGHCPU_8"
  logging: "CLOUD_LOGGING_ONLY"

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/DATABASE_URL/versions/latest
      env: "DATABASE_URL"
