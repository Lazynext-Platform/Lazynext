# Cloud Build — GCP CI/CD Pipeline for Lazynext
# Triggers on pushes to main, builds all Docker images and deploys to Cloud Run.

steps:
  # ── Install wasm-pack for WASM build ──
  - name: "rust:latest"
    id: "install-wasm-pack"
    entrypoint: sh
    args:
      - "-c"
      - |
        curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
        wasm-pack build --target web rust/wasm

  # ── Build Docker Images ──

  - name: "gcr.io/cloud-builders/docker"
    id: "build-web"
    waitFor: ["install-wasm-pack"]
    args: ["build", "-t", "us-central1-docker.pkg.dev/${_PROJECT_ID}/lazynext/lazynext-web:latest", "-f", "apps/web/Dockerfile", "."]

  - name: "gcr.io/cloud-builders/docker"
    id: "build-ai-agents"
    args: ["build", "-t", "us-central1-docker.pkg.dev/${_PROJECT_ID}/lazynext/lazynext-ai-agents:latest", "-f", "services/ai-agents/Dockerfile", "./services/ai-agents"]

  - name: "gcr.io/cloud-builders/docker"
    id: "build-render-service"
    args: ["build", "-t", "us-central1-docker.pkg.dev/${_PROJECT_ID}/lazynext/lazynext-render-service:latest", "-f", "services/render-service/Dockerfile", "./services/render-service"]

  - name: "gcr.io/cloud-builders/docker"
    id: "build-pre-processing"
    args: ["build", "-t", "us-central1-docker.pkg.dev/${_PROJECT_ID}/lazynext/lazynext-pre-processing:latest", "-f", "services/pre-processing/Dockerfile", "./services/pre-processing"]

  - name: "gcr.io/cloud-builders/docker"
    id: "build-generative-studio"
    args: ["build", "-t", "us-central1-docker.pkg.dev/${_PROJECT_ID}/lazynext/lazynext-generative-studio:latest", "-f", "services/generative-studio/Dockerfile", "./services/generative-studio"]

  - name: "gcr.io/cloud-builders/docker"
    id: "build-analytics-service"
    args: ["build", "-t", "us-central1-docker.pkg.dev/${_PROJECT_ID}/lazynext/lazynext-analytics-service:latest", "-f", "services/analytics-service/Dockerfile", "./services/analytics-service"]

  # ── Push Images ──

  - name: "gcr.io/cloud-builders/docker"
    id: "push-all"
    waitFor: ["build-web","build-ai-agents","build-render-service","build-pre-processing","build-generative-studio","build-analytics-service"]
    entrypoint: sh
    args:
      - "-c"
      - |
        for img in lazynext-web lazynext-ai-agents lazynext-render-service lazynext-pre-processing lazynext-generative-studio lazynext-analytics-service; do
          docker push "us-central1-docker.pkg.dev/${_PROJECT_ID}/lazynext/$img:latest"
        done

  # ── Deploy to Cloud Run ──

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-all"
    waitFor: ["push-all"]
    entrypoint: sh
    args:
      - "-c"
      - |
        set -e
        for svc_img in \
          "lazynext-web-${_ENVIRONMENT}:lazynext-web" \
          "lazynext-ai-agents-${_ENVIRONMENT}:lazynext-ai-agents" \
          "lazynext-render-${_ENVIRONMENT}:lazynext-render-service" \
          "lazynext-pre-processing-${_ENVIRONMENT}:lazynext-pre-processing" \
          "lazynext-gen-studio-${_ENVIRONMENT}:lazynext-generative-studio" \
          "lazynext-analytics-${_ENVIRONMENT}:lazynext-analytics-service"
        do
          svc="$${svc_img%%:*}"
          img="$${svc_img##*:}"
          echo "Deploying $svc..."
          gcloud run deploy "$svc" \
            --image "us-central1-docker.pkg.dev/${_PROJECT_ID}/lazynext/$img:latest" \
            --region us-central1 \
            --allow-unauthenticated \
            --quiet || echo "WARNING: $svc deploy skipped (may need --no-deletion-protection first)"
        done
        echo "All services deployed."

images:
  - "us-central1-docker.pkg.dev/${_PROJECT_ID}/lazynext/lazynext-web:latest"
  - "us-central1-docker.pkg.dev/${_PROJECT_ID}/lazynext/lazynext-ai-agents:latest"
  - "us-central1-docker.pkg.dev/${_PROJECT_ID}/lazynext/lazynext-render-service:latest"
  - "us-central1-docker.pkg.dev/${_PROJECT_ID}/lazynext/lazynext-pre-processing:latest"
  - "us-central1-docker.pkg.dev/${_PROJECT_ID}/lazynext/lazynext-generative-studio:latest"
  - "us-central1-docker.pkg.dev/${_PROJECT_ID}/lazynext/lazynext-analytics-service:latest"

substitutions:
  _ENVIRONMENT: dev
  _PROJECT_ID: vertexaiopencode

timeout: "3600s"
options:
  machineType: "E2_HIGHCPU_8"
  logging: "CLOUD_LOGGING_ONLY"
