steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-central1-docker.pkg.dev/vertexaiopencode/cloud-run-source-deploy/lazynext-web', '.']
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - 'run'
  - 'deploy'
  - 'lazynext-web'
  - '--image'
  - 'us-central1-docker.pkg.dev/vertexaiopencode/cloud-run-source-deploy/lazynext-web:latest'
  - '--region'
  - 'us-central1'
images:
- 'us-central1-docker.pkg.dev/vertexaiopencode/cloud-run-source-deploy/lazynext-web'
timeout: '1800s'
options:
  machineType: 'E2_HIGHCPU_8'
