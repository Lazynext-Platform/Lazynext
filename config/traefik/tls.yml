# ── Traefik TLS Configuration ──────────────────────────────────────
# Mounted at /etc/traefik/tls.yml
#
# Production: Uses Let's Encrypt via Cloudflare DNS-01 challenge.
#   Certificates stored in /letsencrypt/acme.json automatically.
#
# Development: Generate self-signed certs:
#   mkdir -p /etc/traefik/certs
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout /etc/traefik/certs/lazynext.com.key \
#     -out /etc/traefik/certs/lazynext.com.crt \
#     -subj "/CN=*.lazynext.local"
#
# Azure Application Gateway:
#   Upload PFX to Key Vault, reference in waf.tf ssl_certificate block.
#   See infra/terraform/waf.tf for the commented HTTPS listener config.

tls:
  stores:
    default:
      defaultCertificate:
        certFile: /etc/traefik/certs/lazynext.com.crt
        keyFile: /etc/traefik/certs/lazynext.com.key

  certificates:
    - certFile: /etc/traefik/certs/lazynext.com.crt
      keyFile: /etc/traefik/certs/lazynext.com.key
      stores:
        - default
