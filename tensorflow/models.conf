# TensorFlow Serving — model configuration for Lazynext AI pipelines
#
# Models served:
#   - whisper:  Speech-to-text transcription (OpenAI Whisper large-v3)
#   - sam2:     Segment Anything Model v2 (object segmentation/masking)
#   - rife:     Real-Time Intermediate Flow Estimation (AI frame interpolation)
#   - esrgan:   Enhanced Super-Resolution GAN (AI upscaling)
#
# Usage:
#   docker compose -f docker-compose.tensorflow.yml up -d
#   or deploy via K8s model-warmup.yaml init container

model_config_list {
  config {
    name: "whisper"
    base_path: "/models/whisper"
    model_platform: "tensorflow"
    model_version_policy { all {} }
  }
  config {
    name: "sam2"
    base_path: "/models/sam2"
    model_platform: "tensorflow"
    model_version_policy { all {} }
  }
  config {
    name: "rife"
    base_path: "/models/rife"
    model_platform: "tensorflow"
    model_version_policy { all {} }
  }
  config {
    name: "esrgan"
    base_path: "/models/esrgan"
    model_platform: "tensorflow"
    model_version_policy { all {} }
  }
}
