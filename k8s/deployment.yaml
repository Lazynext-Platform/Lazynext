apiVersion: v1
kind: Namespace
metadata:
  name: lazynext
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lazynext-web
  namespace: lazynext
spec:
  replicas: 3
  selector:
    matchLabels:
      app: lazynext-web
  template:
    metadata:
      labels:
        app: lazynext-web
    spec:
      containers:
      - name: lazynext-web
        image: lazynext/web:latest
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: lazynext-web-service
  namespace: lazynext
spec:
  type: LoadBalancer
  selector:
    app: lazynext-web
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lazynext-gpu-worker
  namespace: lazynext
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lazynext-gpu-worker
  template:
    metadata:
      labels:
        app: lazynext-gpu-worker
    spec:
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: lazynext-gpu-worker
        image: lazynext/generative-studio:latest
        ports:
        - containerPort: 8081
        resources:
          requests:
            nvidia.com/gpu: 1
          limits:
            nvidia.com/gpu: 1
---
apiVersion: v1
kind: Service
metadata:
  name: lazynext-gpu-service
  namespace: lazynext
spec:
  type: ClusterIP
  selector:
    app: lazynext-gpu-worker
  ports:
  - protocol: TCP
    port: 8081
    targetPort: 8081
