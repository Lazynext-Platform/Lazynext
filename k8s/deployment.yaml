apiVersion: v1
kind: Namespace
metadata:
  name: lazynext
---
# Secrets
apiVersion: v1
kind: Secret
metadata:
  name: lazynext-secrets
  namespace: lazynext
type: Opaque
stringData:
  POSTGRES_PASSWORD: "password"
  BETTER_AUTH_SECRET: "super_secret_kubernetes_key_123"
  UPSTASH_REDIS_REST_TOKEN: "kubernetes_local_mock_token"
  MARBLE_WORKSPACE_KEY: "mock_marble_key"
  FREESOUND_CLIENT_ID: "mock_freesound_client"
  FREESOUND_API_KEY: "mock_freesound_key"
---
# Database (PostgreSQL StatefulSet)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-db
  namespace: lazynext
spec:
  serviceName: "postgres-db-service"
  replicas: 1
  selector:
    matchLabels:
      app: postgres-db
  template:
    metadata:
      labels:
        app: postgres-db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_DB
              value: "lazynext"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lazynext-secrets
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-db
  namespace: lazynext
spec:
  type: ClusterIP
  selector:
    app: postgres-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
---
# Redis
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-db
  namespace: lazynext
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-db
  template:
    metadata:
      labels:
        app: redis-db
    spec:
      containers:
        - name: redis
          image: redis:alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis-db
  namespace: lazynext
spec:
  type: ClusterIP
  selector:
    app: redis-db
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
---
# Redis Upstash HTTP Proxy
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-proxy
  namespace: lazynext
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-proxy
  template:
    metadata:
      labels:
        app: redis-proxy
    spec:
      containers:
        - name: redis-proxy
          image: hiett/serverless-redis-http:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          env:
            - name: SRH_MODE
              value: "env"
            - name: SRH_CONNECTION_STRING
              value: "redis://redis-db:6379"
            - name: SRH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: lazynext-secrets
                  key: UPSTASH_REDIS_REST_TOKEN
---
apiVersion: v1
kind: Service
metadata:
  name: redis-proxy
  namespace: lazynext
spec:
  type: ClusterIP
  selector:
    app: redis-proxy
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
# Web Frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lazynext-web
  namespace: lazynext
spec:
  replicas: 3
  selector:
    matchLabels:
      app: lazynext-web
  template:
    metadata:
      labels:
        app: lazynext-web
    spec:
      containers:
        - name: lazynext-web
          image: ghcr.io/lazynext-platform/lazynext-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXT_PUBLIC_SYNC_URL
              value: "ws://lazynext-sync:8002"
            - name: NEXT_PUBLIC_RENDER_URL
              value: "http://lazynext-render:8003"
            - name: UPSTASH_REDIS_REST_URL
              value: "http://redis-proxy:80"
            - name: DATABASE_URL
              value: "postgres://postgres:password@postgres-db:5432/lazynext"
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: lazynext-secrets
                  key: BETTER_AUTH_SECRET
            - name: UPSTASH_REDIS_REST_TOKEN
              valueFrom:
                secretKeyRef:
                  name: lazynext-secrets
                  key: UPSTASH_REDIS_REST_TOKEN
            - name: MARBLE_WORKSPACE_KEY
              valueFrom:
                secretKeyRef:
                  name: lazynext-secrets
                  key: MARBLE_WORKSPACE_KEY
            - name: FREESOUND_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: lazynext-secrets
                  key: FREESOUND_CLIENT_ID
            - name: FREESOUND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lazynext-secrets
                  key: FREESOUND_API_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: lazynext-web
  namespace: lazynext
spec:
  type: LoadBalancer
  selector:
    app: lazynext-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
# API Gateway
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lazynext-api
  namespace: lazynext
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lazynext-api
  template:
    metadata:
      labels:
        app: lazynext-api
    spec:
      containers:
        - name: lazynext-api
          image: ghcr.io/lazynext-platform/lazynext-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8005
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            tcpSocket:
              port: 8005
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 8005
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: lazynext-api
  namespace: lazynext
spec:
  type: LoadBalancer
  selector:
    app: lazynext-api
  ports:
    - protocol: TCP
      port: 8005
      targetPort: 8005
---
# Sync Service (AI Agents)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lazynext-sync
  namespace: lazynext
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lazynext-sync
  template:
    metadata:
      labels:
        app: lazynext-sync
    spec:
      containers:
        - name: lazynext-sync
          image: ghcr.io/lazynext-platform/lazynext-ai-agents:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8002
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 5
          env:
            - name: NODE_ENV
              value: "production"
---
apiVersion: v1
kind: Service
metadata:
  name: lazynext-sync
  namespace: lazynext
spec:
  type: ClusterIP
  selector:
    app: lazynext-sync
  ports:
    - protocol: TCP
      port: 8002
      targetPort: 8002
---
# Render Farm
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lazynext-render
  namespace: lazynext
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lazynext-render
  template:
    metadata:
      labels:
        app: lazynext-render
    spec:
      containers:
        - name: lazynext-render
          image: ghcr.io/lazynext-platform/lazynext-render-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8003
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "4"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 5
          env:
            - name: NODE_ENV
              value: "production"
---
apiVersion: v1
kind: Service
metadata:
  name: lazynext-render
  namespace: lazynext
spec:
  type: ClusterIP
  selector:
    app: lazynext-render
  ports:
    - protocol: TCP
      port: 8003
      targetPort: 8003
---
# MCP Agent
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lazynext-mcp
  namespace: lazynext
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lazynext-mcp
  template:
    metadata:
      labels:
        app: lazynext-mcp
    spec:
      containers:
        - name: lazynext-mcp
          image: ghcr.io/lazynext-platform/lazynext-mcp:latest
          imagePullPolicy: IfNotPresent
          stdin: true
          tty: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
# Python Pre-Processing
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lazynext-pre-processing
  namespace: lazynext
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lazynext-pre-processing
  template:
    metadata:
      labels:
        app: lazynext-pre-processing
    spec:
      containers:
        - name: lazynext-pre-processing
          image: ghcr.io/lazynext-platform/lazynext-pre-processing:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: lazynext-pre-processing
  namespace: lazynext
spec:
  type: ClusterIP
  selector:
    app: lazynext-pre-processing
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
---
# Python Generative Studio
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lazynext-generative-studio
  namespace: lazynext
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lazynext-generative-studio
  template:
    metadata:
      labels:
        app: lazynext-generative-studio
    spec:
      containers:
        - name: lazynext-generative-studio
          image: ghcr.io/lazynext-platform/lazynext-generative-studio:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: lazynext-generative-studio
  namespace: lazynext
spec:
  type: ClusterIP
  selector:
    app: lazynext-generative-studio
  ports:
    - protocol: TCP
      port: 8001
      targetPort: 8001
---
# Database Migration Job
apiVersion: batch/v1
kind: Job
metadata:
  name: lazynext-db-migrate-job
  namespace: lazynext
spec:
  backoffLimit: 4
  template:
    metadata:
      name: lazynext-db-migrate-job
    spec:
      restartPolicy: Never
      containers:
        - name: db-migrate
          image: ghcr.io/lazynext-platform/lazynext-db-migrate:latest
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          env:
            - name: DATABASE_URL
              value: "postgres://postgres:password@postgres-db:5432/lazynext"
