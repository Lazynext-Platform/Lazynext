    spec:
      containers:
      - name: lazynext-generative-studio
        image: lazynext-lazynext-generative-studio:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: lazynext-generative-studio
  namespace: lazynext
spec:
  type: ClusterIP
