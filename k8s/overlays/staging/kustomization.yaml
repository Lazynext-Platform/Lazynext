# ── Staging Overlay Kustomization ────────────────────────────────────────
# Patches the base k8s manifests with staging config: moderate replicas,
# staging DB endpoints, staging certificates, and feature flags.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: lazynext-staging

resources:
  - ../../base

labels:
  - pairs:
      environment: staging

patches:
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: lazynext-web
      spec:
        replicas: 2
    target:
      kind: Deployment
      name: lazynext-web
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: lazynext-sync
      spec:
        replicas: 1
    target:
      kind: Deployment
      name: lazynext-sync
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: lazynext-render
      spec:
        replicas: 1
    target:
      kind: Deployment
      name: lazynext-render
  - patch: |
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: lazynext-web-hpa
      spec:
        minReplicas: 1
        maxReplicas: 5
    target:
      kind: HorizontalPodAutoscaler
      name: lazynext-web-hpa

images:
  - name: ghcr.io/lazynext-platform/lazynext-web
    newTag: staging
  - name: ghcr.io/lazynext-platform/lazynext-ai-agents
    newTag: staging
  - name: ghcr.io/lazynext-platform/lazynext-render-service
    newTag: staging
  - name: ghcr.io/lazynext-platform/lazynext-pre-processing
    newTag: staging
  - name: ghcr.io/lazynext-platform/lazynext-generative-studio
    newTag: staging
  - name: ghcr.io/lazynext-platform/lazynext-mcp
    newTag: staging
  - name: ghcr.io/lazynext-platform/lazynext-analytics-service
    newTag: staging
  - name: ghcr.io/lazynext-platform/lazynext-collab-server
    newTag: staging
