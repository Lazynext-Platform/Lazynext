# ───────────────────────────────────────────────────────────────────
# VPA requires: helm install vpa fairwinds/vpa --namespace vpa
#
# Uncomment and apply after VPA is installed to get automatic resource
# recommendations. VPA runs in "Off" mode (recommendation only) by
# default — it does NOT evict pods in production.
#
# ---
# apiVersion: autoscaling.k8s.io/v1
# kind: VerticalPodAutoscaler
# metadata:
#   name: lazynext-web-vpa
#   namespace: lazynext
#   labels:
#     app.kubernetes.io/part-of: lazynext
#     app.kubernetes.io/component: autoscaling
#     environment: production
# spec:
#   targetRef:
#     apiVersion: apps/v1
#     kind: Deployment
#     name: lazynext-web
#   updatePolicy:
#     updateMode: "Off"  # Recommendations only — change to "Auto" after review
#   resourcePolicy:
#     containerPolicies:
#       - containerName: lazynext-web
#         minAllowed:
#           cpu: "250m"
#           memory: "256Mi"
#         maxAllowed:
#           cpu: "8"
#           memory: "16Gi"
#         controlledResources: ["cpu", "memory"]
# ───────────────────────────────────────────────────────────────────
