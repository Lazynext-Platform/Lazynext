---
# HorizontalPodAutoscaler — Web App
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lazynext-web-hpa
  namespace: lazynext
  labels:
    app: lazynext-web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lazynext-web
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
---
# HorizontalPodAutoscaler — Sync Service
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lazynext-sync-hpa
  namespace: lazynext
  labels:
    app: lazynext-sync
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lazynext-sync
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
# HorizontalPodAutoscaler — Render Service
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lazynext-render-hpa
  namespace: lazynext
  labels:
    app: lazynext-render
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lazynext-render
  minReplicas: 2
  maxReplicas: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
