# ───────────────────────────────────────────────────────────────────
# Sealed Secrets for Lazynext
# ───────────────────────────────────────────────────────────────────
#
# HOW TO USE KUBESEAL WITH THIS FILE:
#
# 1. Install the Sealed Secrets controller:
#      helm repo add sealed-secrets https://bitnami-labs.github.io/sealed-secrets
#      helm install sealed-secrets sealed-secrets/sealed-secrets \
#        --namespace kube-system \
#        --set fullnameOverride=sealed-secrets-controller
#
# 2. Create the plaintext secret (do NOT commit this):
#      kubectl create secret generic lazynext-sealed-creds \
#        --from-literal=DATABASE_URL='postgresql://...' \
#        --from-literal=BETTER_AUTH_SECRET='...' \
#        ... \
#        --dry-run=client -o yaml > /tmp/plain-secret.yaml
#
# 3. Seal it:
#      kubeseal < /tmp/plain-secret.yaml > k8s/base/sealed-secrets.yaml
#      shred -u /tmp/plain-secret.yaml
#
# 4. Commit ONLY the SealedSecret. Anyone can read this file — it is
#    encrypted with the cluster's public key and can ONLY be decrypted
#    by the Sealed Secrets controller running in YOUR cluster.
#
# 5. For CI/CD rotation:
#      kubeseal --re-rotate < sealed-secrets.yaml > new-sealed.yaml
#
# IMPORTANT SECURITY NOTES:
#   - NEVER commit plaintext secrets or kubectl --dry-run output.
#   - The SealedSecret is ENCRYPTED; it is safe to store in Git.
#   - Rotate the sealing key periodically:
#       kubectl get secret -n kube-system -l sealedsecrets.bitnami.com/sealed-secrets-key -o yaml > sealing-keys-backup.yaml
#   - Back up sealing keys to a secure, air-gapped location.
#   - The encrypted values below are PLACEHOLDERS — replace them by
#     running kubeseal with your actual secret values.
#
# ENVIRONMENT: Production
# CLUSTER: AKS (Azure Kubernetes Service)
# LAST ROTATED: 2026-06-28
# ───────────────────────────────────────────────────────────────────

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: lazynext-secrets
  namespace: lazynext
  labels:
    app.kubernetes.io/part-of: lazynext
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/component: secrets
    sealedsecrets.bitnami.com/managed: "true"
  annotations:
    # Description of what this SealedSecret contains
    sealedsecrets.bitnami.com/description: "Production secrets for Lazynext platform"
    sealedsecrets.bitnami.com/cluster: "aks-lazynext-production"
    sealedsecrets.bitnami.com/last-rotated: "2026-06-28"
spec:
  template:
    metadata:
      name: lazynext-secrets
      namespace: lazynext
      labels:
        app.kubernetes.io/part-of: lazynext
        app.kubernetes.io/managed-by: kustomize
        app.kubernetes.io/component: secrets
    type: Opaque
  encryptedData:
    # ─────────────────────────────────────────────────────────────────
    # DATABASE_URL — PostgreSQL connection string
    # Format: postgresql://<user>:<password>@<host>:<port>/<database>?sslmode=require
    # Source: Azure PostgreSQL Flexible Server
    # Scopes: web, sync, render, mcp, db-migrate
    # ─────────────────────────────────────────────────────────────────
    # REPLACE WITH: kubeseal --from-literal=DATABASE_URL='postgresql://...'
    DATABASE_URL: >-
      AgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==

    # ─────────────────────────────────────────────────────────────────
    # BETTER_AUTH_SECRET — 64-character hex string for auth session signing
    # Generate: openssl rand -hex 32
    # Source: better-auth library configuration
    # Scopes: web
    # ─────────────────────────────────────────────────────────────────
    # REPLACE WITH: kubeseal --from-literal=BETTER_AUTH_SECRET='...'
    BETTER_AUTH_SECRET: >-
      AgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==

    # ─────────────────────────────────────────────────────────────────
    # OpenAI API Key — Primary LLM provider for Chronos Copilot
    # Format: sk-...
    # Source: platform.openai.com → API Keys
    # Scopes: ai-agents (sync), pre-processing (Whisper)
    # ─────────────────────────────────────────────────────────────────
    # REPLACE WITH: kubeseal --from-literal=OPENAI_API_KEY='sk-...'
    OPENAI_API_KEY: >-
      AgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==

    # ─────────────────────────────────────────────────────────────────
    # Anthropic API Key — Secondary LLM provider
    # Format: sk-ant-...
    # Source: console.anthropic.com → API Keys
    # Scopes: ai-agents (sync)
    # ─────────────────────────────────────────────────────────────────
    # REPLACE WITH: kubeseal --from-literal=ANTHROPIC_API_KEY='sk-ant-...'
    ANTHROPIC_API_KEY: >-
      AgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==

    # ─────────────────────────────────────────────────────────────────
    # Google Gemini API Key — Tertiary LLM provider
    # Format: AIza...
    # Source: aistudio.google.com → API Keys
    # Scopes: ai-agents (sync)
    # ─────────────────────────────────────────────────────────────────
    # REPLACE WITH: kubeseal --from-literal=GEMINI_API_KEY='AIza...'
    GEMINI_API_KEY: >-
      AgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==

    # ─────────────────────────────────────────────────────────────────
    # Replicate API Token — ML model inference (SAM2, Whisper, NeRF)
    # Format: r8_...
    # Source: replicate.com → Account → API Tokens
    # Scopes: pre-processing, generative-studio
    # ─────────────────────────────────────────────────────────────────
    # REPLACE WITH: kubeseal --from-literal=REPLICATE_API_TOKEN='r8_...'
    REPLICATE_API_TOKEN: >-
      AgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==

    # ─────────────────────────────────────────────────────────────────
    # ElevenLabs API Key — Voice synthesis and dubbing
    # Format: <hex-string>
    # Source: elevenlabs.io → Profile → API Key
    # Scopes: generative-studio
    # ─────────────────────────────────────────────────────────────────
    # REPLACE WITH: kubeseal --from-literal=ELEVENLABS_API_KEY='...'
    ELEVENLABS_API_KEY: >-
      AgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==

    # ─────────────────────────────────────────────────────────────────
    # Dodo Payments API Key — Payment processing
    # Format: dp_live_... (production) or dp_test_... (staging)
    # Source: app.dodopayments.com → Settings → API Keys
    # Scopes: web
    # ─────────────────────────────────────────────────────────────────
    # REPLACE WITH: kubeseal --from-literal=DODO_API_KEY='dp_live_...'
    DODO_API_KEY: >-
      AgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==

    # ─────────────────────────────────────────────────────────────────
    # Dodo Payments Webhook Secret — Webhook signature verification
    # Format: dwhsec_...
    # Source: app.dodopayments.com → Settings → Webhooks
    # Scopes: web
    # ─────────────────────────────────────────────────────────────────
    # REPLACE WITH: kubeseal --from-literal=DODO_WEBHOOK_SECRET='dwhsec_...'
    DODO_WEBHOOK_SECRET: >-
      AgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==

    # ─────────────────────────────────────────────────────────────────
    # Resend API Key — Transactional email delivery
    # Format: re_...
    # Source: resend.com → Settings → API Keys
    # Scopes: web
    # ─────────────────────────────────────────────────────────────────
    # REPLACE WITH: kubeseal --from-literal=RESEND_API_KEY='re_...'
    RESEND_API_KEY: >-
      AgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==

    # ─────────────────────────────────────────────────────────────────
    # Upstash Redis REST Token — Rate limiting token
    # Format: <base64-string>
    # Source: console.upstash.com → Redis → Details → REST API
    # Scopes: web
    # ─────────────────────────────────────────────────────────────────
    # REPLACE WITH: kubeseal --from-literal=UPSTASH_REDIS_REST_TOKEN='...'
    UPSTASH_REDIS_REST_TOKEN: >-
      AgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==

    # ─────────────────────────────────────────────────────────────────
    # PostHog API Key — Product analytics
    # Format: phc_...
    # Source: app.posthog.com → Project Settings → API Keys
    # Scopes: web (client-side via NEXT_PUBLIC_POSTHOG_KEY)
    # ─────────────────────────────────────────────────────────────────
    # REPLACE WITH: kubeseal --from-literal=POSTHOG_KEY='phc_...'
    POSTHOG_KEY: >-
      AgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==

    # ─────────────────────────────────────────────────────────────────
    # Marble Workspace Key — CMS / media workspace
    # Source: Marble CMS dashboard
    # Scopes: web
    # ─────────────────────────────────────────────────────────────────
    # REPLACE WITH: kubeseal --from-literal=MARBLE_WORKSPACE_KEY='...'
    MARBLE_WORKSPACE_KEY: >-
      AgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==

    # ─────────────────────────────────────────────────────────────────
    # Freesound Client ID / API Key — Audio asset library
    # Source: freesound.org → My Account → API Credentials
    # Scopes: web
    # ─────────────────────────────────────────────────────────────────
    # REPLACE WITH: kubeseal --from-literal=FREESOUND_CLIENT_ID='...'
    FREESOUND_CLIENT_ID: >-
      AgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==

    # REPLACE WITH: kubeseal --from-literal=FREESOUND_API_KEY='...'
    FREESOUND_API_KEY: >-
      AgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==

---
# ───────────────────────────────────────────────────────────────────
# Separate SealedSecret for optional / per-environment secrets
# These may differ between staging and production.
# ───────────────────────────────────────────────────────────────────

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: lazynext-optional-secrets
  namespace: lazynext
  labels:
    app.kubernetes.io/part-of: lazynext
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/component: secrets
    sealedsecrets.bitnami.com/managed: "true"
  annotations:
    sealedsecrets.bitnami.com/description: "Optional API keys — services degrade gracefully when absent"
spec:
  template:
    metadata:
      name: lazynext-optional-secrets
      namespace: lazynext
      labels:
        app.kubernetes.io/part-of: lazynext
        app.kubernetes.io/managed-by: kustomize
        app.kubernetes.io/component: secrets
    type: Opaque
  encryptedData:
    # ─────────────────────────────────────────────────────────────────
    # HuggingFace Hub Token — Model download from private repos
    # Format: hf_...
    # Source: huggingface.co → Settings → Access Tokens
    # Scopes: generative-studio (optional — only needed for gated models)
    # ─────────────────────────────────────────────────────────────────
    HUGGINGFACE_HUB_TOKEN: >-
      AgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==

    # ─────────────────────────────────────────────────────────────────
    # Azure Storage Account Key — For direct blob storage access
    # Scopes: pre-processing, generative-studio, render-service
    # ─────────────────────────────────────────────────────────────────
    AZURE_STORAGE_KEY: >-
      AgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==

    # ─────────────────────────────────────────────────────────────────
    # Sentry DSN — Error tracking (backend only, no PII)
    # Source: sentry.io → Project → Settings → Client Keys (DSN)
    # Scopes: all services (optional)
    # ─────────────────────────────────────────────────────────────────
    SENTRY_DSN: >-
      AgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==

    # ─────────────────────────────────────────────────────────────────
    # Slack Webhook URL — Alerting channel for critical events
    # Source: api.slack.com → Apps → Incoming Webhooks
    # Scopes: monitoring
    # ─────────────────────────────────────────────────────────────────
    SLACK_WEBHOOK_URL: >-
      AgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==
