apiVersion: apps/v1
kind: Deployment
metadata:
  name: pre-processing-ml-worker
  namespace: lazynext-production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pre-processing
  template:
    metadata:
      labels:
        app: pre-processing
    spec:
      # Ensure this pod is only scheduled on high-end NVIDIA GPU nodes
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: cloud.google.com/gke-accelerator
                    operator: In
                    values:
                      - nvidia-tesla-t4
                      - nvidia-tesla-a100
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: ai-worker
          image: us-central1-docker.pkg.dev/lazynext/ml/pre-processing:latest
          resources:
            limits:
              nvidia.com/gpu: 1
              memory: "32Gi"
            requests:
              cpu: "4"
              memory: "16Gi"
