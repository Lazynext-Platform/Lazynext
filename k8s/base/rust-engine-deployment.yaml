apiVersion: apps/v1
kind: Deployment
metadata:
  name: lazynext-rust-engine
  labels:
    app: lazynext-rust-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lazynext-rust-engine
  template:
    metadata:
      labels:
        app: lazynext-rust-engine
    spec:
      containers:
      - name: rust-engine
        image: lazynext/rust-engine:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "1Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
---
apiVersion: v1
kind: Service
metadata:
  name: lazynext-rust-engine-svc
spec:
  type: ClusterIP
  selector:
    app: lazynext-rust-engine
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
