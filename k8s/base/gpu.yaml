---
# GPU Node Pool Configuration
# Requires NVIDIA GPU Operator installed on the cluster:
#   helm install nvidia-gpu-operator nvidia/gpu-operator --set driver.version=550

# GPU-accelerated Pre-Processing (Whisper, SAM2, NeRF)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lazynext-pre-processing-gpu
  namespace: lazynext
  labels:
    app: lazynext-pre-processing-gpu
    component: ml
    accelerator: nvidia-t4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lazynext-pre-processing-gpu
  template:
    metadata:
      labels:
        app: lazynext-pre-processing-gpu
        component: ml
    spec:
      terminationGracePeriodSeconds: 300
      initContainers:
        - name: wait-for-postgres
          image: postgres:17-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres-db -p 5432 -U lazynext -d lazynext; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready."
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: lazynext-secrets
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
      nodeSelector:
        accelerator: nvidia
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          # value: not needed with Exists operator
          effect: "NoSchedule"
      containers:
        - name: lazynext-pre-processing-gpu
          image: ghcr.io/lazynext-platform/lazynext-pre-processing:latest-gpu
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
          env:
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: "max_split_size_mb:512"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: MEDIA_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: lazynext-config
                  key: MEDIA_BUCKET
              valueFrom:
                secretKeyRef:
                  name: lazynext-secrets
                  optional: true
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: model-cache
              mountPath: /models
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
---
apiVersion: v1
kind: Service
metadata:
  name: lazynext-pre-processing-gpu
  namespace: lazynext
  labels:
    app: lazynext-pre-processing-gpu
spec:
  type: ClusterIP
  selector:
    app: lazynext-pre-processing-gpu
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
---
# Pre-Processing GPU PDB
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: lazynext-pre-processing-gpu-pdb
  namespace: lazynext
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: lazynext-pre-processing-gpu
---
# Pre-Processing GPU HPA
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lazynext-pre-processing-gpu-hpa
  namespace: lazynext
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lazynext-pre-processing-gpu
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
# GPU-accelerated Generative Studio (Diffusion, RealESRGAN, Demucs)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lazynext-generative-studio-gpu
  namespace: lazynext
  labels:
    app: lazynext-generative-studio-gpu
    component: ml
    accelerator: nvidia-l4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lazynext-generative-studio-gpu
  template:
    metadata:
      labels:
        app: lazynext-generative-studio-gpu
        component: ml
    spec:
      terminationGracePeriodSeconds: 300
      initContainers:
        - name: wait-for-postgres
          image: postgres:17-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres-db -p 5432 -U lazynext -d lazynext; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready."
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: lazynext-secrets
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
      nodeSelector:
        accelerator: nvidia
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          # value: not needed with Exists operator
          effect: "NoSchedule"
      containers:
        - name: lazynext-generative-studio-gpu
          image: ghcr.io/lazynext-platform/lazynext-generative-studio:latest-gpu
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: "32Gi"
              nvidia.com/gpu: "1"
          env:
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: "max_split_size_mb:512"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: MODEL_CACHE_DIR
              value: "/models/modal"
            - name: MODEL_CACHE
              value: "/models/modal"
              valueFrom:
                secretKeyRef:
                  name: lazynext-secrets
                  optional: true
          livenessProbe:
            httpGet:
              path: /
              port: 8001
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8001
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: model-cache
              mountPath: /models
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
---
apiVersion: v1
kind: Service
metadata:
  name: lazynext-generative-studio-gpu
  namespace: lazynext
  labels:
    app: lazynext-generative-studio-gpu
spec:
  type: ClusterIP
  selector:
    app: lazynext-generative-studio-gpu
  ports:
    - name: http
      protocol: TCP
      port: 8001
      targetPort: 8001
---
# Generative Studio GPU PDB
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: lazynext-generative-studio-gpu-pdb
  namespace: lazynext
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: lazynext-generative-studio-gpu
---
# Generative Studio GPU HPA
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lazynext-generative-studio-gpu-hpa
  namespace: lazynext
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lazynext-generative-studio-gpu
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
# Persistent Volume Claim for ML Model Cache
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache-pvc
  namespace: lazynext
  labels:
    app: model-cache
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  storageClassName: premium-rwx
  # NOTE: If premium-rwx is unavailable on your cloud provider, change
  # accessModes to ReadWriteOnce and use premium-rwo, but this will
  # limit model cache sharing to pods on the same node only.
---
# ── NVIDIA GPU Operator ClusterPolicy ──
# DEPLOY: helm install nvidia-gpu-operator nvidia/gpu-operator \
#   --namespace gpu-operator --create-namespace \
#   --set driver.version=550.90.07 \
#   --set toolkit.version=1.15.0
#
# Then apply this ClusterPolicy:
apiVersion: nvidia.com/v1
kind: ClusterPolicy
metadata:
  name: gpu-cluster-policy
  labels:
    app.kubernetes.io/part-of: lazynext
spec:
  driver:
    enabled: true
    version: "550.90.07"
    repo:
      repository: nvcr.io/nvidia/driver
    licensingConfig:
      nlsEnabled: false
    certConfig:
      name: ""
    virtualTopology:
      config: ""
  toolkit:
    enabled: true
    version: "1.15.0-ubuntu20.04"
    installDir: /usr/local/nvidia
  devicePlugin:
    enabled: true
    version: "v0.14.5"
    config:
      name: ""
      default: ""
      fallback: ""
    mps:
      root: /run/nvidia/mps
  mig:
    enabled: false  # Enable for A100/A30 GPUs
    strategy: mixed
  gfd:
    enabled: true
    version: "v0.8.4"
  dcgm:
    enabled: true
    version: "3.3.5-1-ubuntu20.04"
  dcgmExporter:
    enabled: true
    version: "3.3.5-3.4.1-ubuntu20.04"
    serviceMonitor:
      enabled: true
      namespace: lazynext
  gpuFeatureDiscovery:
    enabled: true
    version: "v0.8.2"
  operator:
    defaultRuntime: containerd
    runtimeClass: nvidia-gpu
    use_ocp_driver_toolkit: false
    initContainer:
      repository: nvcr.io/nvidia
      image: cuda
      version: "12.4.0-base-ubuntu20.04"
      imagePullPolicy: IfNotPresent
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile:
          type: RuntimeDefault
  sandboxDevicePlugin:
    enabled: false
  vgpuManager:
    enabled: false
  vgpuDeviceManager:
    enabled: false
  sandboxWorkloads:
    enabled: false
