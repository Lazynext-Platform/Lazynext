apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-collab-server
  namespace: lazynext
spec:
  podSelector:
    matchLabels:
      app: collab-server
  policyTypes:
    - Ingress
  ingress:
    # Allow WebSocket connections from the ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8004
    # Allow health checks from monitoring
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8004
    # Allow communication from web app pods
    - from:
        - podSelector:
            matchLabels:
              app: lazynext-web
      ports:
        - protocol: TCP
          port: 8004
    # Allow from ai-agents pods
    - from:
        - podSelector:
            matchLabels:
              app: lazynext-sync
      ports:
        - protocol: TCP
          port: 8004
