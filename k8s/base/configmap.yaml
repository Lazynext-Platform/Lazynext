# ── Lazynext Global ConfigMap ────────────────────────────────────────────
# Shared configuration values injected into all services via envFrom.
apiVersion: v1
kind: ConfigMap
metadata:
  name: lazynext-config
  namespace: lazynext
data:
  # Environment
  NODE_ENV: "production"
  STORAGE_PROVIDER: "azure"
  LLM_PROVIDER: "anthropic"

  # Service URLs (internal K8s DNS)
  AI_AGENTS_URL: "http://lazynext-sync:8002"
  RENDER_SERVICE_URL: "http://lazynext-render:8003"
  PRE_PROCESSING_URL: "http://lazynext-pre-processing:8000"
  GENERATIVE_STUDIO_URL: "http://lazynext-generative-studio:8001"
  COLLAB_SERVER_URL: "http://collab-server:8004"
  ANALYTICS_SERVICE_URL: "http://lazynext-analytics-service:8006"
  MCP_SERVER_URL: "http://lazynext-mcp:5173"
  API_GATEWAY_URL: "http://lazynext-api-gateway:8005"

  # Public-facing URLs
  BETTER_AUTH_URL: "https://lazynext.ai"

  # Redis
  UPSTASH_REDIS_REST_URL: "http://redis-proxy:80"

  # Media bucket
  MEDIA_BUCKET: "media"

  # Monitoring
  NEXT_PUBLIC_POSTHOG_HOST: "https://app.posthog.com"
