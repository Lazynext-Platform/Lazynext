---
# Prometheus ServiceMonitor — PostgreSQL exporter
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: postgres-exporter
  namespace: lazynext
  labels:
    app: postgres-exporter
    release: prometheus
spec:
  selector:
    matchLabels:
      app: postgres-exporter
  endpoints:
    - port: metrics
      interval: 30s
      scrapeTimeout: 10s
---
# PostgreSQL Metrics Exporter
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: lazynext
  labels:
    app: postgres-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      containers:
        - name: postgres-exporter
          image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
          ports:
            - name: metrics
              containerPort: 9187
              protocol: TCP
          env:
            - name: DATA_SOURCE_NAME
              valueFrom:
                secretKeyRef:
                  name: lazynext-secrets
                  key: DATABASE_URL
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 9187
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 9187
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: lazynext
  labels:
    app: postgres-exporter
spec:
  type: ClusterIP
  selector:
    app: postgres-exporter
  ports:
    - name: metrics
      protocol: TCP
      port: 9187
      targetPort: 9187
---
# Redis Metrics Exporter
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: lazynext
  labels:
    app: redis-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-exporter
  template:
    metadata:
      labels:
        app: redis-exporter
    spec:
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.62.0
          ports:
            - name: metrics
              containerPort: 9121
              protocol: TCP
          env:
            - name: REDIS_ADDR
              value: "redis://redis-db:6379"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9121
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9121
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  namespace: lazynext
  labels:
    app: redis-exporter
spec:
  type: ClusterIP
  selector:
    app: redis-exporter
  ports:
    - name: metrics
      protocol: TCP
      port: 9121
      targetPort: 9121
---
# Prometheus ServiceMonitor — Redis exporter
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: redis-exporter
  namespace: lazynext
  labels:
    app: redis-exporter
    release: prometheus
spec:
  selector:
    matchLabels:
      app: redis-exporter
  endpoints:
    - port: metrics
      interval: 30s
      scrapeTimeout: 10s
---
# PrometheusRule — Alert thresholds
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: lazynext-alerts
  namespace: lazynext
  labels:
    release: prometheus
spec:
  groups:
    - name: lazynext
      rules:
        - alert: WebAppDown
          expr: up{job="lazynext-web"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Lazynext web app is down"
            description: "The web app has been unreachable for 5 minutes."

        - alert: RenderQueueBacklog
          expr: avg_over_time(render_queue_size[15m]) > 50
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Render queue backing up"
            description: "Render queue has averaged > 50 jobs for 15 minutes."

        - alert: DatabaseConnectionPoolExhausted
          expr: pg_stat_database_numbackends{datname="lazynext"} > 150
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Database connection pool nearly exhausted"
            description: "PostgreSQL has > 150 active connections."

        - alert: RedisHighMemory
          expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Redis memory usage > 85%"
            description: "Redis memory is {{ $value | humanizePercentage }} used."

        - alert: PythonServiceDown
          expr: up{job=~"lazynext-pre-processing|lazynext-generative-studio"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Python ML service is down"
            description: "{{ $labels.job }} has been unreachable for 5 minutes."
