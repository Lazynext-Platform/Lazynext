---
# Prometheus ServiceMonitor — Web App
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: lazynext-web
  namespace: lazynext
  labels:
    app: lazynext-web
    release: prometheus
spec:
  selector:
    matchLabels:
      app: lazynext-web
  endpoints:
    - port: http
      path: /api/health
      interval: 30s
      scrapeTimeout: 10s
---
# Prometheus ServiceMonitor — AI Agents
apiVersion: monitoring.coreos.com/v1
