apiVersion: v1
kind: Secret
metadata:
  name: lazynext-secrets
  namespace: lazynext
type: Opaque
stringData:
  # Database
  POSTGRES_USER: "lazynext"
  POSTGRES_PASSWORD: "REPLACE_WITH_K8S_SECRET_MANAGED_VALUE"
  DATABASE_URL: "postgresql://lazynext:REPLACE_WITH_K8S_SECRET_MANAGED_VALUE@postgres-db:5432/lazynext"
  # Auth
  BETTER_AUTH_SECRET: "REPLACE_WITH_64_CHAR_RANDOM_STRING"
  # Redis / Upstash
  UPSTASH_REDIS_REST_TOKEN: "REPLACE_WITH_K8S_SECRET_MANAGED_VALUE"
  # External APIs
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  GEMINI_API_KEY: ""
  REPLICATE_API_TOKEN: ""
  ELEVENLABS_API_KEY: ""
  # CMS
  MARBLE_WORKSPACE_KEY: "REPLACE_WITH_K8S_SECRET_MANAGED_VALUE"
  FREESOUND_CLIENT_ID: "REPLACE_WITH_K8S_SECRET_MANAGED_VALUE"
  FREESOUND_API_KEY: "REPLACE_WITH_K8S_SECRET_MANAGED_VALUE"
  # Stripe
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
  # Email
  RESEND_API_KEY: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
  namespace: lazynext
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: e30K
