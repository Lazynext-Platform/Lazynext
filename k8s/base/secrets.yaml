# ── Lazynext Secrets ──────────────────────────────────────────────
# NOTE: This Secret is MANAGED by ExternalSecret (see security-policies.yaml).
# After ExternalSecret syncs, sensitive values are populated from GCP Secret Manager.
# Non-sensitive values (user, host, port) are defined here.

---
# Primary Application Secrets
# Managed by: ExternalSecret lazynext-external-secrets (GCP Secret Manager → K8s)
# Synced keys: DATABASE_URL, BETTER_AUTH_SECRET, OPENAI_API_KEY, ANTHROPIC_API_KEY,
#               GEMINI_API_KEY, REPLICATE_API_TOKEN, ELEVENLABS_API_KEY,
#               STRIPE_SECRET_KEY, RESEND_API_KEY, STRIPE_WEBHOOK_SECRET,
#               UPSTASH_REDIS_REST_TOKEN, MARBLE_WORKSPACE_KEY,
#               FREESOUND_CLIENT_ID, FREESOUND_API_KEY
apiVersion: v1
kind: Secret
metadata:
  name: lazynext-secrets
  namespace: lazynext
  labels:
    app.kubernetes.io/part-of: lazynext
    app.kubernetes.io/managed-by: external-secrets
  annotations:
    # This Secret is owned by ExternalSecret — do not manually edit
    external-secrets.io/managed: "true"
type: Opaque
stringData:
  # ── Database ──────────────────────────────────────────────────────
  # DATABASE_URL: synced from GCP Secret Manager (postgresql://...)
  POSTGRES_USER: "lazynext_app"
  POSTGRES_PASSWORD: ""  # Managed by ExternalSecret via DATABASE_URL

  # ── Authentication ───────────────────────────────────────────────
  # BETTER_AUTH_SECRET: synced from GCP Secret Manager

  # ── Redis / Rate Limiting ─────────────────────────────────────────
  # UPSTASH_REDIS_REST_TOKEN: synced from GCP Secret Manager

  # ── AI Provider API Keys ──────────────────────────────────────────
  # OPENAI_API_KEY: synced from GCP Secret Manager
  # ANTHROPIC_API_KEY: synced from GCP Secret Manager
  # GEMINI_API_KEY: synced from GCP Secret Manager
  # REPLICATE_API_TOKEN: synced from GCP Secret Manager
  # ELEVENLABS_API_KEY: synced from GCP Secret Manager

  # ── CMS / Media ──────────────────────────────────────────────────
  # MARBLE_WORKSPACE_KEY: synced from GCP Secret Manager
  # FREESOUND_CLIENT_ID: synced from GCP Secret Manager
  # FREESOUND_API_KEY: synced from GCP Secret Manager

  # ── Payments ─────────────────────────────────────────────────────
  # STRIPE_SECRET_KEY: synced from GCP Secret Manager
  # STRIPE_WEBHOOK_SECRET: synced from GCP Secret Manager

  # ── Email ────────────────────────────────────────────────────────
  # RESEND_API_KEY: synced from GCP Secret Manager
---
# ── Docker Registry Credentials ───────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
  namespace: lazynext
  labels:
    app.kubernetes.io/part-of: lazynext
type: kubernetes.io/dockerconfigjson
# stringData:
#   .dockerconfigjson: |
#     {
#       "auths": {
#         "ghcr.io": {
#           "auth": "BASE64_ENCODED_USERNAME:PASSWORD_OR_TOKEN"
#         }
#       }
#     }
# NOTE: Uncomment and populate stringData with your actual registry credentials.
# Or use: kubectl create secret docker-registry registry-credentials \
#   --docker-server=ghcr.io --docker-username=USER --docker-password=TOKEN -n lazynext
