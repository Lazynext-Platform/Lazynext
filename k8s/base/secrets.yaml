# ── Lazynext Secrets ──────────────────────────────────────────────
# NOTE: This Secret is MANAGED by ExternalSecret (see security-policies.yaml).
# After ExternalSecret syncs, sensitive values are populated from Azure Key Vault.
# Non-sensitive values (user, host, port) are defined here.

---
# Primary Application Secrets
# Managed by: ExternalSecret lazynext-external-secrets (Azure Key Vault → K8s)
#               DODO_API_KEY, RESEND_API_KEY, DODO_WEBHOOK_SECRET,
#               UPSTASH_REDIS_REST_TOKEN, MARBLE_WORKSPACE_KEY,
#               FREESOUND_CLIENT_ID, FREESOUND_API_KEY
apiVersion: v1
kind: Secret
metadata:
  name: lazynext-secrets
  namespace: lazynext
  labels:
    app.kubernetes.io/part-of: lazynext
    app.kubernetes.io/managed-by: external-secrets
  annotations:
    # This Secret is owned by ExternalSecret — do not manually edit
    external-secrets.io/managed: "true"
type: Opaque
stringData:
  # ── Database ──────────────────────────────────────────────────────
  # DATABASE_URL: synced from Azure Key Vault (postgresql://...)
  POSTGRES_USER: "lazynext_app"
  POSTGRES_PASSWORD: ""  # Managed by ExternalSecret via DATABASE_URL

  # ── Authentication ───────────────────────────────────────────────
  # BETTER_AUTH_SECRET: synced from Azure Key Vault

  # ── Redis / Rate Limiting ─────────────────────────────────────────
  # UPSTASH_REDIS_REST_TOKEN: synced from Azure Key Vault

  # ── AI Provider API Keys ──────────────────────────────────────────
  # GEMINI_API_KEY: synced from Azure Key Vault

  # ── CMS / Media ──────────────────────────────────────────────────
  # MARBLE_WORKSPACE_KEY: synced from Azure Key Vault
  # FREESOUND_CLIENT_ID: synced from Azure Key Vault
  # FREESOUND_API_KEY: synced from Azure Key Vault

  # ── Payments ─────────────────────────────────────────────────────
  # DODO_API_KEY: synced from Azure Key Vault
  # DODO_WEBHOOK_SECRET: synced from Azure Key Vault

  # ── Email ────────────────────────────────────────────────────────
  # RESEND_API_KEY: synced from Azure Key Vault
---
# ── Docker Registry Credentials ───────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
  namespace: lazynext
  labels:
    app.kubernetes.io/part-of: lazynext
type: kubernetes.io/dockerconfigjson
# stringData:
#   .dockerconfigjson: |
#     {
#       "auths": {
#         "ghcr.io": {
#           "auth": "BASE64_ENCODED_USERNAME:PASSWORD_OR_TOKEN"
#         }
#       }
#     }
# NOTE: Uncomment and populate stringData with your actual registry credentials.
# Or use: kubectl create secret docker-registry registry-credentials \
#   --docker-server=ghcr.io --docker-username=USER --docker-password=TOKEN -n lazynext
