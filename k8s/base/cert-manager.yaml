# ═══════════════════════════════════════════════════════════════════
# 7. Certificate — staging variants (testing with let's encrypt staging)
# ═══════════════════════════════════════════════════════════════════

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lazynext-tls-staging
  namespace: lazynext
  labels:
    app: lazynext
    app.kubernetes.io/part-of: lazynext
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/component: certificates
    environment: staging
  annotations:
    cert-manager.io/description: "Staging certificate for CI/CD and pre-production testing"
    # This certificate is supplementary to the production one; it is safe to
    # create alongside lazynext-tls because they target different secrets.
spec:
  secretName: lazynext-tls-staging
  secretTemplate:
    labels:
      app.kubernetes.io/part-of: lazynext
      app.kubernetes.io/component: tls
      environment: staging
  duration: 2160h
  renewBefore: 720h
  issuerRef:
    name: letsencrypt-staging
    kind: ClusterIssuer
    group: cert-manager.io
  commonName: lazynext.ai
  dnsNames:
    - lazynext.ai
    - www.lazynext.ai
  privateKey:
    algorithm: RSA
    size: 2048  # Smaller key for staging — faster issuance
    encoding: PKCS8
    rotationPolicy: Always
  revisionHistoryLimit: 2
  usages:
    - digital signature
    - key encipherment
    - server auth

# ═══════════════════════════════════════════════════════════════════
# 8. CertificateRequest policy (optional — automated validation)
# ═══════════════════════════════════════════════════════════════════

---
# This CertificateRequest policy enforces minimum key size and approved
# issuers for all Certificate resources in the namespace.
# Available in cert-manager 1.14+ via the --feature-gates=Approved=true flag.
apiVersion: policy.cert-manager.io/v1alpha1
kind: CertificateRequestPolicy
metadata:
  name: lazynext-cert-policy
  labels:
    app.kubernetes.io/part-of: lazynext
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/component: certificates
spec:
  allowed:
    commonName:
      value: "*.lazynext.ai"
      required: false
    dnsNames:
      values:
        - "*.lazynext.ai"
      required: false
    # Only allow Let's Encrypt issuers (no self-signed in production)
    issuerRef:
      names:
        - letsencrypt-production
        - letsencrypt-staging
      kinds:
        - ClusterIssuer
      groups:
        - cert-manager.io
  # Constraints on the certificate request
  constraints:
    minDuration: 1h
    maxDuration: 2160h
    privateKey:
      algorithm: RSA
      minSize: 2048
      maxSize: 4096
    # Prevent wildcard in both CommonName and DNSNames simultaneously
    # (some CAs reject this)
  # Plugin configuration for additional validation
  # e.g., integrate with OPA/Gatekeeper for advanced policy checks
