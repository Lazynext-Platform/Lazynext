apiVersion: apps/v1
kind: Deployment
metadata:
  name: collab-server
  namespace: lazynext
  labels:
    app: collab-server
    component: sync
spec:
  replicas: 2
  selector:
    matchLabels:
      app: collab-server
  template:
    metadata:
      labels:
        app: collab-server
    spec:
      serviceAccountName: lazynext-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: collab-server
          image: lazynextacrproduction.azurecr.io/lazynext-collab-server:latest
          ports:
            - containerPort: 8004
              name: ws
          env:
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: lazynext-secrets
                  key: BETTER_AUTH_SECRET
            - name: COLLAB_PORT
              value: "8004"
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: collab-server
  namespace: lazynext
  labels:
    app: collab-server
spec:
  selector:
    app: collab-server
  ports:
    - name: ws
      port: 8004
      targetPort: 8004
      protocol: TCP
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: collab-server-hpa
  namespace: lazynext
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: collab-server
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: collab-server-pdb
  namespace: lazynext
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: collab-server
