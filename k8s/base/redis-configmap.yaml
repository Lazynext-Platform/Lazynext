# ── Lazynext Redis ConfigMap ─────────────────────────────────────────────
# Redis connection details for Upstash or self-hosted Redis instances.
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: lazynext
data:
  redis.conf: |
    appendonly yes
    appendfsync everysec
    auto-aof-rewrite-percentage 100
    auto-aof-rewrite-min-size 64mb
    aof-use-rdb-preamble yes
    save 900 1
    save 300 10
    save 60 10000
    maxmemory 512mb
    maxmemory-policy allkeys-lru
    maxclients 10000
    tcp-backlog 511
    timeout 300
    tcp-keepalive 300
    slowlog-log-slower-than 10000
    slowlog-max-len 128
    latency-monitor-threshold 100
    notify-keyspace-events Ex
