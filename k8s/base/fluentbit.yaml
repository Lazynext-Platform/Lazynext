# ───────────────────────────────────────────────────────────────────
# Fluent Bit — Log Collection and Forwarding for Lazynext
# ───────────────────────────────────────────────────────────────────
#
# Fluent Bit runs as a DaemonSet on every node, tailing container logs
# from /var/log/containers/ and forwarding them to Loki for storage
# and Grafana for querying.
#
# Architecture:
#   [Container stdout/stderr] → [containerd CRI log] → [Fluent Bit tail input]
#     → [Kubernetes filter (enrich with metadata)] → [Parser (structured JSON)]
#       → [Loki output] → [Grafana query]
#
# Prerequisites:
#   helm repo add fluent https://fluent.github.io/helm-charts
#   # Loki must be installed and reachable:
#   helm install loki grafana/loki-stack --namespace monitoring
#
# Parsers included:
#   - nginx-ingress: ingress controller access/error logs
#   - bun-node: Bun/Node.js JSON structured logs
#   - python-fastapi: Python uvicorn/FastAPI logs
#   - rust: Rust tracing/env_logger structured output
#   - cri: Common Container Runtime Interface log format
# ───────────────────────────────────────────────────────────────────

# ═══════════════════════════════════════════════════════════════════
# 1. ConfigMap — Fluent Bit configuration
# ═══════════════════════════════════════════════════════════════════

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: kube-system
  labels:
    app.kubernetes.io/name: fluent-bit
    app.kubernetes.io/part-of: lazynext
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/component: logging
    k8s-app: fluent-bit
data:
  fluent-bit.conf: |
    # ── Fluent Bit Main Configuration ─────────────────────────────
    [SERVICE]
        # Flush interval: send buffered chunks to Loki every 5 seconds
        Flush                     5
        # Daemon mode: run as foreground process (K8s manages lifecycle)
        Daemon                    Off
        # Log level: info for production, debug for troubleshooting
        Log_Level                 info
        # Parsers file: embedded parsers for structured log formats
        Parsers_File              parsers.conf
        Parsers_File              parsers-custom.conf
        # Plugin path: where custom plugins live
        Plugins_File              plugins.conf
        # HTTP server for health checks and metrics (internal)
        HTTP_Server               On
        HTTP_Listen               0.0.0.0
        HTTP_Port                 2020
        # Health check endpoint
        Health_Check              On
        # Storage for checkpointing tail positions (survives restarts)
        storage.path              /var/log/flb-storage/
        storage.sync              normal
        storage.checksum          off
        storage.backlog.mem_limit 50M
        # Graceful shutdown: flush remaining buffers (max 30 seconds)
        Grace                     30
        # Coro stack size — increase for complex filters
        Coro_Stack_Size           24576

    # ── Input: Tail container logs ─────────────────────────────────
    [INPUT]
        Name                      tail
        Tag                       kube.*
        Path                      /var/log/containers/*.log
        # Exclude Fluent Bit's own logs to avoid infinite loop
        Exclude_Path              *fluent-bit*,*velero*,*kube-system*
        # Refresh file list every 5 seconds (new pods starting)
        Refresh_Interval          5
        # Use CRI parser to extract log and time from CRI format
        Parser                    cri
        # DB: SQLite file tracking read positions (survives pod restart)
        DB                        /var/log/flb_kube.db
        # Skip empty lines
        Skip_Empty_Lines          On
        # Skip long lines (> 256KB) to prevent OOM
        Skip_Long_Lines           On
        # Store checkpoint offsets in memory + disk
        storage.type              filesystem
        # Buffer chunk size
        Buffer_Chunk_Size         256k
        Buffer_Max_Size           1M
        # Rotate when file reaches 2MB — prevents unbounded disk usage
        Rotate_Wait               30
        # Mem buffer limit per monitored file
        Mem_Buf_Limit             10MB
        # Ignore files older than 24h at startup (don't replay old logs)
        Ignore_Older              24h
        # Inotify watcher vs polling. Inotify is more efficient on Linux.
        Read_from_Head            On

    # ── Input: Systemd journal (node-level logs) ───────────────────
    [INPUT]
        Name                      systemd
        Tag                       systemd.*
        Systemd_Filter            _SYSTEMD_UNIT=docker.service
        Systemd_Filter            _SYSTEMD_UNIT=containerd.service
        Systemd_Filter            _SYSTEMD_UNIT=kubelet.service
        Read_From_Tail            On
        Strip_Underscores         On
        Max_Entries               1000
        # Limit systemd journal to most recent entries
        Max_Fields                100

    # ── Filter: Kubernetes metadata enrichment ─────────────────────
    [FILTER]
        Name                      kubernetes
        Match                     kube.*
        # Merge structured JSON log lines into the top-level record
        Merge_Log                 On
        # Keep raw log line after parsing (useful for debugging)
        Keep_Log                  Off
        # Merge the log field into the root (makes fields accessible)
        Merge_Log_Key             log_processed
        # K8s metadata to add to every log record
        K8S-Logging.Parser        On
        K8S-Logging.Exclude       On
        # Annotations to look for on the pod:
        Annotations               On
        Labels                    On
        # Use journald for K8s metadata lookup (more reliable at scale)
        Use_Journal               On
        # DNS resolution for service names
        DNS_Retries               2
        # Cache K8s metadata for 30 minutes (don't hammer API server)
        Kube_Meta_Cache_TTL       1800
        # Maximum retries for K8s API calls
        Kube_Tag_Prefix           kube.var.log.containers.

    # ── Filter: Rewrite Tag based on namespace/app ─────────────────
    [FILTER]
        Name                      rewrite_tag
        Match                     kube.*
        Rule                       $kubernetes['namespace_name'] ^lazynext$    lazynext.$kubernetes['labels']['app'].$kubernetes['container_name']   false
        Rule                       $kubernetes['namespace_name'] ^monitoring$  monitoring.logs  false
        # Emitter: keep original record after rewriting tag
        Emitter_Name              re_emitted

    # ── Filter: Level-based routing ────────────────────────────────
    [FILTER]
        Name                      grep
        Match                     lazynext.*
        # Only forward ERROR and WARN lines from all Lazynext services
        # This reduces Loki storage costs — adjust per environment
        Regex                     log $.level ^(error|warn|info)$

    # ── Output: Loki (primary log store) ───────────────────────────
    [OUTPUT]
        Name                      loki
        Match                     lazynext.*
        # Loki gateway endpoint (installed in monitoring namespace)
        Host                      loki-gateway.monitoring.svc.cluster.local
        Port                      80
        # Labels: stream-related metadata for query grouping
        label_keys                $kubernetes['namespace_name'],$kubernetes['pod_name'],$kubernetes['container_name'],$kubernetes['labels']['app'],$kubernetes['labels']['component'],$stream
        # Tenant ID for multi-tenant Loki
        Tenant_ID                 lazynext
        # Labels added as Loki stream labels (queryable in LogQL)
        Labels                    job=fluentbit,cluster=lazynext-production
        # Auto-generate kubernetes labels
        Auto_Kubernetes_Labels    On
        # Remove the key 'kubernetes' (saved as labels already)
        Remove_Keys               kubernetes,docker,container_id
        # HTTP connection settings
        HTTP_User                 loki
        HTTP_Passwd               ${LOKI_PASSWORD}
        # Retry on failure
        Retry_Limit               5
        # Compression: use snappy for network efficiency
        Compress                  snappy
        # Line format: JSON for structured parsing in Loki
        Line_Format               json
        # Drop single key fields to reduce noise
        Drop_Single_Key           Off
        storage.total_limit_size  1G
        # Connection TLS
        Tls                       On
        Tls.verify                On

    # ── Output: Systemd logs → Loki ─────────────────────────────────
    [OUTPUT]
        Name                      loki
        Match                     systemd.*
        Host                      loki-gateway.monitoring.svc.cluster.local
        Port                      80
        label_keys                $hostname,$_SYSTEMD_UNIT
        Tenant_ID                 lazynext-systemd
        Labels                    job=fluentbit-systemd,cluster=lazynext-production
        Remove_Keys               _
        Line_Format               json
        Retry_Limit               2
        storage.total_limit_size  1G
        Tls                       On
        Tls.verify                On

    # ── Output: Monitoring namespace logs → Loki ───────────────────
    [OUTPUT]
        Name                      loki
        Match                     monitoring.*
        Host                      loki-gateway.monitoring.svc.cluster.local
        Port                      80
        label_keys                $kubernetes['pod_name'],$kubernetes['container_name']
        Tenant_ID                 monitoring
        Labels                    job=fluentbit-monitoring,cluster=lazynext-production
        Auto_Kubernetes_Labels    On
        Line_Format               json
        Retry_Limit               2
        storage.total_limit_size  1G
        Tls                       On
        Tls.verify                On

  # ── Custom Parsers ──────────────────────────────────────────────
  parsers-custom.conf: |
    # ── CRI log format parser (containerd / cri-o) ─────────────────
    [PARSER]
        Name                      cri
        Format                    regex
        Regex                     ^(?<time>[^ ]+ [^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<message>.*)$
        Time_Key                  time
        Time_Format               %Y-%m-%dT%H:%M:%S.%L%z
        Time_Keep                 On

    # ── NGINX Ingress Controller access log parser ──────────────────
    [PARSER]
        Name                      nginx-ingress
        Format                    regex
        Regex                     ^(?<remote_addr>[^ ]*) - (?<remote_user>[^ ]*) \[(?<time>[^\]]*)\] "(?<method>\S+)(?: +(?<path>[^\"]*?)(?: +\S*)?)?" (?<status_code>[^ ]*) (?<body_bytes_sent>[^ ]*) "(?<http_referer>[^\"]*)" "(?<http_user_agent>[^\"]*)" (?<request_length>[^ ]*) (?<request_time>[^ ]*) \[(?<proxy_upstream_name>[^\]]*)\] \[(?<proxy_alternative_upstream_name>[^\]]*)\] (?<upstream_addr>[^ ]*) (?<upstream_response_length>[^ ]*) (?<upstream_response_time>[^ ]*) (?<upstream_status>[^ ]*) (?<req_id>[^ ]*).*$
        Time_Key                  time
        Time_Format               %d/%b/%Y:%H:%M:%S %z
        Time_Keep                 On
        Types                     status_code:integer body_bytes_sent:integer request_length:integer request_time:float upstream_response_time:float

    # ── NGINX error log parser ─────────────────────────────────────
    [PARSER]
        Name                      nginx-error
        Format                    regex
        Regex                     ^(?<time>\d{4}/\d{2}/\d{2} \d{2}:\d{2}:\d{2}) \[(?<level>[^\]]+)\] (?<pid>\d+)#(?<tid>\d+): \*(?<cid>\d+) (?<message>.*)$
        Time_Key                  time
        Time_Format               %Y/%m/%d %H:%M:%S
        Time_Keep                 On

    # ── Bun/Node.js JSON structured log parser ─────────────────────
    # Expected format (from Bun console / pino / winston):
    #   {"level":"info","time":"2026-06-28T02:00:00.000Z","msg":"...","pid":123,"hostname":"..."}
    [PARSER]
        Name                      bun-node
        Format                    json
        Time_Key                  time
        Time_Format               %Y-%m-%dT%H:%M:%S.%L%z
        Time_Keep                 On
        # Map common JSON log field names to Fluent Bit internal fields
        # Level
        Decode_Field_As           json level
        Decode_Field_As           escaped msg
        Decode_Field_As           escaped error

    # ── Python FastAPI / uvicorn log parser ────────────────────────
    # Format:
    #   uvicorn access: 2026-06-28 02:00:00,123 - INFO - 10.0.0.1:54321 - "GET /api/health HTTP/1.1" 200
    #   uvicorn error: 2026-06-28 02:00:00,456 - ERROR - Traceback ...
    # Or structured JSON from python-json-logger:
    #   {"levelname": "INFO", "asctime": "2026-06-28 02:00:00,123", "message": "..."}
    [PARSER]
        Name                      python-fastapi
        Format                    regex
        # Match uvicorn access log format
        Regex                     ^(?<time>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3}) - (?<level>\w+) - (?<message>.*)$
        Time_Key                  time
        Time_Format               %Y-%m-%d %H:%M:%S,%L
        Time_Keep                 On
        Types                     level:string message:string

    # ── Python structured JSON parser (fallback) ───────────────────
    [PARSER]
        Name                      python-json
        Format                    json
        Time_Key                  asctime
        Time_Format               %Y-%m-%dT%H:%M:%S.%L
        Time_Keep                 On
        Decode_Field_As           json levelname
        Decode_Field_As           escaped message
        Decode_Field_As           escaped exc_info

    # ── Rust tracing / env_logger parser ───────────────────────────
    # Format (env_logger default):
    #   [2026-06-28T02:00:00Z INFO  lazynext_core::engine] Processing frame 42
    # Format (tracing-subscriber JSON):
    #   {"timestamp":"2026-06-28T02:00:00.000Z","level":"INFO","fields":{"message":"..."},"target":"lazynext_core::engine"}
    [PARSER]
        Name                      rust-env-logger
        Format                    regex
        Regex                     ^\[(?<time>[^\]]+)\] (?<level>\w+)\s+(?<target>[^\]]+)\] (?<message>.*)$
        Time_Key                  time
        Time_Format               %Y-%m-%dT%H:%M:%SZ
        Time_Keep                 On
        Types                     level:string target:string message:string

    [PARSER]
        Name                      rust-tracing-json
        Format                    json
        Time_Key                  timestamp
        Time_Format               %Y-%m-%dT%H:%M:%S.%L%z
        Time_Keep                 On
        Decode_Field_As           json fields
        Decode_Field_As           escaped target
        Decode_Field_As           escaped span

    # ── Generic JSON parser (universal fallback) ───────────────────
    [PARSER]
        Name                      json
        Format                    json
        Time_Key                  time
        Time_Format               %Y-%m-%dT%H:%M:%S.%L%z
        Time_Keep                 On

    # ── Docker/containerd JSON log parser ──────────────────────────
    [PARSER]
        Name                      docker
        Format                    json
        Time_Key                  time
        Time_Format               %Y-%m-%dT%H:%M:%S.%L
        Time_Keep                 On

  plugins.conf: |
    # Custom plugins path — unused currently but required by Fluent Bit
    [PLUGINS]
        Path                      /fluent-bit/plugins/

# ═══════════════════════════════════════════════════════════════════
# 2. ServiceAccount — Permissions for Fluent Bit to read pod metadata
# ═══════════════════════════════════════════════════════════════════

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  namespace: kube-system
  labels:
    app.kubernetes.io/name: fluent-bit
    app.kubernetes.io/part-of: lazynext
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/component: logging
    k8s-app: fluent-bit

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluent-bit
  labels:
    app.kubernetes.io/name: fluent-bit
    app.kubernetes.io/part-of: lazynext
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/component: logging
rules:
  # Read pod metadata (names, labels, annotations) for log enrichment
  - apiGroups: [""]
    resources:
      - pods
      - namespaces
    verbs: ["get", "list", "watch"]
  # Read events for correlation (optional — keep commented unless needed)
  # - apiGroups: [""]
  #   resources:
  #     - events
  #   verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluent-bit
  labels:
    app.kubernetes.io/name: fluent-bit
    app.kubernetes.io/part-of: lazynext
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/component: logging
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluent-bit
subjects:
  - kind: ServiceAccount
    name: fluent-bit
    namespace: kube-system

# ═══════════════════════════════════════════════════════════════════
# 3. DaemonSet — Fluent Bit on every node
# ═══════════════════════════════════════════════════════════════════

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: kube-system
  labels:
    app.kubernetes.io/name: fluent-bit
    app.kubernetes.io/part-of: lazynext
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/component: logging
    k8s-app: fluent-bit
    version: v3
  annotations:
    fluentbit.io/description: "Fluent Bit log collector — tails container logs and ships to Loki"
spec:
  selector:
    matchLabels:
      k8s-app: fluent-bit
  # Rolling update: max 10 nodes at a time, one unavailable
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  # Revision history for rollbacks
  revisionHistoryLimit: 10
  template:
    metadata:
      labels:
        k8s-app: fluent-bit
        app.kubernetes.io/name: fluent-bit
        app.kubernetes.io/part-of: lazynext
        app.kubernetes.io/component: logging
      annotations:
        # Checksum the config so the DaemonSet restarts on config change
        checksum/config: placeholder
        prometheus.io/scrape: "true"
        prometheus.io/port: "2020"
        prometheus.io/path: "/api/v1/metrics/prometheus"
        # Tell sidecar to drop the Kubernetes filter's cache on restart
        fluentbit.io/exclude: "true"
    spec:
      serviceAccountName: fluent-bit
      # Run on all nodes, including control plane if needed for etcd logs
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
          operator: Exists
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
          operator: Exists
        # Tolerate all taints — we want logs from every node
        - operator: Exists
          effect: NoExecute
        - operator: Exists
          effect: NoSchedule
      # Priority: high enough to not be evicted, lower than critical apps
      priorityClassName: system-node-critical
      # Host network: not needed, we communicate over ClusterIP to Loki
      hostNetwork: false
      # Run on Linux only (no Windows containers in this cluster)
      nodeSelector:
        kubernetes.io/os: linux
      # If Fluent Bit dies, restart it
      terminationGracePeriodSeconds: 60
      containers:
        - name: fluent-bit
          image: cr.fluentbit.io/fluent/fluent-bit:3.2.4
          imagePullPolicy: IfNotPresent
          securityContext:
            # Minimal privileges: tail logs, read pod metadata
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: false  # Needs root to read /var/log/containers
            runAsUser: 0
            seccompProfile:
              type: RuntimeDefault
          # Ports: HTTP server for metrics and health
          ports:
            - name: http-metrics
              containerPort: 2020
              protocol: TCP
          # Environment variables
          env:
            - name: LOKI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: loki-credentials
                  key: password
                  optional: true
            # Resource limits for each Fluent Bit process
            - name: FLUENT_BIT_RESOURCE_LIMITS
              value: "true"
          # Resources: Fluent Bit is lightweight per-node
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          # Readiness: Fluent Bit is ready when it's tailing files
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 2020
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          # Liveness: restart if the process hangs
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 2020
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          # Volume mounts
          volumeMounts:
            # Container logs: all pod stdout/stderr
            - name: varlogcontainers
              mountPath: /var/log/containers
              readOnly: true
            # Pod logs: symlink to container stdout
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
            # Docker/containerd logs: runtime-level logs
            - name: varlog
              mountPath: /var/log
              readOnly: true
            # Fluent Bit state storage (DB file for tail positions)
            - name: flb-storage
              mountPath: /var/log/flb-storage
            # Config files from ConfigMap
            - name: config
              mountPath: /fluent-bit/etc/fluent-bit.conf
              subPath: fluent-bit.conf
            - name: config
              mountPath: /fluent-bit/etc/parsers-custom.conf
              subPath: parsers-custom.conf
            - name: config
              mountPath: /fluent-bit/etc/plugins.conf
              subPath: plugins.conf
            # Systemd journal (for systemd input)
            - name: runlogjournal
              mountPath: /run/log/journal
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
          # Prometheus metrics exposed via annotation
      volumes:
        - name: varlogcontainers
          hostPath:
            path: /var/log/containers
            type: DirectoryOrCreate
        - name: varlogpods
          hostPath:
            path: /var/log/pods
            type: DirectoryOrCreate
        - name: varlog
          hostPath:
            path: /var/log
            type: DirectoryOrCreate
        - name: flb-storage
          hostPath:
            path: /var/log/flb-storage
            type: DirectoryOrCreate
        - name: config
          configMap:
            name: fluent-bit-config
        - name: runlogjournal
          hostPath:
            path: /run/log/journal
            type: DirectoryOrCreate
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
            type: DirectoryOrCreate

# ═══════════════════════════════════════════════════════════════════
# 4. Service — Prometheus metrics endpoint
# ═══════════════════════════════════════════════════════════════════

---
apiVersion: v1
kind: Service
metadata:
  name: fluent-bit-metrics
  namespace: kube-system
  labels:
    app.kubernetes.io/name: fluent-bit
    app.kubernetes.io/part-of: lazynext
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/component: logging
    k8s-app: fluent-bit
spec:
  type: ClusterIP
  clusterIP: None  # Headless service — each pod has its own metrics
  selector:
    k8s-app: fluent-bit
  ports:
    - name: http-metrics
      port: 2020
      targetPort: 2020
      protocol: TCP

# ═══════════════════════════════════════════════════════════════════
# 5. Prometheus ServiceMonitor — Fluent Bit metrics
# ═══════════════════════════════════════════════════════════════════

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: fluent-bit
  namespace: kube-system
  labels:
    app.kubernetes.io/name: fluent-bit
    app.kubernetes.io/part-of: lazynext
    app.kubernetes.io/component: logging
    release: prometheus
spec:
  selector:
    matchLabels:
      k8s-app: fluent-bit
  namespaceSelector:
    matchNames:
      - kube-system
  endpoints:
    - port: http-metrics
      path: /api/v1/metrics/prometheus
      interval: 30s
      scrapeTimeout: 10s
      # Relabel to add human-readable instance labels
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
