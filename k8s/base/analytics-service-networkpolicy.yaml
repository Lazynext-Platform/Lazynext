# ── Lazynext Analytics Service NetworkPolicy ─────────────────────────────
# Restricts ingress to analytics-service: only from api-gateway and
# Kafka brokers. The analytics service has no direct external access.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-analytics-service
  namespace: lazynext
spec:
  podSelector:
    matchLabels:
      app: lazynext-analytics-service
  policyTypes:
    - Ingress
  ingress:
    # Allow event ingestion from web app pods
    - from:
        - podSelector:
            matchLabels:
              app: lazynext-web
      ports:
        - protocol: TCP
          port: 8006
    # Allow metrics scraping from monitoring pods
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8006
