apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lazynext-ingress
  namespace: lazynext-production
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # Essential for proxying Yjs WebSockets
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "collab-server"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - api.lazynext.ai
      secretName: lazynext-tls-secret
  rules:
    - host: api.lazynext.ai
      http:
        paths:
          # WebSockets Route
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: collab-server
                port:
                  number: 8002
          # Render API Route
          - path: /api/v1/jobs
            pathType: Prefix
            backend:
              service:
                name: render-service
                port:
                  number: 8003
          # AI Pre-Processing Route
          - path: /api/v1/ai
            pathType: Prefix
            backend:
              service:
                name: pre-processing
                port:
                  number: 8004
