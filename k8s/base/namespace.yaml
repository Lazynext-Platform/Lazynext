# ── Lazynext Namespace ────────────────────────────────────────────
# Isolates all Lazynext resources. Enforces the restricted Pod Security
# Standard (v1.24+) with audit and warn modes for baseline violations.
apiVersion: v1
kind: Namespace
metadata:
  name: lazynext
  labels:
    name: lazynext
    environment: production
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
