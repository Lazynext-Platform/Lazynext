---
# ML Model Cache Warmup — Downloads models to shared PVC
# Runs on deployment and weekly to keep model cache fresh.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: model-warmup
  namespace: lazynext
  labels:
    app: model-warmup
spec:
  schedule: "0 2 * * 0"  # Weekly on Sunday at 2 AM
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: model-warmup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: warmup-whisper
              image: python:3.12-slim
              command:
                - sh
                - -c
                - |
                  pip install --quiet modal
                  echo "📥 Checking Whisper model on Modal Volume..."
                  python3 -c "
                  import os
                  path = '/models/modal/exports/whisper'
                  if os.path.exists(path):
                      print('✅ Whisper model cached at', path)
                  else:
                      print('⚠️ Whisper not found — stage on Modal Volume first')
                      print('   modal volume put lazynext-models exports/whisper/ /models/volume/exports/whisper/')
                  "

                  echo "📥 Checking SAM2 model on Modal Volume..."
                  python3 -c "
                  import os
                  path = '/models/modal/exports/sam2'
                  if os.path.exists(path):
                      print('✅ SAM2 model cached at', path)
                  else:
                      print('⚠️ SAM2 not found — stage on Modal Volume first')
                      print('   modal volume put lazynext-models exports/sam2/ /models/volume/exports/sam2/')
                  "

                  echo "📥 Checking RealESRGAN on Modal Volume..."
                  python3 -c "
                  import os
                  path = '/models/modal/exports/realesrgan'
                  if os.path.exists(path):
                      print('✅ RealESRGAN cached at', path)
                  else:
                      print('⚠️ RealESRGAN not found — stage on Modal Volume first')
                      print('   modal volume put lazynext-models exports/realesrgan/ /models/volume/exports/realesrgan/')
                  "
              volumeMounts:
                - name: model-cache
                  mountPath: /models
              resources:
                requests:
                  cpu: "1"
                  memory: "2Gi"
                limits:
                  cpu: "2"
                  memory: "4Gi"
          volumes:
            - name: model-cache
              persistentVolumeClaim:
                claimName: model-cache-pvc
---
# One-shot Job to warm models immediately (run once on first deploy)
apiVersion: batch/v1
kind: Job
metadata:
  name: model-warmup-once
  namespace: lazynext
  labels:
    app: model-warmup
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: warmup-all
          image: python:3.12-slim
          command:
            - sh
            - -c
            - |
              pip install --quiet modal

              MODELS="whisper-large-v3 sam2-hiera-large real-esrgan t5-v1_1-large embeddings-mini"

              for model in $MODELS; do
                echo "📥 Loading: $model from Modal Volume"
                python3 -c "
                import os
                model_path = f'/models/modal/exports/{os.environ.get(\"MODEL\", \"$model\")}'
                if os.path.exists(model_path):
                  print(f'✅ $model cached at {model_path}')
                else:
                  print(f'⚠️ $model not found — stage weights on Modal Volume first')
                  print(f'   modal volume put lazynext-models exports/\$model/ /models/volume/exports/\$model/')
                "
              done

              echo "📊 Cache size:"
              du -sh /models/modal

              echo "📋 Cached models:"
              ls /models/modal/models--*/
          volumeMounts:
            - name: model-cache
              mountPath: /models
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
            limits:
              cpu: "4"
              memory: "16Gi"
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache-pvc
---
# PersistentVolumeClaim for shared media rendering workspace
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-workspace-pvc
  namespace: lazynext
  labels:
    app: media-workspace
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard
