
# ── ResourceQuota ──
apiVersion: v1
kind: ResourceQuota
metadata:
  name: lazynext-quota
  namespace: lazynext
spec:
  hard:
    requests.cpu: "30"
    requests.memory: "64Gi"
    limits.cpu: "80"
    limits.memory: "128Gi"
    requests.nvidia.com/gpu: "4"
    persistentvolumeclaims: "20"
    requests.storage: "500Gi"
    count/deployments.apps: "20"
    count/services: "20"
    count/jobs.batch: "10"
    count/cronjobs.batch: "5"
    count/secrets: "30"
    count/configmaps: "15"
---
# ── LimitRange (default resource limits) ──
apiVersion: v1
kind: LimitRange
metadata:
  name: lazynext-limits
  namespace: lazynext
spec:
  limits:
    # Default for all containers
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "8"
        memory: "32Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
    # Max total per pod
    - type: Pod
      max:
        cpu: "16"
        memory: "64Gi"
---
# ── NetworkPolicy — default deny ingress (zero trust) ──
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: lazynext
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# ── SecurityContext defaults via PodPreset-like pattern ──
# Applied via Kyverno or manually in each Deployment
# Key settings:
#   runAsNonRoot: true
#   runAsUser: 1001
#   allowPrivilegeEscalation: false
#   seccompProfile: RuntimeDefault
#   capabilities.drop: [ALL]
#   readOnlyRootFilesystem: true (where possible)
---
# ── RuntimeClass for GPU workloads ──
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: nvidia-gpu
handler: nvidia
scheduling:
  nodeSelector:
    accelerator: nvidia
---
# ── PodPriorityClass (scheduling priority) ──
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: lazynext-critical
value: 1000000
globalDefault: false
description: "Critical Lazynext services — web app, database, sync server"
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: lazynext-high
value: 100000
globalDefault: false
description: "High priority — render service, AI agents"
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: lazynext-low
value: 10000
globalDefault: true
description: "Low priority — batch jobs, ML inference that can wait"
---
# ── TopologySpreadConstraints — applied per Deployment ──
# Example (put this in each Deployment spec):
# topologySpreadConstraints:
#   - maxSkew: 1
#     topologyKey: topology.kubernetes.io/zone
#     whenUnsatisfiable: ScheduleAnyway
#     labelSelector:
#       matchLabels:
#         app: lazynext-web
#   - maxSkew: 1
#     topologyKey: kubernetes.io/hostname
#     whenUnsatisfiable: ScheduleAnyway
#     labelSelector:
#       matchLabels:
#         app: lazynext-web
---
# ── External Secrets Operator — SecretStore ──
# Uses Azure Key Vault as the external secrets backend
# Requires: helm install external-secrets external-secrets/external-secrets
# Also requires Azure Workload Identity setup on AKS
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: azure-key-vault
  namespace: lazynext
spec:
  provider:
    azurekv:
      vaultUrl: https://lazynext-kv-production.vault.azure.net/
      authType: WorkloadIdentity
      serviceAccountRef:
        name: lazynext-sa
---
# ── ExternalSecret — syncs Azure Key Vault → K8s Secret ──
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: lazynext-external-secrets
  namespace: lazynext
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: azure-key-vault
    kind: SecretStore
  target:
    name: lazynext-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: DATABASE--URL
    - secretKey: BETTER_AUTH_SECRET
      remoteRef:
        key: better--auth--secret
      remoteRef:
        key: openai--api--key
      remoteRef:
        key: anthropic--api--key
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: gemini--api--key
    - secretKey: DODO_API_KEY
      remoteRef:
        key: dodo--api--key
    - secretKey: DODO_WEBHOOK_SECRET
      remoteRef:
        key: dodo--webhook--secret
    - secretKey: RESEND_API_KEY
      remoteRef:
        key: resend--api--key
    - secretKey: UPSTASH_REDIS_REST_TOKEN
      remoteRef:
        key: UPSTASH--REDIS--REST--TOKEN
    - secretKey: MARBLE_WORKSPACE_KEY
      remoteRef:
        key: MARBLE--WORKSPACE--KEY
    - secretKey: FREESOUND_CLIENT_ID
      remoteRef:
        key: FREESOUND--CLIENT--ID
    - secretKey: FREESOUND_API_KEY
      remoteRef:
        key: FREESOUND--API--KEY
    - secretKey: POSTHOG_KEY
      remoteRef:
        key: POSTHOG--KEY
