apiVersion: apps/v1
kind: Deployment
metadata:
  name: lazynext-web
  labels:
    app: lazynext-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lazynext-web
  template:
    metadata:
      labels:
        app: lazynext-web
    spec:
      containers:
      - name: web
        image: lazynext/web:latest
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: lazynext-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: lazynext-web-svc
spec:
  type: ClusterIP
  selector:
    app: lazynext-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
