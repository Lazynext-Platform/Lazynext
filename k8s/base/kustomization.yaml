# ── Base Kustomization ──
# Overlays for dev/staging/production extend this base
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: lazynext

resources:
  - namespace.yaml
  - secrets.yaml
  - configmap.yaml
  - databases.yaml
  - services.yaml
  - networking.yaml
  - autoscaling.yaml
  - budgets.yaml
  - backups.yaml
  - monitoring.yaml
  - redis-configmap.yaml
  - security-policies.yaml
  - rbac.yaml
  - pgbouncer.yaml
  - model-warmup.yaml
  - gpu.yaml
  - ingress.yaml

labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/part-of: lazynext

# Transform images to use GCP Artifact Registry (same images as Cloud Run)
images:
  - name: ghcr.io/lazynext-platform/lazynext-web
    newName: us-central1-docker.pkg.dev/vertexaiopencode/lazynext/lazynext-web
    newTag: latest
  - name: ghcr.io/lazynext-platform/lazynext-ai-agents
    newName: us-central1-docker.pkg.dev/vertexaiopencode/lazynext/lazynext-ai-agents
    newTag: latest
  - name: ghcr.io/lazynext-platform/lazynext-render-service
    newName: us-central1-docker.pkg.dev/vertexaiopencode/lazynext/lazynext-render-service
    newTag: latest
  - name: ghcr.io/lazynext-platform/lazynext-pre-processing
    newName: us-central1-docker.pkg.dev/vertexaiopencode/lazynext/lazynext-pre-processing
    newTag: latest
  - name: ghcr.io/lazynext-platform/lazynext-generative-studio
    newName: us-central1-docker.pkg.dev/vertexaiopencode/lazynext/lazynext-generative-studio
    newTag: latest
  - name: ghcr.io/lazynext-platform/lazynext-mcp
    newName: us-central1-docker.pkg.dev/vertexaiopencode/lazynext/lazynext-mcp
    newTag: latest
  - name: ghcr.io/lazynext-platform/lazynext-analytics-service
    newName: us-central1-docker.pkg.dev/vertexaiopencode/lazynext/lazynext-analytics-service
    newTag: latest

# Strategic merge patches for init containers
patches:
  - path: init-containers.yaml
