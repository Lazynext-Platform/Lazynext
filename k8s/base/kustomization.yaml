# ── Base Kustomization ──
# Overlays for dev/staging/production extend this base
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: lazynext

resources:
  - namespace.yaml
  - secrets.yaml
  - configmap.yaml
  - databases.yaml
  - services.yaml
  - networking.yaml
  - autoscaling.yaml
  - budgets.yaml
  - backups.yaml
  - monitoring.yaml
  - redis-configmap.yaml
  - security-policies.yaml
  - rbac.yaml
  - pgbouncer.yaml
  - model-warmup.yaml
  - gpu.yaml
  - ingress.yaml
  - collab-server-deployment.yaml
  - collab-server-networkpolicy.yaml
  - collab-server-ingress.yaml
  - analytics-service-networkpolicy.yaml
  - api-gateway-deployment.yaml
  - social-publish-deployment.yaml

labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/part-of: lazynext

# Transform images to use Azure Container Registry (same images as Container Apps)
images:
  - name: ghcr.io/lazynext-platform/lazynext-web
    newName: lazynextacrdevlmblwn.azurecr.io/lazynext-web
    newTag: latest
  - name: ghcr.io/lazynext-platform/lazynext-ai-agents
    newName: lazynextacrdevlmblwn.azurecr.io/lazynext-ai-agents
    newTag: latest
  - name: ghcr.io/lazynext-platform/lazynext-render-service
    newName: lazynextacrdevlmblwn.azurecr.io/lazynext-render-service
    newTag: latest
  - name: ghcr.io/lazynext-platform/lazynext-pre-processing
    newName: lazynextacrdevlmblwn.azurecr.io/lazynext-pre-processing
    newTag: latest
  - name: ghcr.io/lazynext-platform/lazynext-generative-studio
    newName: lazynextacrdevlmblwn.azurecr.io/lazynext-generative-studio
    newTag: latest
  - name: ghcr.io/lazynext-platform/lazynext-mcp
    newName: lazynextacrdevlmblwn.azurecr.io/lazynext-mcp
    newTag: latest
  - name: ghcr.io/lazynext-platform/lazynext-analytics-service
    newName: lazynextacrdevlmblwn.azurecr.io/lazynext-analytics-service
    newTag: latest
  - name: ghcr.io/lazynext-platform/lazynext-collab-server
    newName: lazynextacrdevlmblwn.azurecr.io/lazynext-collab-server
    newTag: latest
  - name: ghcr.io/lazynext-platform/lazynext-api-gateway
    newName: lazynextacrdevlmblwn.azurecr.io/lazynext-api-gateway
    newTag: latest
  - name: ghcr.io/lazynext-platform/lazynext-db-migrate
    newName: lazynextacrdevlmblwn.azurecr.io/lazynext-db-migrate
    newTag: latest
  - name: ghcr.io/lazynext-platform/lazynext-social-publish
    newName: lazynextacrdevlmblwn.azurecr.io/lazynext-social-publish
    newTag: latest

# Strategic merge patches for init containers
patches:
  - path: init-containers.yaml
