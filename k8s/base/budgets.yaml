  labels:
    app: lazynext-pre-processing
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: lazynext-pre-processing
---
# PodDisruptionBudget — Generative Studio (single replica — allow eviction)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: lazynext-gen-studio-pdb
  namespace: lazynext
  labels:
    app: lazynext-generative-studio
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: lazynext-generative-studio
