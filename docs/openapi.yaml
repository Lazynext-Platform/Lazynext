openapi: "3.1.0"
info:
  title: Lazynext API Gateway
  version: "1.0.0"
  description: |
    REST API for the Lazynext AI video editing platform.
    All endpoints except /health and /api/v1/stripe/webhook require JWT authentication.
    Use the Better Auth endpoint to obtain a token.
servers:
  - url: http://localhost:8005
    description: Local development
  - url: https://api.lazynext.ai
    description: Production
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Health check
      tags: [System]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  service: { type: string }

  /api/v1/autonomous_edit:
    post:
      summary: AI-powered video editing intent
      tags: [Editor]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt: { type: string, description: "Natural language editing intent" }
                require_plan_approval: { type: boolean, default: true }
                source_files: { type: array, items: { type: string } }
                llm_provider: { type: string, enum: [openai, anthropic, gemini, ollama] }
      responses:
        '200':
          description: Edit applied successfully
        '401': { description: Unauthorized }
        '403': { description: Insufficient permissions }
        '429': { description: Rate limit exceeded }

  /api/v1/timeline:
    get:
      summary: Get current timeline state
      tags: [Timeline]
      responses:
        '200':
          description: Full CRDT timeline state as JSON
    post:
      summary: Add a clip to the timeline
      tags: [Timeline]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                track_id: { type: string }
                track_kind: { type: string }
                clip_id: { type: string }
                clip_type: { type: string }
                name: { type: string }
                start: { type: integer }
                end: { type: integer }
      responses:
        '200': { description: Clip added }

  /api/v1/projects:
    get:
      summary: List all projects for the authenticated user
      tags: [Projects]
      responses:
        '200':
          description: Array of project objects

  /api/v1/user/profile:
    get:
      summary: Get authenticated user profile
      tags: [User]
      responses:
        '200':
          description: User profile with credits and tier

  /api/v1/user/credits:
    get:
      summary: Get user AI credits balance
      tags: [User]
      responses:
        '200':
          description: Current credit count

  /api/v1/ai/generate:
    post:
      summary: Generate AI video from text prompt
      tags: [AI]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt: { type: string }
      responses:
        '200': { description: Video generation queued }

  /api/v1/ai/tts:
    post:
      summary: Generate text-to-speech audio
      tags: [AI]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text: { type: string }
                voice_id: { type: string }
      responses:
        '200': { description: TTS generated and added to timeline }

  /api/v1/ai/ingest:
    post:
      summary: Ingest external media URL into the timeline
      tags: [AI]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url: { type: string, description: "Media URL to ingest" }
                source: { type: string, description: "Source identifier" }
      responses:
        '200': { description: Media ingestion queued }

  /api/v1/render:
    post:
      summary: Trigger a render job for the current timeline
      tags: [Render]
      responses:
        '200': { description: Render triggered }

  /api/v1/user/integrations/connect:
    post:
      summary: Connect a social media integration via OAuth
      tags: [Integrations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [platform]
              properties:
                platform: { type: string, enum: [youtube, tiktok, instagram, vimeo] }
                code: { type: string, description: "OAuth authorization code" }
                redirect_uri: { type: string }
      responses:
        '200': { description: Integration connected or OAuth URL returned }

  /api/v1/admin/dashboard:
    get:
      summary: Admin dashboard metrics
      tags: [Admin]
      responses:
        '200': { description: Admin metrics }
        '403': { description: Admin access required }

  /api/v1/stripe/webhook:
    post:
      summary: Stripe webhook endpoint (HMAC-SHA256 verified)
      tags: [Billing]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200': { description: Webhook received and verified }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Better Auth JWT token (HS256)
  schemas:
    Error:
      type: object
      properties:
        error: { type: string }
        message: { type: string }
    RateLimitError:
      type: object
      properties:
        error: { type: string, example: "rate_limit_exceeded" }
        message: { type: string }
        retry_after_seconds: { type: integer }
tags:
  - name: System
  - name: Editor
  - name: Timeline
  - name: Projects
  - name: User
  - name: AI
  - name: Render
  - name: Integrations
  - name: Admin
  - name: Billing
