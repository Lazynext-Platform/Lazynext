<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lazynext — Canvas Context Menu & Controls</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } }</script>
  <style>
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    .scale-in { animation: scaleIn 0.15s ease-out; }
    .minimap-viewport { transition: all 0.2s ease; }
  </style>
</head>
<body class="bg-slate-950 text-slate-50 font-sans h-screen overflow-hidden">

  <!-- Canvas Background -->
  <div class="relative w-full h-full" id="canvas">
    <!-- Grid pattern -->
    <svg class="absolute inset-0 w-full h-full opacity-[0.03]" xmlns="http://www.w3.org/2000/svg">
      <defs><pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M 32 0 L 0 0 0 32" fill="none" stroke="white" stroke-width="0.5"/></pattern></defs>
      <rect width="100%" height="100%" fill="url(#grid)"/>
    </svg>

    <!-- Sample Nodes on Canvas -->
    <div class="absolute" style="left: 200px; top: 160px;">
      <div class="w-56 bg-slate-900 border border-slate-700 rounded-xl p-4 shadow-lg">
        <div class="flex items-center gap-2 mb-2">
          <span class="w-2.5 h-2.5 rounded-full bg-blue-500"></span>
          <span class="text-[10px] text-blue-400 font-semibold uppercase">Task</span>
        </div>
        <h3 class="text-sm font-medium text-white">Design landing page</h3>
        <div class="flex items-center gap-2 mt-2">
          <span class="text-[10px] px-1.5 py-0.5 bg-amber-500/15 text-amber-400 rounded">In Progress</span>
          <span class="text-[10px] text-slate-500">Due Apr 10</span>
        </div>
      </div>
    </div>

    <div class="absolute" style="left: 560px; top: 120px;">
      <div class="w-56 bg-slate-900 border border-slate-700 rounded-xl p-4 shadow-lg">
        <div class="flex items-center gap-2 mb-2">
          <span class="w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
          <span class="text-[10px] text-emerald-400 font-semibold uppercase">Doc</span>
        </div>
        <h3 class="text-sm font-medium text-white">Brand Guidelines v2</h3>
        <p class="text-[10px] text-slate-500 mt-1">Last edited 2h ago</p>
      </div>
    </div>

    <div class="absolute" style="left: 380px; top: 340px;">
      <div class="w-56 bg-slate-900 border border-orange-500/30 rounded-xl p-4 shadow-lg">
        <div class="flex items-center gap-2 mb-2">
          <span class="w-2.5 h-2.5 rounded-full bg-orange-500"></span>
          <span class="text-[10px] text-orange-400 font-semibold uppercase">Decision</span>
        </div>
        <h3 class="text-sm font-medium text-white">Choose analytics provider</h3>
        <div class="flex items-center gap-2 mt-2">
          <span class="text-lg font-bold text-emerald-400">72</span>
          <span class="text-[10px] text-slate-500">Quality Score</span>
        </div>
      </div>
    </div>

    <!-- Edge line -->
    <svg class="absolute inset-0 w-full h-full pointer-events-none" style="z-index: 0;">
      <line x1="456" y1="200" x2="560" y2="170" stroke="#334155" stroke-width="2" stroke-dasharray="6,4"/>
      <line x1="328" y1="250" x2="430" y2="340" stroke="#334155" stroke-width="2" stroke-dasharray="6,4"/>
    </svg>

    <!-- ========== RIGHT-CLICK CONTEXT MENU (Canvas) ========== -->
    <div id="canvasMenu" class="absolute scale-in" style="left: 700px; top: 280px; z-index: 40;">
      <div class="w-52 bg-slate-900 border border-slate-700 rounded-xl shadow-2xl overflow-hidden py-1">
        <div class="px-3 py-1.5 text-[10px] text-slate-500 font-semibold uppercase tracking-wider">Create Node</div>
        <button class="w-full flex items-center gap-3 px-3 py-2 hover:bg-slate-800 text-left">
          <span class="w-6 h-6 rounded-md bg-blue-500/15 flex items-center justify-center"><span class="w-2 h-2 rounded-full bg-blue-500"></span></span>
          <span class="text-xs text-slate-200">Task</span>
          <span class="ml-auto text-[10px] text-slate-600">T</span>
        </button>
        <button class="w-full flex items-center gap-3 px-3 py-2 hover:bg-slate-800 text-left">
          <span class="w-6 h-6 rounded-md bg-emerald-500/15 flex items-center justify-center"><span class="w-2 h-2 rounded-full bg-emerald-500"></span></span>
          <span class="text-xs text-slate-200">Doc</span>
          <span class="ml-auto text-[10px] text-slate-600">D</span>
        </button>
        <button class="w-full flex items-center gap-3 px-3 py-2 hover:bg-slate-800 text-left">
          <span class="w-6 h-6 rounded-md bg-orange-500/15 flex items-center justify-center"><span class="w-2 h-2 rounded-full bg-orange-500"></span></span>
          <span class="text-xs text-slate-200">Decision</span>
          <span class="ml-auto text-[10px] text-slate-600">Q</span>
        </button>
        <button class="w-full flex items-center gap-3 px-3 py-2 hover:bg-slate-800 text-left">
          <span class="w-6 h-6 rounded-md bg-purple-500/15 flex items-center justify-center"><span class="w-2 h-2 rounded-full bg-purple-500"></span></span>
          <span class="text-xs text-slate-200">Thread</span>
          <span class="ml-auto text-[10px] text-slate-600">H</span>
        </button>
        <div class="border-t border-slate-800 my-1"></div>
        <button class="w-full flex items-center gap-3 px-3 py-2 hover:bg-slate-800 text-left">
          <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          <span class="text-xs text-slate-200">Paste</span>
          <span class="ml-auto text-[10px] text-slate-600">⌘V</span>
        </button>
        <button class="w-full flex items-center gap-3 px-3 py-2 hover:bg-slate-800 text-left">
          <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          <span class="text-xs text-slate-200">Fit to view</span>
          <span class="ml-auto text-[10px] text-slate-600">⌘1</span>
        </button>
        <button class="w-full flex items-center gap-3 px-3 py-2 hover:bg-slate-800 text-left">
          <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          <span class="text-xs text-slate-200">Export as PNG</span>
        </button>
      </div>
    </div>

    <!-- ========== RIGHT-CLICK CONTEXT MENU (Node) ========== -->
    <div id="nodeMenu" class="absolute scale-in" style="left: 150px; top: 420px; z-index: 40;">
      <div class="w-52 bg-slate-900 border border-slate-700 rounded-xl shadow-2xl overflow-hidden py-1">
        <div class="px-3 py-1.5 text-[10px] text-slate-500 font-semibold uppercase tracking-wider">Node Actions</div>
        <button class="w-full flex items-center gap-3 px-3 py-2 hover:bg-slate-800 text-left">
          <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
          <span class="text-xs text-slate-200">Edit</span>
          <span class="ml-auto text-[10px] text-slate-600">Enter</span>
        </button>
        <button class="w-full flex items-center gap-3 px-3 py-2 hover:bg-slate-800 text-left">
          <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
          <span class="text-xs text-slate-200">Duplicate</span>
          <span class="ml-auto text-[10px] text-slate-600">⌘D</span>
        </button>
        <button class="w-full flex items-center gap-3 px-3 py-2 hover:bg-slate-800 text-left">
          <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
          <span class="text-xs text-slate-200">Connect to…</span>
        </button>
        <button class="w-full flex items-center gap-3 px-3 py-2 hover:bg-slate-800 text-left">
          <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
          <span class="text-xs text-slate-200">Change type</span>
        </button>
        <div class="border-t border-slate-800 my-1"></div>
        <button class="w-full flex items-center gap-3 px-3 py-2 hover:bg-slate-800 text-left">
          <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>
          <span class="text-xs text-slate-200">Copy link</span>
        </button>
        <button class="w-full flex items-center gap-3 px-3 py-2 hover:bg-red-500/10 text-left group">
          <svg class="w-4 h-4 text-red-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
          <span class="text-xs text-red-400">Delete</span>
          <span class="ml-auto text-[10px] text-slate-600">⌫</span>
        </button>
      </div>
    </div>

    <!-- ========== ZOOM CONTROLS (Bottom Right) ========== -->
    <div class="absolute bottom-6 right-6 z-30 flex flex-col items-center gap-2">
      <!-- Zoom buttons -->
      <div class="bg-slate-900 border border-slate-700 rounded-xl overflow-hidden shadow-lg">
        <button id="zoomIn" class="w-10 h-10 flex items-center justify-center hover:bg-slate-800 text-slate-400 hover:text-white transition-colors border-b border-slate-700">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 6v12m6-6H6"/></svg>
        </button>
        <div class="w-10 h-8 flex items-center justify-center text-[10px] text-slate-400 font-mono" id="zoomLevel">100%</div>
        <button id="zoomOut" class="w-10 h-10 flex items-center justify-center hover:bg-slate-800 text-slate-400 hover:text-white transition-colors border-t border-slate-700">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 12H6"/></svg>
        </button>
      </div>
      <!-- Fit to view -->
      <button class="w-10 h-10 bg-slate-900 border border-slate-700 rounded-xl flex items-center justify-center hover:bg-slate-800 text-slate-400 hover:text-white transition-colors shadow-lg" title="Fit to view (⌘1)">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/></svg>
      </button>
      <!-- Lock/unlock -->
      <button class="w-10 h-10 bg-slate-900 border border-slate-700 rounded-xl flex items-center justify-center hover:bg-slate-800 text-slate-400 hover:text-white transition-colors shadow-lg" title="Lock canvas">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"/></svg>
      </button>
    </div>

    <!-- ========== MINIMAP (Bottom Left) ========== -->
    <div class="absolute bottom-6 left-6 z-30">
      <div class="w-48 h-32 bg-slate-900/90 border border-slate-700 rounded-xl shadow-lg overflow-hidden backdrop-blur-sm">
        <div class="px-2 py-1 border-b border-slate-800 flex items-center justify-between">
          <span class="text-[9px] text-slate-500 font-medium">Minimap</span>
          <button class="text-slate-500 hover:text-slate-300" id="toggleMinimap">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg>
          </button>
        </div>
        <div class="relative p-2 h-[calc(100%-24px)]" id="minimapContent">
          <!-- Mini nodes -->
          <div class="absolute w-8 h-4 bg-blue-500/30 rounded-sm" style="left: 15%; top: 25%;"></div>
          <div class="absolute w-8 h-4 bg-emerald-500/30 rounded-sm" style="left: 55%; top: 18%;"></div>
          <div class="absolute w-8 h-4 bg-orange-500/30 rounded-sm" style="left: 35%; top: 55%;"></div>
          <!-- Mini edges -->
          <svg class="absolute inset-0 w-full h-full">
            <line x1="35%" y1="32%" x2="55%" y2="25%" stroke="#334155" stroke-width="0.5"/>
            <line x1="28%" y1="40%" x2="40%" y2="55%" stroke="#334155" stroke-width="0.5"/>
          </svg>
          <!-- Viewport indicator -->
          <div class="minimap-viewport absolute border-2 border-[#4F6EF7]/50 bg-[#4F6EF7]/5 rounded-sm" style="left: 5%; top: 10%; width: 60%; height: 70%;"></div>
        </div>
      </div>
    </div>

    <!-- ========== LABELS ========== -->
    <!-- Label for Canvas Menu -->
    <div class="absolute bg-[#4F6EF7] text-white text-[10px] font-semibold px-2 py-1 rounded-md" style="left: 860px; top: 260px; z-index: 50;">
      Right-click canvas menu
      <div class="absolute -left-1 top-1/2 -translate-y-1/2 w-2 h-2 bg-[#4F6EF7] rotate-45"></div>
    </div>

    <!-- Label for Node Menu -->
    <div class="absolute bg-orange-500 text-white text-[10px] font-semibold px-2 py-1 rounded-md" style="left: 30px; top: 400px; z-index: 50;">
      Right-click node menu
      <div class="absolute -right-1 top-1/2 -translate-y-1/2 w-2 h-2 bg-orange-500 rotate-45"></div>
    </div>

    <!-- Label for Zoom -->
    <div class="absolute bg-emerald-500 text-white text-[10px] font-semibold px-2 py-1 rounded-md" style="right: 80px; bottom: 60px; z-index: 50;">
      Zoom controls
      <div class="absolute -right-1 top-1/2 -translate-y-1/2 w-2 h-2 bg-emerald-500 rotate-45"></div>
    </div>

    <!-- Label for Minimap -->
    <div class="absolute bg-purple-500 text-white text-[10px] font-semibold px-2 py-1 rounded-md" style="left: 210px; bottom: 60px; z-index: 50;">
      Minimap with viewport
      <div class="absolute -left-1 top-1/2 -translate-y-1/2 w-2 h-2 bg-purple-500 rotate-45"></div>
    </div>
  </div>

  <script>
    // Zoom controls
    let zoom = 100;
    document.getElementById('zoomIn').addEventListener('click', () => {
      zoom = Math.min(200, zoom + 10);
      document.getElementById('zoomLevel').textContent = zoom + '%';
    });
    document.getElementById('zoomOut').addEventListener('click', () => {
      zoom = Math.max(25, zoom - 10);
      document.getElementById('zoomLevel').textContent = zoom + '%';
    });

    // Minimap toggle
    const minimapContent = document.getElementById('minimapContent');
    document.getElementById('toggleMinimap').addEventListener('click', () => {
      minimapContent.classList.toggle('hidden');
    });

    // Right-click prevention for demo
    document.getElementById('canvas').addEventListener('contextmenu', (e) => {
      e.preventDefault();
    });
  </script>
</body>
</html>
