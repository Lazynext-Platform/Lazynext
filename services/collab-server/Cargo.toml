[package]
name = "collab-server"
version = "0.1.0"
edition = "2024"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
axum = { version = "0.8.1", features = ["ws"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
tracing-subscriber = "0.3"
dashmap = "6"
# y-sync removed — was declared but never imported (dead dependency)
jsonwebtoken = "10"
base64 = "0.22"
uuid = { version = "1.0", features = ["v4"] }
