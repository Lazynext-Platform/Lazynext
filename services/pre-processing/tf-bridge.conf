# ── TensorFlow Serving REST/gRPC Bridge ──────────────────────────
# Nginx reverse proxy for batching REST requests to TF Serving gRPC.
# Mounted in docker-compose.tensorflow.yml

daemon off;

worker_processes auto;
worker_rlimit_nofile 65535;

error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    access_log /dev/stdout;
    include /etc/nginx/mime.types;

    upstream tf_serving {
        least_conn;
        server tensorflow-serving:8501 max_fails=3 fail_timeout=30s;
    }

    # Rate limiting — 100 requests/second per IP
    limit_req_zone $binary_remote_addr zone=tf_limit:10m rate=100r/s;
    limit_req_status 429;

    server {
        listen 80 backlog=4096;

        # Client body size for large batched inference payloads
        client_max_body_size 500M;
        client_body_timeout 300s;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;

        # Health check
        location /health {
            proxy_pass http://tf_serving/v1/models/lazynext_models;
            proxy_set_header Host $host;
        }

        # Model metadata
        location /v1/models/lazynext_models {
            proxy_pass http://tf_serving;
            proxy_set_header Host $host;
        }

        # Batch predict — with rate limiting
        location /v1/models/lazynext_models:predict {
            limit_req zone=tf_limit burst=200 nodelay;
            proxy_pass http://tf_serving;
            proxy_set_header Host $host;
        }

        # Classify endpoint
        location /v1/models/lazynext_models:classify {
            limit_req zone=tf_limit burst=50 nodelay;
            proxy_pass http://tf_serving;
            proxy_set_header Host $host;
        }

        # Regress endpoint
        location /v1/models/lazynext_models:regress {
            limit_req zone=tf_limit burst=50 nodelay;
            proxy_pass http://tf_serving;
            proxy_set_header Host $host;
        }
    }
}
