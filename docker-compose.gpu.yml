# Lazynext GPU-Accelerated Docker Compose Profile
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up
#
# Enables NVIDIA GPU acceleration for:
#   - pre-processing (SAM2, Whisper, NeRF)
#   - generative-studio (Stable Diffusion, RealESRGAN)
#   - render-service (NVENC encoding)
#
# Prerequisites:
#   - NVIDIA Container Toolkit: https://docs.nvidia.com/datacenter/cloud-native/
#   - nvidia-container-runtime
#   - CUDA 12.4+ drivers

services:
  # ── GPU-Accelerated Pre-Processing ─────────────────────────────────
  pre-processing:
    build:
      context: services/pre-processing
      dockerfile: Dockerfile.gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, compute, utility]
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - ONNX_PROVIDER=CUDAExecutionProvider
      - TORCH_DEVICE=cuda
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - model-cache:/models  # Shared model cache

  # ── GPU-Accelerated Generative Studio ──────────────────────────────
  generative-studio:
    build:
      context: services/generative-studio
      dockerfile: Dockerfile.gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, compute]
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - DIFFUSERS_DEVICE=cuda
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512
    volumes:
      - model-cache:/models

  # ── NVENC-Accelerated Render Service ───────────────────────────────
  render-service:
    environment:
      - FFMPEG_HWACCEL=nvenc
      - FFMPEG_ENCODER=h264_nvenc
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, compute, video]

  # ── Shared Model Cache Volume ──────────────────────────────────────
  model-warmup:
    image: alpine:latest
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Model cache ready. Pre-download models with:"
        echo "  docker compose -f docker-compose.gpu.yml run model-downloader"
    volumes:
      - model-cache:/models

  # ── Model Downloader CronJob (one-shot) ────────────────────────────
  model-downloader:
    image: appropriate/curl:latest
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        MODELS_DIR=/models
        mkdir -p $MODELS_DIR
        
        echo "Downloading SAM2..."
        curl -L -o $MODELS_DIR/sam2_hiera_large.onnx \
          https://dl.fbaipublicfiles.com/segment_anything_2/sam2_hiera_large.onnx
        
        echo "Downloading RealESRGAN..."
        curl -L -o $MODELS_DIR/RealESRGAN_x4plus.pth \
          https://github.com/xinntao/Real-ESRGAN/releases/download/v0.1.0/RealESRGAN_x4plus.pth
        
        echo "Downloading Whisper large-v3..."
        curl -L -o $MODELS_DIR/whisper-large-v3.pt \
          https://huggingface.co/openai/whisper-large-v3/resolve/main/pytorch_model.bin
        
        echo "All models downloaded."
    volumes:
      - model-cache:/models
    profiles:
      - download-models

volumes:
  model-cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HOME}/.cache/lazynext/models
