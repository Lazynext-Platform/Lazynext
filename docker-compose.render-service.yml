# ── Render Service — Standalone Development ──────────────────────
# Usage: docker compose -f docker-compose.render-service.yml up
services:
  render-service:
    build:
      context: ./services/render-service
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    environment:
      - NODE_ENV=development
      - PORT=8003
      - FFMPEG_PATH=/usr/bin/ffmpeg
      - FFPROBE_PATH=/usr/bin/ffprobe
      - STORAGE_PROVIDER=local
    volumes:
      - ./services/render-service/src:/app/src:delegated
    command: ["bun", "--watch", "run", "src/index.ts"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8003/health"]
      interval: 30s
      start_period: 10s
    networks:
      - render-net

networks:
  render-net:
    driver: bridge
