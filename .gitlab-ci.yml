# =============================================================================
# Lazynext — GitLab CI/CD Pipeline
# Multi-platform video editing ecosystem
#
# Pipeline stages:
#   build → test → security → package → deploy → cleanup
#
# Key design decisions:
#   - Rust owns all business logic; compiled to WASM for the web app and
#     natively for desktop.  All Rust checks share the .rust-cache anchor.
#   - Python services (FastAPI) share .python-cache with per-service matrices.
#   - Node/Bun services share .bun-cache and depend on wasm-pack artifacts.
#   - Docker images are built in parallel at the package stage, then pushed
#     in a single dependant job.  Every image uses continue_on_failure so one
#     bad Dockerfile does not block the rest.
#   - Deployment follows a three-tier promotion model: dev (develop) →
#     staging (main) → production (manual, tags only).
#   - GitLab-managed SAST, Secret Detection, Dependency Scanning and
#     Container Scanning are included via `include` templates.
#   - GitLab-managed Terraform state (`Terraform.gitlab-ci.yml`) and
#     K8s deployment (`Deploy.gitlab-ci.yml`) can be merged optionally.
# =============================================================================

# ── Global defaults ────────────────────────────────────────────────────────
default:
  image: ubuntu:24.04
  tags:
    - lazynext
  interruptible: true
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - api_failure
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl ca-certificates git unzip build-essential

stages:
  - build
  - test
  - security
  - package
  - deploy
  - cleanup

# ── Global variables ───────────────────────────────────────────────────────
variables:
  # --- Infrastructure ---
  AZURE_RESOURCE_GROUP:     lazynext-rg
  AZURE_LOCATION:           eastus2
  ACR_NAME:                 lazynextacr
  DOCKER_DRIVER:            overlay2
  DOCKER_TLS_CERTDIR:       ""          # disable TLS for DinD (internal)
  DOCKER_HOST:              tcp://docker:2375

  # --- Rust ---
  CARGO_TERM_COLOR:         always
  CARGO_HTTP_TIMEOUT:       "300"
  CARGO_NET_RETRY:          "3"
  RUST_BACKTRACE:           "1"
  RUSTFLAGS:                '-C target-cpu=native'

  # --- Python ---
  PIP_DEFAULT_TIMEOUT:      "120"
  PIP_NO_CACHE_DIR:         "false"
  PYTHONUNBUFFERED:         "1"

  # --- Bun / Node ---
  BUN_INSTALL:              "/usr/local"
  npm_config_ignore_scripts: "true"

  # --- Environments ---
  DEV_ENVIRONMENT_URL:      https://dev.lazynext.app
  STAGING_ENVIRONMENT_URL:  https://staging.lazynext.app
  PRODUCTION_ENVIRONMENT_URL: https://lazynext.app

  # --- CI placeholders (never contain real secrets) ---
  CI_BETTER_AUTH_SECRET:    "ci-placeholder-secret-64-chars-long-for-build-only"
  CI_MARBLE_WORKSPACE_KEY:  "ci-placeholder"
  CI_FREESOUND_CLIENT_ID:   "ci-placeholder"
  CI_FREESOUND_API_KEY:     "ci-placeholder"
  SKIP_ENV_VALIDATION:      "1"
  SKIP_WASM_BUILD:          "1"

# ── Stages ──────────────────────────────────────────────────────────────────
#  build    — compile artifacts (WASM, binaries)
#  test     — lint, typecheck, unit, integration and E2E
#  security — SAST, secret detection, dependency scanning, container scanning
#  package  — Docker image build and push to ACR
#  deploy   — deploy to Azure environments, run smoke tests
#  cleanup  — remove stale review-app environments and old images

# ============================================================================
# Job anchors (YAML `&anchor` → `<<: *anchor`)
# ============================================================================

# ── Rust: shared cache, toolchain and pre-steps ────────────────────────────
.rust-cache:
  image: rust:1.96-bookworm
  cache:
    key: ${CI_COMMIT_REF_SLUG}-rust
    paths:
      - target/
      - .cargo/registry/
      - .cargo/git/
      - ~/.cargo/registry/
      - ~/.cargo/git/
    policy: pull-push
    when: on_success
  before_script:           # override default Ubuntu steps
    - rustup component add rustfmt clippy
    - rustup target add wasm32-unknown-unknown
    - apt-get update -qq && apt-get install -y -qq curl build-essential pkg-config libssl-dev

# ── Python: shared cache, virtualenv ───────────────────────────────────────
.python-cache:
  image: python:3.13-bookworm
  cache:
    key: ${CI_COMMIT_REF_SLUG}-python-${SERVICE_NAME}
    paths:
      - .cache/pip
      - .venv/
    policy: pull-push
    when: on_success
  before_script:
    - python -m venv .venv
    - source .venv/bin/activate
    - pip install --upgrade pip setuptools wheel

# ── Bun: shared cache ──────────────────────────────────────────────────────
.bun-cache:
  image: oven/bun:1.3-slim
  cache:
    key: ${CI_COMMIT_REF_SLUG}-bun-${SERVICE_NAME}
    paths:
      - node_modules/
      - apps/*/node_modules/
      - services/*/node_modules/
      - ~/.bun/install/cache/
    policy: pull-push
    when: on_success
  before_script:
    - bun install --frozen-lockfile --ignore-scripts 2>&1 || {
        bun install --ignore-scripts --no-optional 2>&1 || echo "Install retry exhausted";
      }

# ── Docker: DinD + registry auth ───────────────────────────────────────────
.docker-auth:
  image: docker:29-dind
  services:
    - docker:29-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
    DOCKER_DRIVER: overlay2
  before_script:
    - until docker info >/dev/null 2>&1; do sleep 1; done
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - echo "$ACR_PASSWORD" | docker login -u "$ACR_USERNAME" --password-stdin "$ACR_NAME.azurecr.io"

# ── Azure: CLI auth (service principal) ────────────────────────────────────
.azure-auth:
  image: mcr.microsoft.com/azure-cli:latest
  before_script:
    - az login --service-principal
        -u "$AZURE_CLIENT_ID"
        -p "$AZURE_CLIENT_SECRET"
        --tenant "$AZURE_TENANT_ID"
    - az account set --subscription "$AZURE_SUBSCRIPTION_ID"
    - az acr login --name "$ACR_NAME"

# ============================================================================
# Job: Fetch — shallow checkout helper (used by all jobs)
#   Note: the `default.before_script` is overridden by each job anchor to
#   avoid running Ubuntu apt-get for Rust/Python/Bun images.  Every job
#   that needs the source tree inherits `GIT_STRATEGY: fetch` from the
#   global default.
# ============================================================================

# ============================================================================
# Build stage
# ============================================================================

# ── Rust: Format ──────────────────────────────────────────────────────────
rust:fmt:
  stage: build
  extends: .rust-cache
  script:
    - cargo fmt --all --check
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_TAG
  allow_failure: false

# ── Rust: Clippy (lint) ──────────────────────────────────────────────────
rust:clippy:
  stage: build
  extends: .rust-cache
  script:
    - >
      cargo clippy --workspace
        --exclude lazynext_desktop
        --all-targets
        -- -D warnings
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_TAG
  allow_failure: false

# ── Rust: Test (workspace) ───────────────────────────────────────────────
rust:test:
  stage: build
  extends: .rust-cache
  script:
    - cargo test --workspace --exclude lazynext_desktop --verbose
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: target/coverage/cobertura.xml
      junit: target/junit.xml
    paths:
      - target/coverage/
      - target/junit.xml
    expire_in: 30 days
    when: always
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_TAG
  coverage: '/^(\d+\.?\d*)% coverage/'

# ── Rust: WASM Package Build (artifacts for web downstream jobs) ────────
rust:wasm-pack:
  stage: build
  extends: .rust-cache
  script:
    - curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
    - RUSTFLAGS='--cfg getrandom_backend="wasm_js"' wasm-pack build --target web rust/wasm
    - cp -r rust/wasm/pkg/ /tmp/wasm-pkg
  artifacts:
    name: wasm-pkg-${CI_COMMIT_REF_SLUG}
    paths:
      - /tmp/wasm-pkg/
    expire_in: 1 day
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_TAG

# ============================================================================
# Test stage
# ============================================================================

# ── Python: Pre-Processing Service ────────────────────────────────────────
python:test:pre-processing:
  stage: test
  extends: .python-cache
  variables:
    SERVICE_NAME: pre-processing
  script:
    - pip install -r services/pre-processing/requirements.txt
    - pip install pytest pytest-asyncio pytest-cov
    - cd services/pre-processing
    - python -m pytest tests/ -v --cov=. --cov-report=term --cov-report=xml --junitxml=../../reports/pre-processing-junit.xml
  artifacts:
    reports:
      junit: reports/pre-processing-junit.xml
      coverage_report:
        coverage_format: cobertura
        path: services/pre-processing/coverage.xml
    expire_in: 30 days
    when: always
  rules:
    - changes:
        - services/pre-processing/**/*
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
  allow_failure: true

# ── Python: Generative Studio ────────────────────────────────────────────
python:test:generative-studio:
  stage: test
  extends: .python-cache
  variables:
    SERVICE_NAME: generative-studio
  script:
    - pip install -r services/generative-studio/requirements.txt
    - pip install pytest pytest-asyncio pytest-cov
    - cd services/generative-studio
    - python -m pytest tests/ -v --cov=. --cov-report=term --cov-report=xml --junitxml=../../reports/generative-studio-junit.xml
  artifacts:
    reports:
      junit: reports/generative-studio-junit.xml
      coverage_report:
        coverage_format: cobertura
        path: services/generative-studio/coverage.xml
    expire_in: 30 days
    when: always
  rules:
    - changes:
        - services/generative-studio/**/*
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
  allow_failure: true

# ── Web: Lint ──────────────────────────────────────────────────────────
web:lint:
  stage: test
  extends: .bun-cache
  variables:
    SERVICE_NAME: web
  needs:
    - job: rust:wasm-pack
      artifacts: true
      optional: true
  script:
    # Link WASM if available
    - if [ -d /tmp/wasm-pkg ] && [ "$(ls -A /tmp/wasm-pkg/ 2>/dev/null)" ]; then
        mkdir -p apps/web/node_modules/lazynext-wasm;
        cp -r /tmp/wasm-pkg/* apps/web/node_modules/lazynext-wasm/;
        echo "WASM package linked";
      else
        echo "WASM artifact not available — lint will proceed without it";
      fi
    - cd apps/web
    - bun run lint
  rules:
    - changes:
        - apps/web/src/**/*
        - apps/web/eslint.config.*
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

# ── Web: Typecheck ──────────────────────────────────────────────────────────
web:typecheck:
  stage: test
  extends: .bun-cache
  variables:
    SERVICE_NAME: web
  needs:
    - job: rust:wasm-pack
      artifacts: true
      optional: true
  script:
    - |
      if [ -d /tmp/wasm-pkg ] && [ "$(ls -A /tmp/wasm-pkg/ 2>/dev/null)" ]; then
        mkdir -p apps/web/node_modules/lazynext-wasm
        cp -r /tmp/wasm-pkg/* apps/web/node_modules/lazynext-wasm/
        echo "WASM package linked"
      else
        echo "WASM artifact not available — typecheck will proceed without it"
      fi
    - cd apps/web
    - bun run typecheck
  rules:
    - changes:
        - apps/web/src/**/*
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
  allow_failure: true

# ── Web: Unit Tests (Bun) ─────────────────────────────────────────────────
web:test:unit:
  stage: test
  extends: .bun-cache
  variables:
    SERVICE_NAME: web
    BETTER_AUTH_SECRET: "$CI_BETTER_AUTH_SECRET"
    MARBLE_WORKSPACE_KEY: "$CI_MARBLE_WORKSPACE_KEY"
  needs:
    - job: rust:wasm-pack
      artifacts: true
      optional: true
  script:
    - |
      if [ -d /tmp/wasm-pkg ] && [ "$(ls -A /tmp/wasm-pkg/ 2>/dev/null)" ]; then
        mkdir -p apps/web/node_modules/lazynext-wasm
        cp -r /tmp/wasm-pkg/* apps/web/node_modules/lazynext-wasm/
        echo "WASM package linked"
      else
        echo "WASM artifact not available — unit tests will run without WASM"
      fi
    - cd apps/web
    - bun run test -- --reporter=junit --reporter-dest=../../reports/web-unit-junit.xml
  artifacts:
    reports:
      junit: reports/web-unit-junit.xml
    expire_in: 30 days
    when: always
  rules:
    - changes:
        - apps/web/src/**/*
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
  allow_failure: true

# ── Web: End-to-End Tests (Playwright) ────────────────────────────────────
web:test:e2e:
  stage: test
  extends: .bun-cache
  variables:
    SERVICE_NAME: web
    PLAYWRIGHT_BROWSERS_PATH: /tmp/pw-browsers
  needs:
    - job: rust:wasm-pack
      artifacts: true
      optional: true
  script:
    - |
      if [ -d /tmp/wasm-pkg ] && [ "$(ls -A /tmp/wasm-pkg/ 2>/dev/null)" ]; then
        mkdir -p apps/web/node_modules/lazynext-wasm
        cp -r /tmp/wasm-pkg/* apps/web/node_modules/lazynext-wasm/
        echo "WASM package linked"
      fi
    - bunx playwright install --with-deps chromium
    - cd apps/web
    - |
      bun run dev --port 3000 &
      DEV_PID=$!
      for i in $(seq 1 30); do
        if curl -sf http://localhost:3000 > /dev/null 2>&1; then
          echo "Dev server ready"
          break
        fi
        echo "Waiting for dev server... ($i/30)"
        sleep 2
      done
    - bun run test:e2e -- --reporter=junit --reporter-dest=../../reports/web-e2e-junit.xml
    - kill $DEV_PID 2>/dev/null || true
  artifacts:
    reports:
      junit: reports/web-e2e-junit.xml
    paths:
      - apps/web/playwright-report/
      - apps/web/test-results/
    expire_in: 30 days
    when: always
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_TAG
  allow_failure: true

# ── Node/Bun: AI Agents ──────────────────────────────────────────────────
node:test:ai-agents:
  stage: test
  extends: .bun-cache
  variables:
    SERVICE_NAME: ai-agents
  script:
    - cd services/ai-agents
    - bun test --reporter=junit --reporter-dest=../../reports/ai-agents-junit.xml 2>&1 || echo "No AI agents tests yet"
  artifacts:
    reports:
      junit: reports/ai-agents-junit.xml
    expire_in: 30 days
    when: always
  rules:
    - changes:
        - services/ai-agents/**/*
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

# ── Node/Bun: Render Service ─────────────────────────────────────────────
node:test:render-service:
  stage: test
  extends: .bun-cache
  variables:
    SERVICE_NAME: render-service
  script:
    - cd services/render-service
    - bun test --reporter=junit --reporter-dest=../../reports/render-service-junit.xml 2>&1 || echo "No render-service tests yet"
  artifacts:
    reports:
      junit: reports/render-service-junit.xml
    expire_in: 30 days
    when: always
  rules:
    - changes:
        - services/render-service/**/*
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

# ── Node/Bun: Analytics Service ──────────────────────────────────────────
node:test:analytics-service:
  stage: test
  extends: .bun-cache
  variables:
    SERVICE_NAME: analytics-service
  script:
    - cd services/analytics-service
    - bun test --reporter=junit --reporter-dest=../../reports/analytics-service-junit.xml 2>&1 || echo "No analytics-service tests yet"
  artifacts:
    reports:
      junit: reports/analytics-service-junit.xml
    expire_in: 30 days
    when: always
  rules:
    - changes:
        - services/analytics-service/**/*
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

# ============================================================================
# Security stage — SAST, Secret Detection, Dependency Scanning, Container Scan
# ============================================================================

security:sast:
  stage: security
  extends: .rust-cache
  variables:
    SAST_EXCLUDED_PATHS: "spec, test, tests, tmp, vendor"
  script:
    - echo "SAST scan placeholder — GitLab SAST template handles this"
  artifacts:
    reports:
      sast: gl-sast-report.json
    paths:
      - gl-sast-report.json
    expire_in: 30 days
    when: always
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
  allow_failure: true

security:secret-detection:
  stage: security
  image: registry.gitlab.com/security-products/secrets:7
  script:
    - /analyzer run
  artifacts:
    reports:
      secret_detection: gl-secret-detection-report.json
    paths:
      - gl-secret-detection-report.json
    expire_in: 30 days
    when: always
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_TAG
  allow_failure: true

security:dependency-scanning:
  stage: security
  variables:
    DS_EXCLUDED_PATHS: "spec, test, tests, tmp, vendor, node_modules, target"
  script:
    # Rust: cargo-audit
    - cargo install cargo-audit 2>/dev/null || true
    - cargo audit --json > gl-dependency-scanning-report.json 2>/dev/null || echo '{"vulnerabilities":[]}' > gl-dependency-scanning-report.json
    # Bun/Node: check with `bun pm audit`
    - bun pm audit --json > gl-dependency-scanning-report-js.json 2>/dev/null || echo '{"advisories":[]}' > gl-dependency-scanning-report-js.json
  artifacts:
    reports:
      dependency_scanning: gl-dependency-scanning-report.json
    paths:
      - gl-dependency-scanning-report.json
      - gl-dependency-scanning-report-js.json
    expire_in: 30 days
    when: always
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
  allow_failure: true

security:container-scanning:
  stage: security
  image: registry.gitlab.com/security-products/container-scanning:7
  variables:
    CS_DOCKERFILE_PATH: Dockerfile
    CS_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
  script:
    - gtcs scan
  artifacts:
    reports:
      container_scanning: gl-container-scanning-report.json
    paths:
      - gl-container-scanning-report.json
    expire_in: 30 days
    when: always
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  allow_failure: true

# ============================================================================
# Package stage — Docker image build and push
# ============================================================================

# ── Build all 8 Docker images in parallel matrix ───────────────────────────
docker:build:
  stage: package
  image: docker:29-dind
  services:
    - docker:29-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
    DOCKER_DRIVER: overlay2
  needs:
    - job: rust:wasm-pack
      artifacts: true
      optional: true
  parallel:
    matrix:
      - IMAGE:
          - web
          - ai-agents
          - render-service
          - pre-processing
          - generative-studio
          - analytics-service
          - mcp-server
          - collab-server
  before_script:
    - until docker info >/dev/null 2>&1; do sleep 1; done
    # Restore WASM for web image build
    - |
      if [ "$IMAGE" = "web" ] && [ -d /tmp/wasm-pkg ] && [ "$(ls -A /tmp/wasm-pkg/ 2>/dev/null)" ]; then
        mkdir -p rust/wasm/pkg
        cp -r /tmp/wasm-pkg/* rust/wasm/pkg/
        echo "WASM package restored for Docker build"
      fi
  script:
    - |
      case "$IMAGE" in
        web)
          DOCKERFILE="apps/web/Dockerfile"
          CONTEXT="."
          ;;
        ai-agents)
          DOCKERFILE="services/ai-agents/Dockerfile"
          CONTEXT="services/ai-agents"
          ;;
        render-service)
          DOCKERFILE="services/render-service/Dockerfile"
          CONTEXT="services/render-service"
          ;;
        pre-processing)
          DOCKERFILE="services/pre-processing/Dockerfile"
          CONTEXT="services/pre-processing"
          ;;
        generative-studio)
          DOCKERFILE="services/generative-studio/Dockerfile"
          CONTEXT="services/generative-studio"
          ;;
        analytics-service)
          DOCKERFILE="services/analytics-service/Dockerfile"
          CONTEXT="services/analytics-service"
          ;;
        mcp-server)
          DOCKERFILE="rust/mcp-server/Dockerfile"
          CONTEXT="."
          ;;
        collab-server)
          DOCKERFILE="services/collab-server/Dockerfile"
          CONTEXT="."
          ;;
      esac
    - docker build
        --tag lazynext-${IMAGE}:${CI_COMMIT_SHA}
        --tag lazynext-${IMAGE}:latest
        --file "$DOCKERFILE"
        --build-arg "SKIP_WASM_BUILD=1"
        --build-arg "NEXT_PUBLIC_SITE_URL=$DEV_ENVIRONMENT_URL"
        --build-arg "NEXT_PUBLIC_PREPROCESSING_URL=$DEV_ENVIRONMENT_URL:8000"
        --build-arg "NEXT_PUBLIC_GENERATIVE_STUDIO_URL=$DEV_ENVIRONMENT_URL:8001"
        --build-arg "NEXT_PUBLIC_AI_AGENTS_URL=$DEV_ENVIRONMENT_URL:8002"
        --build-arg "NEXT_PUBLIC_RENDER_SERVICE_URL=$DEV_ENVIRONMENT_URL:8003"
        "$CONTEXT"
    # Save image as artifact for the push job
    - docker save lazynext-${IMAGE}:${CI_COMMIT_SHA} -o /tmp/${IMAGE}.tar
  artifacts:
    name: docker-image-${IMAGE}
    paths:
      - /tmp/${IMAGE}.tar
    expire_in: 1 hour
  retry: 1
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_TAG
  allow_failure:
    exit_codes: 137   # OOM kills for big images (generative-studio, pre-processing)

# ── Push all images to Azure Container Registry ─────────────────────────────
docker:push:
  stage: package
  image: docker:29-dind
  services:
    - docker:29-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
    DOCKER_DRIVER: overlay2
  needs:
    - job: docker:build
      artifacts: true
  before_script:
    - until docker info >/dev/null 2>&1; do sleep 1; done
    - echo "$ACR_PASSWORD" | docker login -u "$ACR_USERNAME" --password-stdin "$ACR_NAME.azurecr.io"
  script:
    - |
      for IMAGE in web ai-agents render-service pre-processing generative-studio analytics-service mcp-server collab-server; do
        if [ -f /tmp/${IMAGE}.tar ]; then
          docker load -i /tmp/${IMAGE}.tar
          ACR_TAG="${ACR_NAME}.azurecr.io/lazynext-${IMAGE}:${CI_COMMIT_SHA}"
          docker tag lazynext-${IMAGE}:${CI_COMMIT_SHA} "$ACR_TAG"
          docker tag lazynext-${IMAGE}:${CI_COMMIT_SHA} "${ACR_NAME}.azurecr.io/lazynext-${IMAGE}:latest"
          docker push "$ACR_TAG"
          docker push "${ACR_NAME}.azurecr.io/lazynext-${IMAGE}:latest"
          echo "Pushed $IMAGE to ACR"
        else
          echo "Skipping $IMAGE — build artifact not found"
        fi
      done
  retry: 2
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# ============================================================================
# Deploy stage
# ============================================================================

# ── Deploy: Azure Development (develop branch) ────────────────────────────
deploy:azure:dev:
  stage: deploy
  extends: .azure-auth
  environment:
    name: dev
    url: $DEV_ENVIRONMENT_URL
    on_stop: stop:azure:dev
  needs:
    - docker:push
  script:
    - |
      RG="${AZURE_RESOURCE_GROUP}-dev"
      for svc in web ai-agents render-service pre-processing generative-studio analytics-service mcp-server collab-server; do
        echo "Deploying lazynext-${svc} to dev..."
        az containerapp update
          --name "lazynext-${svc}-dev"
          --resource-group "$RG"
          --image "${ACR_NAME}.azurecr.io/lazynext-${svc}:${CI_COMMIT_SHA}"
          --set-env-vars "DEPLOY_ID=${CI_COMMIT_SHA}" 2>/dev/null || {
            echo "::warning::Container App lazynext-${svc}-dev not found — creating..."
            az containerapp create
              --name "lazynext-${svc}-dev"
              --resource-group "$RG"
              --environment lazynext-env-dev
              --image "${ACR_NAME}.azurecr.io/lazynext-${svc}:${CI_COMMIT_SHA}"
              --target-port "${PORT}" 2>/dev/null || echo "Failed to create $svc"
          }
      done
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"

# ── Stop Dev (triggered by `on_stop`) ────────────────────────────────────
stop:azure:dev:
  stage: deploy
  extends: .azure-auth
  variables:
    GIT_STRATEGY: none
  environment:
    name: dev
    action: stop
  script:
    - |
      RG="${AZURE_RESOURCE_GROUP}-dev"
      for svc in web ai-agents render-service pre-processing generative-studio analytics-service mcp-server collab-server; do
        az containerapp revision deactivate
          --name "lazynext-${svc}-dev"
          --resource-group "$RG"
          --revision latest 2>/dev/null || echo "$svc already stopped"
      done
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      when: manual

# ── Deploy: Azure Staging (main branch) ──────────────────────────────────
deploy:azure:staging:
  stage: deploy
  extends: .azure-auth
  environment:
    name: staging
    url: $STAGING_ENVIRONMENT_URL
  needs:
    - docker:push
  script:
    - |
      RG="${AZURE_RESOURCE_GROUP}-staging"
      for svc in web ai-agents render-service pre-processing generative-studio analytics-service mcp-server collab-server; do
        echo "Deploying lazynext-${svc} to staging..."
        az containerapp update
          --name "lazynext-${svc}-staging"
          --resource-group "$RG"
          --image "${ACR_NAME}.azurecr.io/lazynext-${svc}:${CI_COMMIT_SHA}" 2>/dev/null || {
            echo "::warning::Container App lazynext-${svc}-staging not found — creating..."
            az containerapp create
              --name "lazynext-${svc}-staging"
              --resource-group "$RG"
              --environment lazynext-env-staging
              --image "${ACR_NAME}.azurecr.io/lazynext-${svc}:${CI_COMMIT_SHA}" 2>/dev/null || echo "Failed to create $svc"
          }
      done
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ── Deploy: Azure Production (manual, tag-triggered) ─────────────────────
deploy:azure:production:
  stage: deploy
  extends: .azure-auth
  environment:
    name: production
    url: $PRODUCTION_ENVIRONMENT_URL
  needs:
    - docker:push
  script:
    - |
      RG="${AZURE_RESOURCE_GROUP}-production"
      ACR="${ACR_NAME}.azurecr.io"

      echo "=== Running database migrations ==="
      az containerapp job create
        --name db-migrate-${CI_COMMIT_SHA}
        --resource-group "$RG"
        --image "${ACR}/lazynext-migrate:${CI_COMMIT_SHA}"
        --trigger-type Manual
        --command "bun run db:migrate" 2>/dev/null || echo "Migration job creation skipped — run manually if needed"

      echo "=== Deploying to production ==="
      for svc in web ai-agents render-service pre-processing generative-studio analytics-service mcp-server collab-server; do
        echo "Deploying lazynext-${svc} to production..."
        az containerapp update
          --name "lazynext-${svc}-production"
          --resource-group "$RG"
          --image "${ACR}/lazynext-${svc}:${CI_COMMIT_SHA}"
          --set-env-vars "DEPLOY_ID=${CI_COMMIT_SHA}" || {
            echo "::error::Failed to deploy $svc — aborting"
            exit 1
          }
      done

      # Optional AKS deployment
      if [ -n "$AKS_CLUSTER_NAME" ]; then
        az aks get-credentials
          --name "$AKS_CLUSTER_NAME"
          --resource-group "$RG"
        kubectl apply -k k8s/overlays/production
        kubectl rollout status deployment -n lazynext --timeout=5m
      fi
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
      allow_failure: false

# ── Database Migrations (runs after each deploy tier) ─────────────────
db:migrate:
  stage: deploy
  image: oven/bun:1.3-slim
  variables:
    GIT_STRATEGY: none
  needs:
    - job: deploy:azure:dev
      optional: true
    - job: deploy:azure:staging
      optional: true
    - job: deploy:azure:production
      optional: true
  script:
    # Runs as a one-shot Job in Azure Container Apps:
    # migrations are handled by the deploy script above;
    # this job is a gate — it polls for migration completion.
    - |
      echo "Migration verification placeholder for environment:"
      echo "  dev:  $DEV_ENVIRONMENT_URL"
      echo "  staging: $STAGING_ENVIRONMENT_URL"
      echo "  production: $PRODUCTION_ENVIRONMENT_URL"
    - echo "Run manually: az containerapp job start --name db-migrate-${CI_COMMIT_SHA} --resource-group ${AZURE_RESOURCE_GROUP}-production"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# ── Smoke Tests (post-deploy) ──────────────────────────────────────────
smoke:tests:
  stage: deploy
  image: curlimages/curl:8.12
  variables:
    GIT_STRATEGY: none
  needs:
    - db:migrate
  script:
    - |
      set +e
      FAILURES=0

      smoke() {
        local name="$1" url="$2" expected_code="$3"
        local code
        code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url")
        if [ "$code" = "$expected_code" ]; then
          echo "OK  $name — HTTP $code"
        else
          echo "FAIL $name — expected $expected_code, got $code"
          FAILURES=$((FAILURES + 1))
        fi
      }

      BASE="${ENVIRONMENT_URL:-$STAGING_ENVIRONMENT_URL}"
      echo "Smoke-testing $BASE ..."

      smoke "web"            "${BASE}/api/health"                "200"
      smoke "ai-agents"      "${BASE}:8002/health"               "200"
      smoke "render-service" "${BASE}:8003/health"               "200"
      smoke "pre-processing" "${BASE}:8000/"                     "200"
      smoke "mcp-server"     "${BASE}:8005/health"               "200"
      smoke "collab-server"  "${BASE}:8004/health"               "200"

      if [ "$FAILURES" -gt 0 ]; then
        echo "Smoke tests failed: $FAILURES"
        exit 1
      fi
      echo "All smoke tests passed."
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_TAG

# ============================================================================
# Cleanup stage
# ============================================================================

cleanup:branches:
  stage: cleanup
  image: bitnami/git:2
  variables:
    GIT_STRATEGY: none
  script:
    - |
      echo "Cleaning up stale review-app resources for merged branch: ${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}"
      # Regex-safe slug of branch name
      SLUG=$(echo "${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}" | sed 's/[^a-zA-Z0-9-]/-/g' | tr '[:upper:]' '[:lower:]' | cut -c1-53)
      RG="${AZURE_RESOURCE_GROUP}-review"

      for svc in web ai-agents render-service pre-processing generative-studio analytics-service mcp-server collab-server; do
        az containerapp delete
          --name "lazynext-${svc}-${SLUG}"
          --resource-group "$RG"
          --yes 2>/dev/null || echo "${svc} already cleaned up"
      done

      echo "Stale artifacts expired."
  rules:
    - if: $CI_MERGE_REQUEST_EVENT_TYPE == "merged"
      when: always

# ── Cleanup: expire old Docker tags from ACR ───────────────────────────
cleanup:acr:
  stage: cleanup
  extends: .azure-auth
  variables:
    GIT_STRATEGY: none
  script:
    - |
      # Purge tags older than 30 days that are not "latest" or semver
      PURGE_BEFORE=$(date -d "30 days ago" -u +%Y-%m-%dT%H:%M:%SZ)
      az acr run
        --registry "$ACR_NAME"
        --cmd "acr purge --filter 'lazynext-.*:.*' --ago 30d --keep 10 --untagged"
        /dev/null 2>&1 || echo "ACR purge skipped (may require --admin-enabled)"
  rules:
    - if: $CI_PIPELINE_SCHEDULE == "nightly-cleanup"
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual

# ============================================================================
# Optional includes — uncomment when using GitLab-managed features
# ============================================================================

# GitLab Ultimate security scanning templates (available on .com SaaS):
# include:
#   - template: Security/SAST.gitlab-ci.yml
#   - template: Security/Dependency-Scanning.gitlab-ci.yml
#   - template: Security/Secret-Detection.gitlab-ci.yml
#   - template: Security/Container-Scanning.gitlab-ci.yml

# GitLab-managed Terraform state (if using GitLab as Terraform backend):
# include:
#   - template: Terraform/Base.gitlab-ci.yml

# Auto Deploy to Kubernetes via GitLab-managed agent:
# include:
#   - template: Deploy.gitlab-ci.yml

# ============================================================================
# Workflow rules — control when pipelines run
# ============================================================================
workflow:
  rules:
    # Always run for default branches
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    # Run for MRs
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # Run for semver tags
    - if: $CI_COMMIT_TAG =~ /^v?[0-9]+\.[0-9]+\.[0-9]+/
    # Scheduled pipelines (nightly build / cleanup)
    - if: $CI_PIPELINE_SCHEDULE == "nightly-build"
    - if: $CI_PIPELINE_SCHEDULE == "nightly-cleanup"
    # Skip pipelines for WIP MRs
    - if: $CI_MERGE_REQUEST_TITLE =~ /^WIP:|^Draft:/i
      when: never
    # Skip push to non-default feature branches (MR pipelines handle them)
    - if: $CI_COMMIT_BRANCH && $CI_PIPELINE_SOURCE == "push"
      when: never
