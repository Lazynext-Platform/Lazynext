apiVersion: apps/v1
kind: Deployment
metadata:
  name: lazynext-api-gateway
  labels:
    app: lazynext-api-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: lazynext-api-gateway
  template:
    metadata:
      labels:
        app: lazynext-api-gateway
    spec:
      containers:
      - name: api-gateway
        image: ghcr.io/lazynext/api-gateway:latest
        ports:
        - containerPort: 3000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: lazynext-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: lazynext-secrets
              key: redis-url
        - name: AWS_S3_BUCKET
          value: lazynext-media-storage-production
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1024Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: lazynext-api-gateway
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 3000
  selector:
    app: lazynext-api-gateway
