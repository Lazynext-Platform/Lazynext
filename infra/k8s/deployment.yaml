apiVersion: apps/v1
kind: Deployment
metadata:
  name: lazynext-api-gateway
  labels:
    app: lazynext-api-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: lazynext-api-gateway
  template:
    metadata:
      labels:
        app: lazynext-api-gateway
    spec:
      containers:
      - name: api-gateway
        image: ghcr.io/lazynext/api-gateway:latest
        ports:
        - containerPort: 3000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: lazynext-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: lazynext-secrets
              key: redis-url
        - name: AWS_S3_BUCKET
          value: lazynext-media-storage-production
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1024Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: lazynext-api-gateway
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
  selector:
    app: lazynext-api-gateway
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lazynext-api-gateway-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lazynext-api-gateway
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lazynext-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.lazynext.com
    secretName: lazynext-tls
  rules:
  - host: api.lazynext.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: lazynext-api-gateway
            port:
              number: 80
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: lazynext-redis
spec:
  serviceName: "redis"
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7.0-alpine
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: redis-data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi
