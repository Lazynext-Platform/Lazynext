apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: web
        image: lazynext/web:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: STORAGE_PROVIDER
          value: "local"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: DATABASE_URL
        - name: RENDER_SERVICE_URL
          value: "http://render-service:8003"
        - name: GENERATIVE_STUDIO_URL
          value: "http://generative-studio:8001"
        - name: PRE_PROCESSING_URL
          value: "http://pre-processing:8000"
        - name: AI_AGENTS_URL
          value: "http://ai-agents:8002"
---
apiVersion: v1
kind: Service
metadata:
  name: web
spec:
  type: ClusterIP
  selector:
    app: web
  ports:
  - port: 3000
    targetPort: 3000
