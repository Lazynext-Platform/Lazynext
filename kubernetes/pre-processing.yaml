apiVersion: apps/v1
kind: Deployment
metadata:
  name: pre-processing
  labels:
    app: pre-processing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pre-processing
  template:
    metadata:
      labels:
        app: pre-processing
    spec:
      containers:
      - name: pre-processing
        image: ghcr.io/lazynext-platform/lazynext-pre-processing:latest
        ports:
        - containerPort: 8000
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: pre-processing
spec:
  type: ClusterIP
  selector:
    app: pre-processing
  ports:
  - port: 8000
    targetPort: 8000
