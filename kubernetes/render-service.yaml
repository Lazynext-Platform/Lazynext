apiVersion: apps/v1
kind: Deployment
metadata:
  name: render-service
  labels:
    app: render-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: render-service
  template:
    metadata:
      labels:
        app: render-service
    spec:
      containers:
      - name: render-service
        image: lazynext/render-service:latest
        ports:
        - containerPort: 8003
        env:
        - name: NODE_ENV
          value: "production"
---
apiVersion: v1
kind: Service
metadata:
  name: render-service
spec:
  type: ClusterIP
  selector:
    app: render-service
  ports:
  - port: 8003
    targetPort: 8003
