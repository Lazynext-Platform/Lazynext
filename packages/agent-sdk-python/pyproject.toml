[project]
name = "lazynext-agent-sdk"
description = "Python SDK for building AI agents that control the Lazynext NLE via natural language"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "httpx",
    "pydantic>=2",
]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["lazynext_agent*"]
