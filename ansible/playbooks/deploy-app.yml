---
# ── Lazynext Application Deployment Playbook ──────────────────────
# Deploys the full application stack onto Kubernetes, waits for
# rollouts to complete, and runs smoke tests to verify health.
#
# Usage:
#   ansible-playbook -i inventory.ini playbooks/deploy-app.yml
#   ansible-playbook -i inventory.ini playbooks/deploy-app.yml \
#     -e 'target_environment=production' \
#     -e 'kustomize_overlay=production'

- name: Deploy Lazynext Application to Kubernetes
  hosts: masters[0]
  gather_facts: yes
  vars:
    target_environment: "{{ target_environment | default('staging') }}"
    kustomize_overlay: "{{ kustomize_overlay | default(target_environment) }}"
    k8s_manifests_dir: "{{ playbook_dir | dirname | dirname }}/k8s"
    kustomize_dir: "{{ k8s_manifests_dir }}/overlays/{{ kustomize_overlay }}"
    app_namespace: "lazynext-{{ target_environment }}"
    deployment_timeout: 300
    smoke_test_retries: 12
    smoke_test_delay: 5
    kubeconfig_path: "{{ lookup('env', 'KUBECONFIG') | default(ansible_env.HOME + '/.kube/config', true) }}"

  pre_tasks:
    # ──────────────────────────────────────────────────────────────
    # Pre-flight checks
    # ──────────────────────────────────────────────────────────────

    - name: Verify kubectl is available
      ansible.builtin.command: kubectl version --client --output json
      register: kubectl_version
      changed_when: false

    - name: Display kubectl version
      ansible.builtin.debug:
        var: kubectl_version.stdout

    - name: Verify kubeconfig exists
      ansible.builtin.stat:
        path: "{{ kubeconfig_path }}"
      register: kubeconfig_stat

    - name: Fail if kubeconfig not found
      ansible.builtin.fail:
        msg: "Kubeconfig not found at {{ kubeconfig_path }}. Ensure the cluster is bootstrapped."
      when: not kubeconfig_stat.stat.exists

    - name: Verify kustomize is available
      ansible.builtin.command: kubectl kustomize --help
      register: kustomize_check
      changed_when: false
      failed_when: false

    - name: Fail if kustomize plugin is missing
      ansible.builtin.fail:
        msg: "kubectl kustomize plugin not available. Install kubectl >= 1.14."
      when: kustomize_check.rc != 0

    - name: Check kustomization directory exists
      ansible.builtin.stat:
        path: "{{ kustomize_dir }}"
      register: kustomize_stat

    - name: Warn if kustomization dir is missing
      ansible.builtin.debug:
        msg: "Kustomization directory {{ kustomize_dir }} not found. Using base manifests."
      when: not kustomize_stat.stat.exists

    - name: Verify connectivity to cluster
      ansible.builtin.command: kubectl cluster-info
      register: cluster_info
      changed_when: false

    - name: Display cluster info
      ansible.builtin.debug:
        var: cluster_info.stdout_lines

  tasks:
    # ──────────────────────────────────────────────────────────────
    # Create namespace
    # ──────────────────────────────────────────────────────────────

    - name: Create application namespace
      kubernetes.core.k8s:
        name: "{{ app_namespace }}"
        api_version: v1
        kind: Namespace
        state: present
        kubeconfig: "{{ kubeconfig_path }}"

    - name: Label namespace for network policy
      ansible.builtin.command: >-
        kubectl label namespace {{ app_namespace }}
        lazynext.io/environment={{ target_environment }}
        --overwrite
      changed_when: false
      failed_when: false

    # ──────────────────────────────────────────────────────────────
    # Apply secrets (from Ansible vault)
    # ──────────────────────────────────────────────────────────────

    - name: Create Docker registry pull secret
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ kubeconfig_path }}"
        namespace: "{{ app_namespace }}"
        definition:
          apiVersion: v1
          kind: Secret
          type: kubernetes.io/dockerconfigjson
          metadata:
            name: registry-credentials
          data:
            .dockerconfigjson: "{{ vault_docker_config_json | default(omit) }}"

    - name: Create application secrets
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ kubeconfig_path }}"
        namespace: "{{ app_namespace }}"
        definition:
          apiVersion: v1
          kind: Secret
          type: Opaque
          metadata:
            name: lazynext-secrets
          stringData:
            DATABASE_URL: "{{ vault_database_url | default(omit) }}"
            DATABASE_URL_FILE: /run/secrets/postgres_password
            BETTER_AUTH_SECRET: "{{ vault_better_auth_secret | default(mandatory) }}"
            REDIS_URL: "{{ vault_redis_url | default(omit) }}"
            DODO_API_KEY: "{{ vault_dodo_api_key | default('') }}"
            RESEND_API_KEY: "{{ vault_resend_api_key | default('') }}"

    # ──────────────────────────────────────────────────────────────
    # Deploy manifests with kustomize
    # ──────────────────────────────────────────────────────────────

    - name: Build and apply kustomization
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl apply -k {{ kustomize_dir | quote }} \
          --namespace={{ app_namespace }} \
          --prune \
          --all \
          --dry-run=client 2>&1 || true
        kubectl apply -k {{ kustomize_dir | quote }} \
          --namespace={{ app_namespace }} \
          --prune \
          --all
      args:
        executable: /bin/bash
      register: kustomize_apply
      changed_when: "'configured' in kustomize_apply.stdout or 'created' in kustomize_apply.stdout"
      when: kustomize_stat.stat.exists

    - name: Apply base manifests (fallback if no kustomization)
      ansible.builtin.shell: |
        set -euo pipefail
        for manifest in {{ k8s_manifests_dir }}/base/*.yml {{ k8s_manifests_dir }}/base/*.yaml; do
          [ -f "$manifest" ] && kubectl apply -f "$manifest" --namespace={{ app_namespace }}
        done
      args:
        executable: /bin/bash
      register: base_apply
      changed_when: "'configured' in base_apply.stdout or 'created' in base_apply.stdout"
      when: not kustomize_stat.stat.exists

    - name: Display apply output
      ansible.builtin.debug:
        var: "{{ kustomize_apply.stdout if kustomize_stat.stat.exists else base_apply.stdout }}"
      when: (kustomize_apply.stdout is defined) or (base_apply.stdout is defined)

    # ──────────────────────────────────────────────────────────────
    # Wait for rollouts
    # ──────────────────────────────────────────────────────────────

    - name: Check all deployments in namespace
      ansible.builtin.command: >-
        kubectl get deployments
        --namespace={{ app_namespace }}
        -o jsonpath='{.items[*].metadata.name}'
      register: all_deployments
      changed_when: false

    - name: Wait for each deployment to roll out
      ansible.builtin.command: >-
        kubectl rollout status deployment/{{ item }}
        --namespace={{ app_namespace }}
        --timeout={{ deployment_timeout }}s
      loop: "{{ all_deployments.stdout.split() }}"
      register: rollout_status
      until: rollout_status.rc == 0
      retries: 3
      delay: 10
      when: all_deployments.stdout | length > 0

    - name: Check all statefulsets in namespace
      ansible.builtin.command: >-
        kubectl get statefulsets
        --namespace={{ app_namespace }}
        -o jsonpath='{.items[*].metadata.name}'
      register: all_statefulsets
      changed_when: false

    - name: Wait for each statefulset to roll out
      ansible.builtin.command: >-
        kubectl rollout status statefulset/{{ item }}
        --namespace={{ app_namespace }}
        --timeout={{ deployment_timeout }}s
      loop: "{{ all_statefulsets.stdout.split() }}"
      register: sts_rollout
      until: sts_rollout.rc == 0
      retries: 3
      delay: 10
      when: all_statefulsets.stdout | length > 0

    - name: Wait for all pods to be ready
      ansible.builtin.shell: |
        kubectl wait --for=condition=Ready pods \
          --all \
          --namespace={{ app_namespace }} \
          --timeout={{ deployment_timeout }}s 2>&1
      register: pods_ready
      changed_when: false
      failed_when: false

    - name: Display pod readiness
      ansible.builtin.debug:
        var: pods_ready.stdout_lines

    # ──────────────────────────────────────────────────────────────
    # Smoke tests
    # ──────────────────────────────────────────────────────────────

    - name: Retrieve API Gateway service endpoint
      ansible.builtin.command: >-
        kubectl get service api-gateway
        --namespace={{ app_namespace }}
        -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
      register: gateway_ip
      changed_when: false
      failed_when: false

    - name: Set API Gateway endpoint
      ansible.builtin.set_fact:
        api_gateway_endpoint: "{{ gateway_ip.stdout | default('localhost') }}"
        api_gateway_port: "{{ 8005 if target_environment == 'staging' else 443 }}"

    - name: Set API Gateway protocol
      ansible.builtin.set_fact:
        api_gateway_protocol: "{{ 'https' if (api_gateway_port | int) == 443 else 'http' }}"

    - name: Smoke test — API Gateway health endpoint
      ansible.builtin.uri:
        url: "{{ api_gateway_protocol }}://{{ api_gateway_endpoint }}:{{ api_gateway_port }}/health"
        method: GET
        validate_certs: false
        return_content: yes
        status_code: 200
      register: api_health
      retries: "{{ smoke_test_retries }}"
      delay: "{{ smoke_test_delay }}"
      until: api_health.status == 200
      failed_when: false

    - name: Smoke test — Web app health endpoint
      ansible.builtin.uri:
        url: "{{ api_gateway_protocol }}://{{ api_gateway_endpoint }}:{{ api_gateway_port }}/api/health"
        method: GET
        validate_certs: false
        return_content: yes
        status_code: 200
      register: web_health
      retries: "{{ smoke_test_retries }}"
      delay: "{{ smoke_test_delay }}"
      until: web_health.status == 200
      failed_when: false

    - name: Smoke test — Pre-processing service
      ansible.builtin.uri:
        url: "{{ api_gateway_protocol }}://{{ api_gateway_endpoint }}:8000/health"
        method: GET
        validate_certs: false
        return_content: yes
        status_code: 200
      register: preproc_health
      retries: "{{ smoke_test_retries }}"
      delay: "{{ smoke_test_delay }}"
      until: preproc_health.status == 200
      failed_when: false

    - name: Smoke test — Generative Studio service
      ansible.builtin.uri:
        url: "{{ api_gateway_protocol }}://{{ api_gateway_endpoint }}:8001/health"
        method: GET
        validate_certs: false
        return_content: yes
        status_code: 200
      register: genstudio_health
      retries: "{{ smoke_test_retries }}"
      delay: "{{ smoke_test_delay }}"
      until: genstudio_health.status == 200
      failed_when: false

    - name: Smoke test — AI Agents / Sync server
      ansible.builtin.uri:
        url: "{{ api_gateway_protocol }}://{{ api_gateway_endpoint }}:8002/health"
        method: GET
        validate_certs: false
        return_content: yes
        status_code: 200
      register: aiagents_health
      retries: "{{ smoke_test_retries }}"
      delay: "{{ smoke_test_delay }}"
      until: aiagents_health.status == 200
      failed_when: false

    - name: Smoke test — Render service
      ansible.builtin.uri:
        url: "{{ api_gateway_protocol }}://{{ api_gateway_endpoint }}:8003/health"
        method: GET
        validate_certs: false
        return_content: yes
        status_code: 200
      register: render_health
      retries: "{{ smoke_test_retries }}"
      delay: "{{ smoke_test_delay }}"
      until: render_health.status == 200
      failed_when: false

    - name: Smoke test — Collab server
      ansible.builtin.uri:
        url: "{{ api_gateway_protocol }}://{{ api_gateway_endpoint }}:8004/health"
        method: GET
        validate_certs: false
        return_content: yes
        status_code: 200
      register: collab_health
      retries: "{{ smoke_test_retries }}"
      delay: "{{ smoke_test_delay }}"
      until: collab_health.status == 200
      failed_when: false

    - name: Smoke test — Analytics service
      ansible.builtin.uri:
        url: "{{ api_gateway_protocol }}://{{ api_gateway_endpoint }}:8006/health"
        method: GET
        validate_certs: false
        return_content: yes
        status_code: 200
      register: analytics_health
      retries: "{{ smoke_test_retries }}"
      delay: "{{ smoke_test_delay }}"
      until: analytics_health.status == 200
      failed_when: false

    - name: Collect and display smoke test results
      ansible.builtin.set_fact:
        smoke_test_results:
          api_gateway: "{{ 'PASS' if api_health.status | default(500) == 200 else 'FAIL' }}"
          web_app: "{{ 'PASS' if web_health.status | default(500) == 200 else 'FAIL' }}"
          pre_processing: "{{ 'PASS' if preproc_health.status | default(500) == 200 else 'FAIL' }}"
          generative_studio: "{{ 'PASS' if genstudio_health.status | default(500) == 200 else 'FAIL' }}"
          ai_agents: "{{ 'PASS' if aiagents_health.status | default(500) == 200 else 'FAIL' }}"
          render_service: "{{ 'PASS' if render_health.status | default(500) == 200 else 'FAIL' }}"
          collab_server: "{{ 'PASS' if collab_health.status | default(500) == 200 else 'FAIL' }}"
          analytics_service: "{{ 'PASS' if analytics_health.status | default(500) == 200 else 'FAIL' }}"

    - name: Display smoke test summary
      ansible.builtin.debug:
        msg:
          - "============================================"
          - "  Lazynext Deployment Smoke Test Results"
          - "  Environment: {{ target_environment }}"
          - "============================================"
          - "API Gateway:       {{ smoke_test_results.api_gateway }}"
          - "Web App:           {{ smoke_test_results.web_app }}"
          - "Pre-processing:    {{ smoke_test_results.pre_processing }}"
          - "Generative Studio: {{ smoke_test_results.generative_studio }}"
          - "AI Agents:         {{ smoke_test_results.ai_agents }}"
          - "Render Service:    {{ smoke_test_results.render_service }}"
          - "Collab Server:     {{ smoke_test_results.collab_server }}"
          - "Analytics Service: {{ smoke_test_results.analytics_service }}"
          - "============================================"

    - name: Fail if any critical service failed
      ansible.builtin.fail:
        msg: |
          One or more critical services failed smoke tests:
          API Gateway: {{ smoke_test_results.api_gateway }}
          Web App: {{ smoke_test_results.web_app }}
          Pre-processing: {{ smoke_test_results.pre_processing }}
          Generative Studio: {{ smoke_test_results.generative_studio }}
          AI Agents: {{ smoke_test_results.ai_agents }}
          Render Service: {{ smoke_test_results.render_service }}
          Collab Server: {{ smoke_test_results.collab_server }}
          Analytics Service: {{ smoke_test_results.analytics_service }}
      when:
        - smoke_test_results.api_gateway == 'FAIL'
           or smoke_test_results.web_app == 'FAIL'
           or smoke_test_results.pre_processing == 'FAIL'
           or smoke_test_results.generative_studio == 'FAIL'
           or smoke_test_results.ai_agents == 'FAIL'
           or smoke_test_results.render_service == 'FAIL'
           or smoke_test_results.collab_server == 'FAIL'
           or smoke_test_results.analytics_service == 'FAIL'

  post_tasks:
    # ──────────────────────────────────────────────────────────────
    # Post-deployment info
    # ──────────────────────────────────────────────────────────────

    - name: Display all running pods
      ansible.builtin.command: >-
        kubectl get pods
        --namespace={{ app_namespace }}
        -o wide
      register: pod_list
      changed_when: false

    - name: Show pod status
      ansible.builtin.debug:
        var: pod_list.stdout_lines

    - name: Display recent events
      ansible.builtin.command: >-
        kubectl get events
        --namespace={{ app_namespace }}
        --sort-by='.lastTimestamp'
      register: events_list
      changed_when: false
      failed_when: false

    - name: Show events
      ansible.builtin.debug:
        var: events_list.stdout_lines
