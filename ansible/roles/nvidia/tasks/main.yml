---
- name: Add NVIDIA package repositories
  ansible.builtin.shell: |
    set -e
    curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | gpg --dearmor -o /etc/apt/keyrings/nvidia-container-toolkit-keyring.gpg
    curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | \
      sed 's#deb https://#deb [signed-by=/etc/apt/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | \
      tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
  args:
    creates: /etc/apt/sources.list.d/nvidia-container-toolkit.list

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
  when: ansible_local.nvidia_gpu is defined or ansible_local.gpu_count | default(0) > 0

- name: Install NVIDIA kernel drivers
  ansible.builtin.apt:
    name:
      - nvidia-driver-550
    state: present

- name: Install NVIDIA Container Toolkit
  ansible.builtin.apt:
    name: nvidia-container-toolkit
    state: present

- name: Configure Docker to use NVIDIA runtime
  ansible.builtin.command: nvidia-ctk runtime configure --runtime=docker
  notify: Restart Docker

- name: Configure containerd to use NVIDIA runtime
  ansible.builtin.command: nvidia-ctk runtime configure --runtime=containerd
  notify: restart containerd

- name: Verify NVIDIA driver installation
  ansible.builtin.command: nvidia-smi
  changed_when: false
  register: nvidia_smi_result
  failed_when: false
