---
- name: Configure Lazynext Worker Nodes
  hosts: all
  become: yes
  roles:
    - common
    - docker
    - nvidia
    - k8s
  tasks:
    - name: Install FFmpeg (required for render farm nodes)
      apt:
        name: ffmpeg
        state: present
      when: "'workers' in group_names or 'gpu_nodes' in group_names"
