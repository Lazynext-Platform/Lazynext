# ── Lazynext Ansible Worker Playbook ──────────────────────────────
# Configures worker nodes with FFmpeg, GPU drivers, and runtime deps.
# Run with: ansible-playbook -i inventory.ini playbook.yml
---
- name: Configure Lazynext Worker Nodes
  hosts: all
  become: yes
  roles:
    - common
    - docker
    - role: nvidia
      when: "'gpu_nodes' in group_names"
    - k8s
  tasks:
    - name: Install FFmpeg (required for render farm nodes)
      apt:
        name: ffmpeg
        state: present
      when: "'workers' in group_names or 'gpu_nodes' in group_names"
