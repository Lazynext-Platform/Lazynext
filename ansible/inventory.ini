# ── Lazynext Ansible Inventory ───────────────────────────────────
# Fill in your actual host IPs and credentials before running.
# Example hosts below show realistic bare-metal topology.
#
# Usage:
#   ansible-playbook -i inventory.ini site.yml
#   ansible-playbook -i inventory.ini playbook.yml --limit workers

[masters]
# Kubernetes control plane nodes (3 for HA)
master-1 ansible_host=10.0.0.10 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/lazynext_key
master-2 ansible_host=10.0.0.11 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/lazynext_key
master-3 ansible_host=10.0.0.12 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/lazynext_key

[workers]
# General compute nodes (web, API, render service) — 3 for HA
worker-1 ansible_host=10.0.0.20 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/lazynext_key
worker-2 ansible_host=10.0.0.21 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/lazynext_key
worker-3 ansible_host=10.0.0.22 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/lazynext_key

[gpu_nodes]
# GPU-accelerated nodes for ML inference (SAM2, diffusion, Whisper)
gpu-1 ansible_host=10.0.0.30 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/lazynext_key
gpu-2 ansible_host=10.0.0.31 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/lazynext_key

[k8s:children]
masters
workers
gpu_nodes

[all:vars]
# Common variables for all hosts
ansible_python_interpreter=/usr/bin/python3
kubernetes_version="1.32"
configure_firewall=true
