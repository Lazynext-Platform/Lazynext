# ── Pre-Processing Service — Standalone Development ──────────────
# Usage: docker compose -f docker-compose.pre-processing.yml up
# Runs only pre-processing + its dependencies (no full platform).
services:
  pre-processing:
    build:
      context: ./services/pre-processing
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - MEDIA_BUCKET=${MEDIA_BUCKET:-lazynext-media-dev}
      - NODE_ENV=development
    volumes:
      - ./services/pre-processing:/app:delegated
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/"]
      interval: 30s
      start_period: 10s
    networks:
      - preproc-net

networks:
  preproc-net:
    driver: bridge
